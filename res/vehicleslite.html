<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设备管理</title>
  <!--<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">  -->
     <link rel="stylesheet" href="/res/fa/css/all.min.css">
  <style>
    :root {
      --primary: #0f8f8c;
      --primary-dark: #08706e;
      --primary-soft: #e6f6f5;
      --page-bg: #f4f7f7;
      --card-bg: #ffffff;
      --border-color: #dbe5e4;
      --border-strong: #c8d8d6;
      --text-color: #1f2933;
      --muted: #667085;
      --shadow: 0 10px 28px rgba(15, 143, 140, 0.08);
      --transition: all 0.2s ease;
      --hover-bg: #f8fbfb;
      --danger: #dc2626;
      --warning: #d97706;
      --success: #15803d;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      min-height: 100vh;
      padding: 18px;
      background: var(--page-bg);
      color: var(--text-color);
    }

    .container {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .card-title {
      position: relative;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding: 0 0 14px 0;
      border-bottom: 1px solid var(--border-color);
      color: #102a2a;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .card-title::before {
      content: "";
      width: 4px;
      height: 18px;
      border-radius: 99px;
      background: var(--primary);
      flex: 0 0 auto;
    }

    #device-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .device-card {
      display: grid;
      grid-template-columns: 110px minmax(0, 1fr) 110px;
      gap: 14px;
      align-items: center;
      padding: 14px;
      background: #fff;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      transition: var(--transition);
    }

    .device-card:hover {
      border-color: var(--border-strong);
      background: var(--hover-bg);
      box-shadow: 0 8px 22px rgba(15, 143, 140, 0.07);
      transform: translateY(-1px);
    }

    .device-img {
      width: 110px;
      height: 86px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #edf2f2;
      background: #f8fafafa;
    }

    .device-info {
      min-width: 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .device-name-row {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      margin-bottom: 1px;
    }

    .device-info .device-name {
      min-width: 0;
      color: #102a2a;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.35;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .device-info span {
      display: block;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status-tag {
      display: inline-flex !important;
      flex: 0 0 auto;
      align-items: center;
      justify-content: center;
      height: 22px;
      padding: 0 9px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-size: 12px;
      font-weight: 700;
      line-height: 22px;
      white-space: nowrap;
    }

    .status-tag.online {
      background: #e8f7ef;
      border-color: #bbebcf;
      color: var(--success);
    }

    .status-tag.busy {
      background: #fff4e5;
      border-color: #fed7aa;
      color: var(--warning);
    }

    .status-tag.offline {
      background: #feecec;
      border-color: #fecaca;
      color: var(--danger);
    }

    .device-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-self: stretch;
      justify-content: center;
    }

    .modify-btn {
      width: 100%;
      height: 34px;
      border: 1px solid var(--primary);
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: var(--transition);
    }

    .modify-btn:hover {
      background: var(--primary-dark);
      border-color: var(--primary-dark);
      box-shadow: 0 8px 16px rgba(15, 143, 140, 0.16);
    }

    .modify-btn:nth-child(2) {
      background: #fff;
      color: var(--primary-dark);
    }

    .modify-btn:nth-child(2):hover {
      background: var(--primary-soft);
      color: var(--primary-dark);
    }

    .loading {
      margin-top: 14px;
      padding: 14px;
      text-align: center;
      color: var(--primary-dark);
      font-size: 14px;
      background: var(--primary-soft);
      border: 1px dashed #b7dfdd;
      border-radius: 10px;
    }

    .float-refresh-btn {
      position: fixed;
      right: 24px;
      bottom: 28px;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      box-shadow: 0 10px 24px rgba(15, 143, 140, 0.28);
      cursor: pointer;
      transition: var(--transition);
    }

    .float-refresh-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .float-refresh-btn:active {
      transform: scale(0.96);
    }

    .float-refresh-btn.loading i {
      animation: refreshRotate 0.8s linear infinite;
    }

    @keyframes refreshRotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @media (max-width: 900px) {
      body {
        padding: 12px;
      }

      .card {
        padding: 14px;
      }

      .device-card {
        grid-template-columns: 96px minmax(0, 1fr);
        gap: 12px;
        align-items: start;
      }

      .device-img {
        width: 96px;
        height: 80px;
      }

      .device-info {
        grid-template-columns: 1fr;
        gap: 5px;
        font-size: 13px;
      }

      .device-actions {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 520px) {
      body {
        padding: 10px 8px;
      }

      .card {
        border-radius: 10px;
        padding: 12px;
      }

      .card-title {
        margin-bottom: 12px;
        padding-bottom: 12px;
        font-size: 18px;
      }

      .device-card {
        grid-template-columns: 82px minmax(0, 1fr);
        gap: 10px;
        padding: 10px;
      }

      .device-img {
        width: 82px;
        height: 72px;
        object-fit: cover;
      }

      .device-name-row {
        gap: 6px;
      }

      .device-info .device-name {
        font-size: 15px;
      }

      .status-tag {
        height: 20px;
        padding: 0 7px;
        font-size: 11px;
        line-height: 20px;
      }

      .modify-btn {
        height: 36px;
        font-size: 13px;
      }

      .float-refresh-btn {
        right: 16px;
        bottom: 18px;
        width: 42px;
        height: 42px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <div class="card-title">设备管理</div>
      <div id="device-list">
        <!-- 设备信息将动态加载 -->
      </div>
      <div id="loading" class="loading" style="display: none;">正在加载...</div>
      <button class="float-refresh-btn" onclick="refreshDeviceList()" title="刷新">
          <i class="fas fa-sync-alt"></i>
      </button>
    </div>
  </div>

  <script>
    let currentPage = 1;
    const limit = 10;
    // 获取设备数据
    function loadDeviceData(page) {
      const url = `/api/vehicle/getVehicleList.php?page=${page}&limit=${limit}`;
      document.getElementById('loading').style.display  = 'block';

      fetch(url)
        .then(response => response.json())
        .then(data => {
          if (data.code  === 0 && data.data  && data.data.length  > 0) {
            displayDevices(data.data);
            currentPage++;
          } else {
            document.getElementById('loading').textContent  = '没有更多数据了';
          }
          document.getElementById('loading').style.display  = 'none';
        })
        .catch(error => {
          console.error(' 数据加载失败:', error);
          document.getElementById('loading').textContent  = '加载失败，请重试';
          setTimeout(() => {
            document.getElementById('loading').style.display  = 'none';
          }, 2000);
        });
    }

function getDeviceStatusTag(device) {
  const status = String(device.status || '').trim();

  // 在线：绿色
  if (status === '在线') {
    return {
      text: '在线',
      className: 'online'
    };
  }

  // 占有 / 占用：橙色
  if (status === '占有' || status === '占用') {
    return {
      text: '占有',
      className: 'busy'
    };
  }

  // 离线：红色
  return {
    text: '离线',
    className: 'offline'
  };
}
    // 显示设备信息
    function displayDevices(devices) {
      const deviceList = document.getElementById('device-list');
      devices.forEach(device  => {
          const statusTag = getDeviceStatusTag(device);
        // 将设备对象转为 JSON 字符串，并存入 data-device 属性中
        const card = document.createElement('div');
        card.classList.add('device-card');
        card.setAttribute('data-device',  JSON.stringify(device));
        card.setAttribute('data-device-cfg',  JSON.stringify(device));
        card.innerHTML = `
  <img class="device-img" src="${device.photo_url}" alt="设备图片">
  <div class="device-info">
<div class="device-name-row">
  <span class="status-tag ${statusTag.className}">${statusTag.text}</span>
  <span class="device-name">${device.name}</span>
</div>
<span>序列号: ${device.serial_number}</span>

    <span>车辆状态: ${device.vehicle_status}</span>
    <span>共享状态: ${device.sharing_status}</span>
    <span>分享标题: ${device.share_name}</span>
    <span>前图传: ${device.image_device_serial}</span>
    ${device.bk_image_device_serial ? `<span>后图传: ${device.bk_image_device_serial}</span>` : ''}
  </div>
<div class="device-actions">
  <button class="modify-btn" onclick="modifyDevice(this)">修改信息</button>
  <button class="modify-btn" onclick="modifyDeviceCfg(this)">修改配置</button>
</div>
`;

        deviceList.appendChild(card);
      });
    }

   // 修改设备操作：将设备信息作为 URL 参数传递，然后跳转到修改页面
    function modifyDevice(button) {
      const card = button.closest('.device-card');
      const deviceData = card.getAttribute('data-device');
      const device = JSON.parse(deviceData);
      const queryString = Object.keys(device).map(key  => `${encodeURIComponent(key)}=${encodeURIComponent(device[key])}`).join('&');
      window.location.href  = `modify-device.html?${queryString}`;
    }

    function modifyDeviceCfg(button) {
      const card = button.closest('.device-card');
      const deviceDataCfg = card.getAttribute('data-device-cfg');
      const device = JSON.parse(deviceDataCfg);
      const queryString = Object.keys(device).map(key  => `${encodeURIComponent(key)}=${encodeURIComponent(device[key])}`).join('&');
      window.location.href  = `modify-deviceCfgTest_safe_submit.html?${queryString}`;
    }
 function refreshDeviceList() {
  const btn = document.querySelector('.float-refresh-btn');
  const deviceList = document.getElementById('device-list');
  const loading = document.getElementById('loading');

  if (btn) btn.classList.add('loading');

  currentPage = 1;
  deviceList.innerHTML = '';
  loading.textContent = '正在刷新...';
  loading.style.display = 'block';

  const url = `/api/vehicle/getVehicleList.php?page=${currentPage}&limit=${limit}`;

  fetch(url)
    .then(response => response.json())
    .then(data => {
      deviceList.innerHTML = '';

      if (data.code === 0 && data.data && data.data.length > 0) {
        displayDevices(data.data);
        currentPage = 2;
        loading.style.display = 'none';
      } else {
        loading.textContent = '暂无设备数据';
      }
    })
    .catch(error => {
      console.error('刷新失败:', error);
      loading.textContent = '刷新失败，请重试';
      setTimeout(() => {
        loading.style.display = 'none';
      }, 2000);
    })
    .finally(() => {
      if (btn) btn.classList.remove('loading');
    });
}
    // 自动加载下一页（滚动到底部时）

    // 页面加载时获取第一页数据
    loadDeviceData(currentPage);
  </script>
</body>

</html>
