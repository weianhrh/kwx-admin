<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>摄像头测试</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
:root {
  --bg: #f4f7f8;
  --panel: #ffffff;
  --text: #172126;
  --muted: #6b7d84;
  --subtle: #8aa0a8;
  --line: #dfe8eb;
  --line-strong: #c9d8dd;
  --primary: #0f8f8c;
  --primary-dark: #08706e;
  --primary-soft: #e6f6f5;
  --success: #20a876;
  --success-soft: #e8f7f1;
  --warning: #ffb84d;
  --warning-soft: #fff5df;
  --danger: #df5b57;
  --danger-soft: #ffefef;
  --blue: #2f7df6;
  --blue-soft: #eef5ff;
  --purple: #7c5cff;
  --purple-soft: #f0edff;
  --shadow: 0 12px 34px rgba(30, 55, 66, .08);
  --shadow-sm: 0 8px 22px rgba(30, 55, 66, .07);
  --radius: 8px;
  --transition: all .16s ease;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "HarmonyOS Sans SC", "Microsoft YaHei", Arial, sans-serif;
  -webkit-tap-highlight-color: transparent;
}

html,
body {
  width: 100%;
  min-height: 100%;
}

body {
  min-width: 320px;
  min-height: 100vh;
  padding: 26px 28px 34px;
  color: var(--text);
  background: var(--bg);
  overflow-x: hidden;
}

body > canvas {
  display: none !important;
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  user-select: none;
}

input,
select,
textarea {
  outline: none;
}

.box {
  width: min(100%, 620px);
  margin: 24px auto;
  padding: 22px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: #fff;
  box-shadow: var(--shadow);
}

h2 {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 0 0 8px;
  color: var(--text);
  font-size: 20px;
  line-height: 1.25;
  font-weight: 900;
}

h2::before {
  content: "";
  width: 8px;
  height: 20px;
  border-radius: 999px;
  background: var(--primary);
}

p {
  margin: 0 0 16px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.6;
  font-weight: 700;
}

button {
  min-height: 38px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0 16px;
  border: 1px solid var(--primary);
  border-radius: var(--radius);
  color: #fff;
  background: var(--primary);
  cursor: pointer;
  font-size: 13px;
  font-weight: 900;
  transition: border-color .16s ease, background .16s ease, box-shadow .16s ease, transform .16s ease;
}

button:hover {
  border-color: var(--primary-dark);
  background: var(--primary-dark);
  box-shadow: 0 8px 18px rgba(15, 143, 140, .16);
  transform: translateY(-1px);
}

video {
  width: 100%;
  max-height: 360px;
  margin-top: 16px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: #000;
}

pre {
  margin-top: 16px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  color: #d9e5e8;
  background: #132328;
  white-space: pre-wrap;
  word-break: break-all;
  font-size: 12px;
  line-height: 1.6;
}

@media (max-width: 760px) {
  body { padding: 12px; }
  .box { margin: 0 auto; padding: 16px; }
  button { width: 100%; }
}
</style>
</head>
<body>
<div class="box">
    <h2>摄像头权限测试</h2>
    <p>点击下面按钮，测试当前浏览器是否能正常打开摄像头。</p>

    <button onclick="testCamera()">测试摄像头</button>

    <video id="video" autoplay playsinline muted></video>
    <pre id="log"></pre>
</div>

<script>
function log(data) {
    document.getElementById('log').textContent +=
        '[' + new Date().toLocaleTimeString() + '] ' +
        (typeof data === 'string' ? data : JSON.stringify(data, null, 2)) +
        '\n\n';
}

async function testCamera() {
    const video = document.getElementById('video');

    log({
        href: location.href,
        ua: navigator.userAgent,
        isSecureContext: window.isSecureContext,
        hasMediaDevices: !!navigator.mediaDevices,
        hasGetUserMedia: !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia)
    });

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        log('当前浏览器不支持 getUserMedia');
        return;
    }

    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: true,
            audio: false
        });

        video.srcObject = stream;

        const tracks = stream.getVideoTracks();
        log({
            status: 'success',
            tracks: tracks.map(t => ({
                label: t.label,
                enabled: t.enabled,
                readyState: t.readyState
            }))
        });
    } catch (e) {
        log({
            status: 'failed',
            name: e.name,
            message: e.message
        });
    }
}
</script>
</body>
</html>
