  <style>
    :root {
      --primary: #5b8cff;
      --secondary: #7f8fa4;
      --background-gradient-start: #f8f9ff;
      --background-gradient-end: #f0f3ff;
      --card-bg: #ffffff;
      --border-color: #ddd;
      --text-color: #333;
      --shadow: 0 4px 24px rgba(91, 140, 255, 0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "PingFang SC", system-ui;
    }

    body {
      background: linear-gradient(135deg, var(--background-gradient-start), var(--background-gradient-end));
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: var(--shadow);
      /*padding: 24px;*/
      margin-bottom: 30px;
    }

    .venue-card {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 16px;
      padding: 12px;
      border-bottom: 1px solid var(--border-color);
    }

    .venue-img {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      object-fit: cover;
      cursor: pointer;
    }

    .venue-info {
      flex: 1;
    }

    .venue-actions button {
      margin-right: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 24px;
    }

    th, td {
      padding: 12px;
      border: 1px solid var(--border-color);
      text-align: left;
      font-size: 14px;
      color: var(--text-color);
    }

    th {
      background-color: #f0f3ff;
      font-weight: 600;
    }

    th[data-hide="true"], td[data-hide="true"] {
      display: none;
    }

    button {
      padding: 6px 12px;
      border: none;
      background: var(--primary);
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
    }

    button.danger {
      background-color: #e74c3c;
    }

    .textarea-box {
      margin-top: 10px;
    }

    textarea {
      width: 100%;
      padding: 8px;
      font-size: 14px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      resize: vertical;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: var(--secondary);
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0,0,0,0.8);
    }

    .modal-content {
      display: block;

      max-width: 80%;
      border-radius: 12px;
    }

  <script>
    async function loadList() {
  const res = await fetch("/api/venue/get_audit_list.php");
  const result = await res.json();
  const list = result.data?.name_list || [];

  const container = document.getElementById("audit-list-card");
  container.innerHTML = "";
  container.style.display = list.length ? "block" : "none";

  list.forEach(item => {
    const time = new Date(item.timestamp * 1000).toLocaleString();
    const card = document.createElement("div");
    card.className = "venue-card";
    card.innerHTML = `
      <div class="venue-info">
        <span class="venue-name">场地名称：${item.venue_name}</span>
        <span>场地ID: ${item.venue_id}</span>
        <span>提交时间: ${time}</span>
      </div>
      <div class="venue-actions">
        <button class="edit-btn" onclick="approve(${item.venue_id})">通过</button>
        <button class="edit-btn danger" onclick="toggleReject(${item.venue_id})">拒绝</button>
      </div>
      <div class="textarea-box" id="reject-box-${item.venue_id}" style="display:none;">
        <textarea id="reason-${item.venue_id}" rows="2" placeholder="请输入拒绝理由">内容不适宜</textarea>
        <button class="danger" onclick="reject(${item.venue_id})" style="margin-top:8px;">确认拒绝</button>
      </div>
    `;
    container.appendChild(card);
  });

  markAuditLoaded('name');
}

    async function loadDeviceList() {
  const res = await fetch("/api/venue/getPendingVehicleNameAudits.php");
  const result = await res.json();
  const list = result.data || [];

  const container = document.getElementById("device-audit-list-card");
  container.innerHTML = "";
  container.style.display = list.length ? "block" : "none";

  list.forEach(item => {
    const time = new Date(item.timestamp * 1000).toLocaleString();
    const fieldText = item.field === 'name' ? '设备名称' : '分享名称';

    const card = document.createElement("div");
    card.className = "venue-card";
    card.innerHTML = `
      <div class="venue-info">
        <span class="venue-name">${fieldText}：${item.new}</span>
        <span>设备ID: ${item.device_id}</span>
        <span>提交时间: ${time}</span>
      </div>
      <div class="venue-actions">
        <button class="edit-btn" onclick="approveDevice('${item.device_id}', '${item.field}')">通过</button>
        <button class="edit-btn danger" onclick="toggleRejectDevice('${item.device_id}', '${item.field}')">拒绝</button>
      </div>
      <div class="textarea-box" id="reject-box-${item.device_id}-${item.field}" style="display:none;">
        <textarea id="reason-${item.device_id}-${item.field}" rows="2" placeholder="请输入拒绝理由">内容不适宜</textarea>
        <button class="danger" onclick="rejectDevice('${item.device_id}', '${item.field}')" style="margin-top:8px;">确认拒绝</button>
      </div>
    `;
    container.appendChild(card);
  });

  markAuditLoaded('device');
}

    async function approve(id) {
      await fetch("/api/venue/review_venue_name.php", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ venue_id: id, action: "approve" })
      });
      alert("已通过");
      loadList();
    }

    async function reject(id) {
      const reason = document.getElementById(`reason-${id}`).value.trim();
      if (!reason) return alert("请输入拒绝理由");

      await fetch("/api/venue/review_venue_name.php", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ venue_id: id, action: "reject", reason })
      });
      alert("已拒绝");
      loadList();
    }

    function toggleReject(id) {
      const box = document.getElementById(`reject-box-${id}`);
      box.style.display = box.style.display === "none" ? "block" : "none";
    }

    async function approveDevice(id, field) {
      await fetch("/api/venue/reviewVehicleNameAudit.php", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ device_id: id, field, action: "approve" })
      });
      alert("设备审核通过");
      loadDeviceList();
    }

    async function rejectDevice(id, field) {
      const reason = document.getElementById(`reason-${id}-${field}`).value.trim();
      if (!reason) return alert("请输入拒绝理由");

      await fetch("/api/venue/reviewVehicleNameAudit.php", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ device_id: id, field, action: "reject", reason })
      });
      alert("设备已拒绝");
      loadDeviceList();
    }

    function toggleRejectDevice(id, field) {
      const box = document.getElementById(`reject-box-${id}-${field}`);
      box.style.display = box.style.display === "none" ? "block" : "none";
    }

    async function approveDesc(id) {
      await fetch("/api/venue/review_venue_description.php", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ venue_id: id, action: "approve" })
      });
      alert("描述审核通过");
      loadDescList();
    }

    async function rejectDesc(id) {
      const reason = document.getElementById(`reason-desc-${id}`).value.trim();
      if (!reason) return alert("请输入拒绝理由");

      await fetch("/api/venue/review_venue_description.php", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ venue_id: id, action: "reject", reason })
      });
      alert("描述已拒绝");
      loadDescList();
    }

    function toggleRejectDesc(id) {
      const box = document.getElementById(`reject-desc-box-${id}`);
      box.style.display = box.style.display === "none" ? "block" : "none";
    }

    const auditLoadState = {
      image: false,
      name: false,
      desc: false,
      device: false
    };

    function countTextAuditCards() {
      return document.querySelectorAll(
        '#audit-list-card .venue-card, #desc-audit-list-card .venue-card, #device-audit-list-card .venue-card'
      ).length;
    }

    function countAllAuditCards() {
      return document.querySelectorAll(
        '#image-list .venue-card, #audit-list-card .venue-card, #desc-audit-list-card .venue-card, #device-audit-list-card .venue-card'
      ).length;
    }

    function updateGlobalAuditState() {
      const loading = document.getElementById('loading');
      if (!loading) return;

      const allLoaded = Object.keys(auditLoadState).every(function(key) {
        return auditLoadState[key];
      });

      if (!allLoaded) {
        loading.style.display = 'block';
        loading.innerText = '正在加载审核内容...';
        return;
      }

      const total = countAllAuditCards();
      loading.style.display = total > 0 ? 'none' : 'block';
      loading.innerText = total > 0 ? '' : '暂无待审核内容';

      notifyTextCount();
      notifyParentCount();
    }

    function markAuditLoaded(type) {
      auditLoadState[type] = true;
      updateGlobalAuditState();
    }

    function notifyTextCount() {
      window.parent.postMessage({ type: 'text-card-count', count: countTextAuditCards() }, '*');
    }

    loadList();
    loadDeviceList();
    loadDescList();
  </script>
<script>

// 同一份页面同时运行在 KWX 原后台和 RC 聚合审核代理中。
// /__kwx_app/ 只存在于 audit-kwx.rcwulian.cn，KWX 原后台必须使用真实上传域名。
const IS_RC_REVIEW_PROXY = window.location.hostname === 'audit-kwx.rcwulian.cn';
const PROFILE_UPLOAD_URL = IS_RC_REVIEW_PROXY
    ? '/__kwx_app/app/img/userimg/upload_profile.php'
    : 'https://app.kwxapp.cn/app/img/userimg/upload_profile.php';

function resolvePendingImageUrl(value) {
    const url = String(value || '').trim();
    if (!url) return '';
    if (/^https?:\/\//i.test(url) || url.startsWith('/')) return url;
    return '/api/venue/' + url.replace(/^\.\//, '');
}

function escapeHtmlAttribute(value) {
    return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
}

async function readJsonResponse(response, actionName) {
    const responseText = (await response.text()).replace(/^\uFEFF/, '').trim();
    let data;

    try {
        data = JSON.parse(responseText);
    } catch (error) {
        // 兼容少量旧 PHP 接口把 Warning/Notice 输出在 JSON 前面的情况。
        // 只接受 application/json，且前缀必须完全由标准 PHP 非致命警告组成；
        // Fatal error、404 HTML 和 JSON 后带杂质仍会按异常处理。
        const contentType = response.headers.get('content-type') || '';
        const warningLinePattern = /^(?:PHP\s+)?(?:Warning|Notice|Deprecated|Strict Standards)\s*:\s*[\s\S]+\bin\s*[\s\S]+\bon line\s+\d+\s*$/i;

        if (/application\/(?:[\w.+-]+\+)?json\b/i.test(contentType)) {
            for (let index = responseText.lastIndexOf('{'); index > 0; index = responseText.lastIndexOf('{', index - 1)) {
                const prefix = responseText.slice(0, index)
                    .replace(/<br\s*\/?>/gi, '\n')
                    .replace(/<\/?b>/gi, '')
                    .trim();
                const candidate = responseText.slice(index).trim();
                const warningLines = prefix.split(/\r?\n/).map(line => line.trim()).filter(Boolean);

                if (!prefix || /<[^>]+>/.test(prefix) ||
                    !warningLines.length || !warningLines.every(line => warningLinePattern.test(line))) {
                    continue;
                }

                try {
                    const recovered = JSON.parse(candidate);
                    if (recovered && typeof recovered === 'object' && !Array.isArray(recovered)) {
                        console.warn(`${actionName}接口输出了 PHP 警告，已恢复 JSON；请检查服务器日志权限`);
                        data = recovered;
                        break;
                    }
                } catch (ignored) {
                    // 继续寻找下一个可能的 JSON 起点。
                }
            }
        }

        if (!data) {
            throw new Error(`${actionName}返回格式异常（HTTP ${response.status}）`);
        }
    }

    if (!response.ok) {
        throw new Error(data.msg || `${actionName}请求失败（HTTP ${response.status}）`);
    }

    return data;
}

function getPendingImageFilePath(imageUrl) {
    try {
        const pathname = new URL(imageUrl, window.location.origin).pathname;
        const marker = '/pending_images/';
        const markerIndex = pathname.indexOf(marker);
        if (markerIndex < 0) return '';

        const fileName = decodeURIComponent(pathname.slice(markerIndex + marker.length))
            .split('/')
            .filter(Boolean)
            .pop();
        return fileName ? `pending_images/${fileName}` : '';
    } catch (error) {
        return '';
    }
}

async function deletePendingReviewImage(venueId, imageUrl) {
    const filePath = getPendingImageFilePath(imageUrl);
    if (!filePath) {
        return { ok: false, msg: '未识别待审核图片文件名' };
    }

    const response = await fetch('/api/venue/deletePendingImage.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ venue_id: venueId, filename: filePath })
    });
    const data = await readJsonResponse(response, '清理待审核图片');
    return {
        ok: Number(data.code) === 0,
        msg: data.msg || '清理失败'
    };
}

        // 原页面会先请求项目中不存在的 upload.php，失败后图片列表不会加载。
        // 当前上传流程并不使用该 OSS 配置，因此直接加载待审核图片。
        window.addEventListener('load', loadPendingImages);

function loadPendingImages() {
    fetch('/api/venue/getPendingImages.php')
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById('image-list');
            const loading = document.getElementById('loading');
            loading.style.display = 'none';

            if (data.code === 0 && Array.isArray(data.data) && data.data.length > 0) {
                container.style.display = 'block';
                 data.data.sort((a, b) => new Date(b.upload_time) - new Date(a.upload_time));
                data.data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'venue-card';
                    const imageUrl = resolvePendingImageUrl(item.image_url);
                    card.innerHTML = `
                    <img src="${escapeHtmlAttribute(imageUrl)}" class="venue-img" alt="待审核图片">
                        <div class="venue-info">
                            <span class="venue-name">${item.venue_name}</span>
                            <span>场地ID: ${item.id}</span>
                            <span>状态: ${item.image_status}</span>
                            <span>上传时间: ${item.upload_time}</span>
                        </div>
                        <div class="venue-actions">
                            <button class="edit-btn" onclick="approveImage(${item.id})">审核通过</button>
                            <button class="edit-btn" style="background-color:#f44336" onclick="rejectImage(${item.id})">拒绝</button>
                        </div>
                    `;

                    card.querySelector('.venue-img').addEventListener('click', () => showModal(imageUrl));

                    container.appendChild(card);
                });
                markAuditLoaded('image');
            } else {
                container.innerHTML = '';
                container.style.display = 'none';
                markAuditLoaded('image');
            }
        })
        .catch(error => {
            const loading = document.getElementById('loading');
            if (loading) loading.innerText = '加载失败';
            auditLoadState.image = true;
            updateGlobalAuditState();
            console.error('加载失败：', error);
        });
}

async function approveImage(venueId) {
    if (!confirm("确认通过该图片审核，并设为场地头像？")) return;

    const approveButton = document.querySelector(`.venue-card button[onclick="approveImage(${venueId})"]`);
    const card = approveButton && approveButton.closest('.venue-card');
    const image = card && card.querySelector('img');
    if (!approveButton || !card || !image) {
        alert('未找到待审核图片，请刷新页面后重试');
        return;
    }

    const imgUrl = image.currentSrc || image.getAttribute('src');
    approveButton.disabled = true;
    approveButton.textContent = '处理中...';

    try {
        const response = await fetch(imgUrl);
        if (!response.ok) {
            throw new Error(`读取待审核图片失败（HTTP ${response.status}）`);
        }
        const blob = await response.blob();

        if (blob.size < 100) {
            alert("图片太小或无效，上传中止");
            return;
        }

        const formData = new FormData();
        formData.append('file', blob, `venue_${venueId}.jpg`);
        formData.append('action', 'update_venue_pictrue');
        formData.append('venue_id', venueId);
        // 新审核流程由 reviewImage.php 统一写审核员、审核时间和图片锁。
        // 旧 upload_profile.php 不认识此参数时会自动忽略，部署顺序不受限制。
        formData.append('defer_review_status', '1');

        const uploadRes = await fetch(PROFILE_UPLOAD_URL, {
            method: 'POST',
            body: formData
        });

        const uploadData = await readJsonResponse(uploadRes, '场地头像上传');
        // 兼容上传接口的两种历史响应：{code:0,url:...} 或仅 {url:...}。
        const uploadedUrl = uploadData.image_url || uploadData.url ||
            (uploadData.data && (uploadData.data.image_url || uploadData.data.url)) || '';
        const uploadHasCode = Object.prototype.hasOwnProperty.call(uploadData, 'code');
        const uploadSucceeded = uploadHasCode ? Number(uploadData.code) === 0 : Boolean(uploadedUrl);

        if (uploadSucceeded) {
            // 同步把审核记录改为 approved。若上传接口不返回URL，后端会读取 venues.image_url。
            const reviewRes = await fetch('/api/venue/reviewImage.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ venue_id: venueId, oss_uploaded_url: uploadedUrl })
            });
            const reviewData = await readJsonResponse(reviewRes, '更新审核状态');
            if (Number(reviewData.code) !== 0) {
                throw new Error(reviewData.msg || '审核状态更新失败');
            }

            // 审核状态已经成功后再清理待审核文件；清理失败不再误报“审核失败”。
            let cleanupMessage = '';
            try {
                const cleanup = await deletePendingReviewImage(venueId, imgUrl);
                if (!cleanup.ok) cleanupMessage = `\n但待审核文件清理失败：${cleanup.msg}`;
            } catch (cleanupError) {
                cleanupMessage = `\n但待审核文件清理失败：${cleanupError.message}`;
                console.error('待审核图片清理异常：', cleanupError);
            }

            alert(`审核通过，头像已更新${cleanupMessage}`);

            location.reload();
        } else {
            throw new Error(uploadData.msg || '场地头像上传失败');
        }

    } catch (e) {
        console.error("上传异常：", e);
        alert("图片审核处理失败：" + (e.message || '请检查网络或服务器'));
    } finally {
        approveButton.disabled = false;
        approveButton.textContent = '审核通过';
    }
}

async function rejectImage(venueId) {
    const reason = prompt("请输入拒绝原因：", "内容不适宜");
    if (!reason) return;

    const rejectButton = document.querySelector(`.venue-card button[onclick="rejectImage(${venueId})"]`);
    const card = rejectButton && rejectButton.closest('.venue-card');
    const image = card && card.querySelector('img');
    if (!rejectButton || !card || !image) {
        alert('未找到待审核图片，请刷新页面后重试');
        return;
    }

    const imgUrl = image.currentSrc || image.getAttribute('src');
    rejectButton.disabled = true;
    rejectButton.textContent = '处理中...';

    try {
        const rejectRes = await fetch('/api/venue/rejectImage.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ venue_id: venueId, reason: reason })
        });
        const rejectData = await readJsonResponse(rejectRes, '拒绝图片审核');
        if (Number(rejectData.code) !== 0) {
            throw new Error(rejectData.msg || '拒绝审核失败');
        }

        // 只有数据库成功标记 rejected 后才允许删除待审核文件。
        let cleanupMessage = '';
        try {
            const cleanup = await deletePendingReviewImage(venueId, imgUrl);
            if (!cleanup.ok) cleanupMessage = `\n但待审核文件清理失败：${cleanup.msg}`;
        } catch (cleanupError) {
            cleanupMessage = `\n但待审核文件清理失败：${cleanupError.message}`;
            console.error('待审核图片清理异常：', cleanupError);
        }

        alert(`图片已驳回${cleanupMessage}`);
        location.reload();
    } catch (error) {
        console.error('拒绝图片审核失败：', error);
        alert('拒绝失败：' + (error.message || '请检查网络或服务器'));
    } finally {
        rejectButton.disabled = false;
        rejectButton.textContent = '拒绝';
    }
}
