<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>修改密码</title>
  <style>
    :root {
      --brand: #0f918d;
      --brand-dark: #08706d;
      --brand-soft: #e7f7f6;
      --ink: #15242c;
      --muted: #687c86;
      --line: #dbe7eb;
      --panel: #ffffff;
      --panel-soft: #f8fbfb;
      --page: #f3f7f8;
      --danger: #d94c4c;
      --shadow: 0 18px 42px rgba(31, 58, 68, .08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--page);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "HarmonyOS Sans SC", "Microsoft YaHei", Arial, sans-serif;
    }

    .page-shell {
      min-height: 100vh;
      padding: 0;
    }

    .password-panel {
      width: 100%;
      max-width: none;
      min-height: calc(100vh - 2px);
      margin: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .page-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 24px 26px;
      border-bottom: 1px solid var(--line);
    }

    .page-title h1 {
      position: relative;
      margin: 0;
      padding-left: 16px;
      font-size: 24px;
      line-height: 1.25;
      font-weight: 800;
    }

    .page-title h1::before {
      position: absolute;
      left: 0;
      top: 4px;
      width: 6px;
      height: 24px;
      border-radius: 999px;
      background: var(--brand);
      content: "";
    }

    .page-title p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .safe-badge {
      border-radius: 999px;
      padding: 8px 14px;
      color: var(--brand-dark);
      background: var(--brand-soft);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .password-body {
      display: grid;
      grid-template-columns: minmax(220px, 300px) 1fr;
      gap: 18px;
      padding: 22px 26px 28px;
      background: linear-gradient(180deg, #fff 0%, #f8fbfb 100%);
    }

    .hint-card,
    .form-card {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
    }

    .hint-card {
      padding: 22px;
    }

    .hint-icon {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, #15aaa5, #3563a8);
      box-shadow: 0 14px 26px rgba(15, 145, 141, .22);
    }

    .hint-icon svg {
      width: 28px;
      height: 28px;
    }

    .hint-card h2 {
      margin: 18px 0 8px;
      font-size: 20px;
    }

    .hint-card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }

    .rule-list {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .rule-list span {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      color: #49606a;
      background: var(--panel-soft);
      font-size: 13px;
      font-weight: 700;
    }

    .form-card {
      padding: 22px;
    }

    .section-title {
      margin: 0 0 18px;
      font-size: 18px;
      font-weight: 800;
    }

    .form-grid {
      display: grid;
      gap: 16px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      color: #49606a;
      font-size: 13px;
      font-weight: 800;
    }

    .field input {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      color: var(--ink);
      background: #fff;
      outline: 0;
      font-size: 14px;
    }

    .field input:focus {
      border-color: rgba(15, 145, 141, .5);
      box-shadow: 0 0 0 4px rgba(15, 145, 141, .1);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 22px;
    }

    .btn {
      min-height: 42px;
      border: 1px solid rgba(15, 145, 141, .24);
      border-radius: 8px;
      padding: 0 18px;
      color: var(--brand-dark);
      background: #effaf9;
      font-weight: 800;
      cursor: pointer;
    }

    .btn.primary {
      border-color: var(--brand);
      color: #fff;
      background: var(--brand);
    }

    .btn:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    .message {
      min-height: 22px;
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .message.error {
      color: var(--danger);
    }

    .message.success {
      color: var(--brand-dark);
    }

    @media (max-width: 760px) {
      .page-shell {
        padding: 14px;
      }

      .page-head,
      .password-body {
        grid-template-columns: 1fr;
        padding: 18px;
      }

      .actions {
        justify-content: stretch;
      }

      .btn {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <section class="password-panel">
      <header class="page-head">
        <div class="page-title">
          <h1>修改密码</h1>
          <p>修改当前后台账号登录密码，提交后请使用新密码登录。</p>
        </div>
        <div class="safe-badge" id="statusBadge">待填写</div>
      </header>

      <div class="password-body">
        <aside class="hint-card">
          <div class="hint-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect width="18" height="11" x="3" y="11" rx="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
          </div>
          <h2>安全提示</h2>
          <p>旧密码验证通过后才会更新密码。新密码建议避免和其它平台重复。</p>
          <div class="rule-list">
            <span>长度 6 到 16 位</span>
            <span>不能包含空格</span>
            <span>两次新密码必须一致</span>
          </div>
        </aside>

        <section class="form-card">
          <h2 class="section-title">密码维护</h2>
          <form id="passwordForm" autocomplete="off">
            <div class="form-grid">
              <div class="field">
                <label for="oldPassword">当前密码</label>
                <input id="oldPassword" name="oldPassword" type="password" placeholder="请输入当前密码" required>
              </div>
              <div class="field">
                <label for="password">新密码</label>
                <input id="password" name="password" type="password" placeholder="请输入新密码" required>
              </div>
              <div class="field">
                <label for="repassword">确认新密码</label>
                <input id="repassword" name="repassword" type="password" placeholder="请再次输入新密码" required>
              </div>
            </div>

            <div class="actions">
              <button class="btn" type="reset" id="resetBtn">清空</button>
              <button class="btn primary" type="submit" id="submitBtn">确认修改</button>
            </div>
            <div class="message" id="message"></div>
          </form>
        </section>
      </div>
    </section>
  </main>

  <script>
    const form = document.getElementById('passwordForm');
    const submitBtn = document.getElementById('submitBtn');
    const resetBtn = document.getElementById('resetBtn');
    const messageEl = document.getElementById('message');
    const statusBadge = document.getElementById('statusBadge');
    const oldPasswordEl = document.getElementById('oldPassword');
    const passwordEl = document.getElementById('password');
    const repasswordEl = document.getElementById('repassword');

    function setMessage(text, type) {
      messageEl.textContent = text || '';
      messageEl.className = 'message' + (type ? ' ' + type : '');
    }

    function setBusy(busy) {
      submitBtn.disabled = busy;
      resetBtn.disabled = busy;
      statusBadge.textContent = busy ? '提交中' : '待填写';
    }

    function parseJsonResponse(response) {
      return response.text().then(function(text) {
        try {
          return JSON.parse(text);
        } catch (error) {
          throw new Error('接口返回不是 JSON：' + text.slice(0, 80));
        }
      });
    }

    function validatePassword(oldPassword, password, repassword) {
      if (!oldPassword || !password || !repassword) return '请完整填写密码信息。';
      if (!/^\S{6,16}$/.test(password)) return '新密码必须 6 到 16 位，且不能包含空格。';
      if (password !== repassword) return '两次新密码输入不一致。';
      if (oldPassword === password) return '新密码不能和当前密码相同。';
      return '';
    }

    form.addEventListener('submit', async function(event) {
      event.preventDefault();
      const oldPassword = oldPasswordEl.value.trim();
      const password = passwordEl.value.trim();
      const repassword = repasswordEl.value.trim();
      const error = validatePassword(oldPassword, password, repassword);

      if (error) {
        setMessage(error, 'error');
        return;
      }

      setBusy(true);
      setMessage('正在提交修改...');
      try {
        const body = new URLSearchParams();
        body.set('oldPassword', oldPassword);
        body.set('password', password);

        const result = await fetch('/api/login/updatepassword.php', {
          method: 'POST',
          credentials: 'same-origin',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'
          },
          body: body
        }).then(parseJsonResponse);

        if (result.code !== 0) throw new Error(result.msg || '修改失败');
        form.reset();
        statusBadge.textContent = '已修改';
        setMessage('密码修改成功。', 'success');
      } catch (error) {
        statusBadge.textContent = '修改失败';
        setMessage(error.message || '修改失败', 'error');
      } finally {
        submitBtn.disabled = false;
        resetBtn.disabled = false;
      }
    });

    form.addEventListener('reset', function() {
      setTimeout(function() {
        statusBadge.textContent = '待填写';
        setMessage('');
      }, 0);
    });
  </script>
</body>
</html>
