<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>退款记录</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>

    :root {
      --page-bg: #f4f7f8;
      --panel: #ffffff;
      --text: #172126;
      --muted: #6b7d84;
      --subtle: #8aa0a8;
      --line: #dfe8eb;
      --line-strong: #c9d8dd;
      --primary: #0f8f8c;
      --primary-dark: #08706e;
      --primary-soft: #e6f6f5;
      --warning: #b7791f;
      --warning-soft: #fff7e6;
      --danger: #d64f4b;
      --danger-soft: #fff0ef;
      --success: #1f9d70;
      --success-soft: #e8f7f1;
      --shadow: 0 12px 34px rgba(30, 55, 66, .08);
      --shadow-sm: 0 8px 22px rgba(30, 55, 66, .06);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "HarmonyOS Sans SC", "Microsoft YaHei", Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
    }

    body {
      min-width: 320px;
      min-height: 100vh;
      padding: 24px 26px 32px;
      color: var(--text);
      background: var(--page-bg);
      display: block;
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      user-select: none;
    }

    input {
      outline: none;
    }

    .container {
      width: 100%;
      max-width: 1380px;
      margin: 0 auto;
    }

    .card {
      width: 100%;
      min-height: calc(100vh - 56px);
      padding: 0 0 18px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: none;
    }

    .card:hover {
      box-shadow: var(--shadow);
    }

    .card-title {
      min-height: 70px;
      display: flex;
      align-items: center;
      margin: 0;
      padding: 20px 24px;
      border-bottom: 1px solid var(--line);
      color: var(--text);
      background: linear-gradient(135deg, rgba(15, 143, 140, .07), rgba(15, 143, 140, .02)), #fff;
      font-size: 22px;
      line-height: 1.2;
      font-weight: 900;
      text-align: left;
    }

    .card-title::before {
      content: "";
      width: 8px;
      height: 22px;
      margin-right: 12px;
      border-radius: 999px;
      background: var(--primary);
      flex: 0 0 auto;
    }

    .filters {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(180px, 260px) auto;
      gap: 10px;
      align-items: center;
      margin: 18px 20px 0;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fbfcfd;
    }

    .filters input {
      width: 100%;
      min-width: 0;
      height: 38px;
      padding: 0 12px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      color: var(--text);
      background: #fff;
      font-size: 13px;
      transition: border .16s ease, box-shadow .16s ease, background .16s ease;
    }

    .filters input::placeholder {
      color: var(--subtle);
    }

    .filters input:focus {
      border-color: rgba(15, 143, 140, .55);
      box-shadow: 0 0 0 4px rgba(15, 143, 140, .10);
    }

    .filters button,
    .pagination button {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--primary);
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
      transition: background .16s ease, border .16s ease, box-shadow .16s ease, transform .16s ease, opacity .16s ease;
    }

    .filters button {
      min-width: 92px;
      padding: 0 18px;
    }

    .filters button:hover,
    .pagination button:hover:not([disabled]) {
      border-color: var(--primary-dark);
      background: var(--primary-dark);
      box-shadow: 0 10px 24px rgba(15, 143, 140, .18);
      transform: translateY(-1px);
    }

    #list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(430px, 1fr));
      gap: 14px;
      padding: 18px 20px 4px;
    }

    .venue-card {
      position: relative;
      display: block;
      min-width: 0;
      margin: 0;
      padding: 16px 16px 16px 18px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      box-shadow: var(--shadow-sm);
      transition: border .16s ease, box-shadow .16s ease, transform .16s ease;
      overflow: hidden;
    }

    .venue-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 3px;
      background: var(--primary);
      opacity: .86;
    }

    .venue-card:hover {
      background: #fff;
      border-color: rgba(15, 143, 140, .28);
      box-shadow: 0 14px 30px rgba(30, 55, 66, .10);
      transform: translateY(-1px);
    }

    .venue-info {
      min-width: 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
      word-break: break-word;
    }

    .venue-info span {
      min-width: 0;
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 9px 10px;
      border: 1px solid #edf2f4;
      border-radius: 8px;
      background: #fbfcfd;
      color: #4e646d;
    }

    .venue-info span b {
      color: #2d4148;
      font-weight: 900;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .venue-name {
      grid-column: 1 / -1;
      display: flex !important;
      align-items: center;
      min-height: 38px;
      margin: 0;
      padding: 0 0 10px !important;
      border: 0 !important;
      border-bottom: 1px solid var(--line) !important;
      border-radius: 0 !important;
      background: transparent !important;
      color: var(--text) !important;
      font-size: 16px;
      line-height: 1.25;
      font-weight: 900;
    }

    .venue-name::before {
      content: "场地";
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 24px;
      margin-right: 8px;
      padding: 0 9px;
      border-radius: 999px;
      color: var(--primary);
      background: var(--primary-soft);
      font-size: 12px;
      font-weight: 900;
      flex: 0 0 auto;
    }

    .loading {
      grid-column: 1 / -1;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      border: 1px dashed var(--line-strong);
      border-radius: 10px;
      color: var(--muted);
      background: #fbfcfd;
      font-size: 14px;
      font-weight: 800;
      text-align: center;
    }

    .deduct-badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      line-height: 1;
      white-space: nowrap;
    }

    .deduct-wait {
      color: var(--warning);
      background: var(--warning-soft);
      border: 1px solid rgba(183, 121, 31, .22);
    }

    .deduct-done {
      color: var(--danger);
      background: var(--danger-soft);
      border: 1px solid rgba(214, 79, 75, .24);
    }

    .pagination {
      display: flex !important;
      align-items: center !important;
      justify-content: flex-end !important;
      gap: 8px !important;
      margin: 12px 20px 0 !important;
      padding: 12px 0 0 !important;
      border-top: 1px solid var(--line);
    }

    .pagination button {
      min-width: 82px;
      padding: 0 14px;
    }

    .pagination button[disabled] {
      opacity: .45;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    #pageInfo {
      align-self: center !important;
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
      border-radius: 999px;
      color: var(--muted);
      background: #f7fafb;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    @media (max-width: 920px) {
      body {
        padding: 14px 10px 22px;
      }

      .card {
        min-height: calc(100vh - 28px);
      }

      .card-title {
        min-height: 60px;
        padding: 16px 14px;
        font-size: 20px;
      }

      .filters {
        grid-template-columns: 1fr;
        margin: 14px 12px 0;
        padding: 12px;
      }

      .filters input,
      .filters button {
        width: 100%;
      }

      #list {
        grid-template-columns: 1fr;
        padding: 14px 12px 4px;
      }

      .venue-card {
        padding: 14px 14px 14px 16px;
      }

      .venue-info {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .pagination {
        justify-content: center !important;
        flex-wrap: wrap;
        margin: 10px 12px 0 !important;
      }
    }

    @media (max-width: 520px) {
      .venue-info span {
        display: block;
      }

      .venue-info span b {
        display: inline-block;
        margin-right: 4px;
      }

      .pagination button,
      #pageInfo {
        width: 100%;
      }
    }

  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="card-title">退款记录</div>

      <!-- 筛选：只有订单号/UID -->
      <div class="filters">
        <input type="text" id="f_order" placeholder="订单号" />
        <input type="text" id="f_uid" placeholder="用户ID" />
        <button id="btnSearch">查询</button>
      </div>

      <!-- 列表 -->
      <div id="list"></div>

      <!-- 分页 -->
      <div class="pagination">
        <button id="prev">上一页</button>
        <span id="pageInfo" style="align-self:center;"></span>
        <button id="next">下一页</button>
      </div>
    </div>
  </div>

  <script>
    let page = 1, pageSize = 10, total = 0;

    // 固定仅查询“已退款” => 后端状态为 applied
    function buildQuery(){
      const order = document.getElementById('f_order').value.trim();
      const uid   = document.getElementById('f_uid').value.trim();
      const p = new URLSearchParams();
      p.set('page', page);
      p.set('page_size', pageSize);
      if(order) p.set('order_number', order);
      if(uid)   p.set('uid', uid);
      p.set('status', 'applied');  // 只查已退款
      return p.toString();
    }

    async function loadData(){
      const list = document.getElementById('list');
      list.innerHTML = '<div class="loading">加载中...</div>';
      try{
        const resp = await fetch('/api/finance/getRefundRecords.php?' + buildQuery(), {credentials:'include'});
        const data = await resp.json();
        if(data.code !== 0){
          list.innerHTML = `<div class="loading">${data.msg || '加载失败'}</div>`;
          document.getElementById('pageInfo').textContent = '';
          return;
        }
        total = data.count || 0;
        renderList(data.data || []);
        renderPager();
      }catch(e){
        console.error(e);
        list.innerHTML = '<div class="loading">网络异常</div>';
        document.getElementById('pageInfo').textContent = '';
      }
    }

    function renderList(rows){
      const list = document.getElementById('list');
      if(!rows.length){ list.innerHTML = '<div class="loading">暂无数据</div>'; return; }
      list.innerHTML = '';

      rows.forEach(r=>{
        const card = document.createElement('div');
        card.className = 'venue-card';

        const amountText = (r.refund_amount == null || r.refund_amount === '')
          ? '—' : ('¥ ' + Number(r.refund_amount).toFixed(2));

        const reasonText = r.reason ? escapeHtml(r.reason) : '无';

        card.innerHTML = `
          <div class="venue-info">
            <div class="venue-name">${r.venue_name || '未知场地'}</div>
            <span><b>订单：</b>${r.order_id || '—'}</span>
            <span><b>用户ID：</b>${r.uid ?? '—'}</span>
            <span><b>金额：</b>${amountText}</span>
            <span><b>状态：</b>${getReducedBadge(r.is_reduced)}</span>
            <span style="grid-column:1/-1;"><b>原因：</b>${reasonText}</span>
            <span><b>退款人：</b>${r.applicant_admin_uid ?? '—'}</span>
            <span><b>时间：</b>${r.created_at || '—'}</span>
          </div>
        `;
        list.appendChild(card);
      });
    }

    function renderPager(){
      const pageInfo = document.getElementById('pageInfo');
      const totalPages = Math.max(1, Math.ceil(total / pageSize));
      pageInfo.textContent = `第 ${page} / ${totalPages} 页，共 ${total} 条`;
      document.getElementById('prev').disabled = page <= 1;
      document.getElementById('next').disabled = page >= totalPages;
    }

    // 简单转义，防止原因里含HTML破版
    function escapeHtml(str){
      return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#039;');
    }
   function getReducedBadge(isReduced){
     const val = Number(isReduced);
   
     if(val === 1){
       return '<span class="deduct-badge deduct-done">已退款扣减</span>';
     }
   
     return '<span class="deduct-badge deduct-wait">待退款扣减</span>';
   }
    // 事件
    document.getElementById('btnSearch').addEventListener('click', ()=>{ page = 1; loadData(); });
    document.getElementById('prev').addEventListener('click', ()=>{ if(page>1){ page--; loadData(); } });
    document.getElementById('next').addEventListener('click', ()=>{ page++; loadData(); });

    // 首次加载
    loadData();
  </script>
</body>
</html>
