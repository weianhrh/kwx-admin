<!DOCTYPE html>
<html lang="zh-CN">
<!--res/views/venues/AdminDrivingOrders.html-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>驾驶记录查询</title>
    <!-- 引入Font Awesome图标库 -->
    <link rel="stylesheet" href="/res/fa/css/all.min.css">

<style>
:root {
  --bg: #f4f7f8;
  --panel: #ffffff;
  --text: #172126;
  --muted: #6b7d84;
  --subtle: #8aa0a8;
  --line: #dfe8eb;
  --line-strong: #c9d8dd;
  --primary: #0f8f8c;
  --primary-dark: #08706e;
  --primary-soft: #e6f6f5;
  --success: #20a876;
  --success-soft: #e8f7f1;
  --warning: #ffb84d;
  --warning-soft: #fff5df;
  --danger: #df5b57;
  --danger-soft: #ffefef;
  --blue: #2f7df6;
  --blue-soft: #eef5ff;
  --purple: #7c5cff;
  --purple-soft: #f0edff;
  --shadow: 0 12px 34px rgba(30, 55, 66, .08);
  --shadow-sm: 0 8px 22px rgba(30, 55, 66, .07);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "HarmonyOS Sans SC", "Microsoft YaHei", Arial, sans-serif;
  -webkit-tap-highlight-color: transparent;
}

html,
body {
  width: 100%;
  min-height: 100%;
}

body {
  min-width: 320px;
  min-height: 100vh;
  padding: 26px 28px 34px;
  color: var(--text);
  background: var(--bg);
  overflow-x: hidden;
}

body > canvas {
  display: none !important;
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  user-select: none;
}

input,
select,
textarea {
  outline: none;
}

.dashboard-card {
  width: 100%;
  max-width: none;
  margin: 0 auto;
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  box-shadow: var(--shadow);
}

.card-title {
  min-height: 58px;
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 0;
  padding: 0 18px;
  border-bottom: 1px solid var(--line);
  color: var(--text);
  background: var(--panel);
  font-size: 20px;
  line-height: 1.2;
  font-weight: 900;
  letter-spacing: .01em;
}

.card-title::before {
  content: "";
  width: 8px;
  height: 20px;
  border-radius: 999px;
  background: var(--primary);
  flex: 0 0 auto;
}

.summary-bar {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
  padding: 16px 18px 0;
}

.sum-pill {
  min-height: 54px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fbfcfd;
  cursor: pointer;
  transition: border-color .16s ease, box-shadow .16s ease, background .16s ease, transform .16s ease;
}

.sum-pill:hover,
.sum-pill.active {
  border-color: rgba(15, 143, 140, .36);
  background: var(--primary-soft);
  box-shadow: var(--shadow-sm);
  transform: translateY(-1px);
}

.sum-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: var(--primary);
  flex: 0 0 auto;
}

.sum-pill-green .sum-dot { background: var(--success); }
.sum-pill-orange .sum-dot { background: var(--warning); }

.sum-text {
  color: var(--muted);
  font-size: 13px;
  font-weight: 800;
}

.sum-strong {
  margin-left: auto;
  color: var(--text);
  font-size: 18px;
  font-weight: 900;
}

.form-container {
  display: grid;
  grid-template-columns: repeat(4, minmax(150px, 1fr));
  gap: 12px;
  align-items: end;
  padding: 18px;
  border-bottom: 1px solid var(--line);
  background: #fbfcfd;
}

.form-item {
  position: relative;
  min-width: 0;
  margin: 0;
}

.form-label {
  display: block;
  margin-bottom: 6px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.2;
  font-weight: 800;
}

.form-input,
.form-select {
  width: 100%;
  height: 38px;
  padding: 0 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--text);
  background: #fff;
  font-size: 13px;
  transition: border .16s ease, box-shadow .16s ease, background .16s ease;
}

.form-input::placeholder {
  color: #9aabb2;
}

.form-input:focus,
.form-select:focus {
  border-color: rgba(15, 143, 140, .48);
  box-shadow: 0 0 0 4px rgba(15, 143, 140, .10);
}

select.form-input,
.form-select {
  cursor: pointer;
}

.autocomplete-container {
  position: relative;
}

.suggestions-container,
.suggestions-list {
  position: absolute;
  left: 0;
  right: 0;
  top: calc(100% + 6px);
  z-index: 20;
  display: none;
  max-height: 240px;
  overflow-y: auto;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  box-shadow: var(--shadow-sm);
}

.suggestion-item {
  padding: 9px 12px;
  border-bottom: 1px solid #edf3f5;
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
}

.suggestion-item:last-child {
  border-bottom: 0;
}

.suggestion-item:hover {
  color: var(--primary-dark);
  background: var(--primary-soft);
}

.form-button {
  min-height: 38px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 0 15px;
  border: 1px solid var(--primary);
  border-radius: 8px;
  color: #fff;
  background: var(--primary);
  cursor: pointer;
  white-space: nowrap;
  font-size: 13px;
  line-height: 1;
  font-weight: 800;
  transition: border-color .16s ease, background .16s ease, color .16s ease, box-shadow .16s ease, transform .16s ease;
}

.form-button:hover:not(:disabled) {
  border-color: var(--primary-dark);
  background: var(--primary-dark);
  box-shadow: 0 8px 18px rgba(15, 143, 140, .16);
  transform: translateY(-1px);
}

.form-button:disabled {
  cursor: not-allowed;
  opacity: .55;
  transform: none;
  box-shadow: none;
}

.refund-btn {
  border-color: rgba(47, 125, 246, .22);
  color: var(--blue);
  background: var(--blue-soft);
}

.refund-btn:hover:not(:disabled) {
  border-color: var(--blue);
  color: #fff;
  background: var(--blue);
  box-shadow: 0 8px 18px rgba(47, 125, 246, .16);
}

.cancel-refund-btn {
  border-color: rgba(223, 91, 87, .35) !important;
  color: #fff;
  background: var(--danger) !important;
}

.lock-action-btn {
  border-color: rgba(255, 184, 77, .42);
  color: #a16000;
  background: var(--warning-soft);
}

.lock-action-btn:hover:not(:disabled) {
  border-color: var(--warning);
  color: #6b3f00;
  background: #ffe9b8;
  box-shadow: 0 8px 18px rgba(255, 184, 77, .16);
}

.unlock-action-btn {
  border-color: rgba(32, 168, 118, .30);
  color: var(--success);
  background: var(--success-soft);
}

.unlock-action-btn:hover:not(:disabled) {
  border-color: var(--success);
  color: #fff;
  background: var(--success);
  box-shadow: 0 8px 18px rgba(32, 168, 118, .16);
}

.cards-container {
  display: grid;
  gap: 12px;
  padding: 18px;
  background: var(--panel);
}

.order-card {
  position: relative;
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  box-shadow: var(--shadow-sm);
  transition: border-color .16s ease, box-shadow .16s ease, transform .16s ease;
}

.order-card:hover {
  border-color: var(--line-strong);
  box-shadow: 0 12px 28px rgba(30, 55, 66, .10);
  transform: translateY(-1px);
}

.order-head {
  display: grid;
  grid-template-columns: minmax(260px, 1.3fr) auto minmax(150px, auto) minmax(160px, auto);
  gap: 12px;
  align-items: center;
  padding: 14px 16px;
  border-bottom: 1px solid var(--line);
  background: #fbfcfd;
}

.order-no,
.order-money {
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-width: 0;
}

.order-no-label,
.order-money-label {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.2;
  font-weight: 800;
}

.order-no-value,
.order-money-value {
  color: var(--text);
  font-size: 16px;
  line-height: 1.3;
  font-weight: 900;
  word-break: break-all;
}

.order-money-value {
  color: var(--primary-dark);
}

.order-actions {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 8px;
  flex-wrap: wrap;
}

.order-body {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 0;
  padding: 4px 16px 14px;
}

.order-field,
.order-item {
  min-width: 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px dashed #e7eff2;
}

.order-field {
  flex-direction: column;
  justify-content: flex-start;
}

.order-field:nth-last-child(-n+4),
.order-item:last-child {
  border-bottom-color: transparent;
}

.field-label,
.item-label {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.2;
  font-weight: 800;
}

.field-value,
.item-value {
  color: var(--text);
  font-size: 13px;
  line-height: 1.5;
  font-weight: 700;
  word-break: break-all;
}

.money {
  color: var(--primary-dark);
  font-weight: 900;
}

.mono {
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
  font-size: 12px;
}

.status-badge,
.check-badge,
.lock-status-badge {
  min-height: 24px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0 9px;
  border-radius: 999px;
  border: 1px solid transparent;
  font-size: 12px;
  line-height: 1;
  font-weight: 900;
  white-space: nowrap;
}

.status-completed,
.status-success,
.check-badge.checked,
.lock-status-badge.normal {
  color: var(--success);
  background: var(--success-soft);
  border-color: rgba(32, 168, 118, .20);
}

.status-pending,
.status-wait,
.lock-status-badge.locked {
  color: #a16000;
  background: var(--warning-soft);
  border-color: rgba(255, 184, 77, .30);
}

.status-failed,
.status-cancel,
.check-badge.unchecked {
  color: var(--danger);
  background: var(--danger-soft);
  border-color: rgba(223, 91, 87, .22);
}

.refund-status-text {
  min-height: 24px;
  display: inline-flex;
  align-items: center;
  padding: 0 9px;
  border-radius: 999px;
  color: var(--danger);
  background: var(--danger-soft);
  font-size: 12px;
  font-weight: 900;
}

.refund-status-text.empty {
  color: var(--subtle);
  background: #f2f5f6;
}

.pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 0 18px 18px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 800;
}

#pageInfo,
.page-info {
  color: var(--muted);
  font-size: 13px;
  font-weight: 800;
}

.total-sum-card {
  margin: 18px 18px 0;
  padding: 16px 18px;
  border: 1px solid rgba(15, 143, 140, .22);
  border-radius: 8px;
  background: var(--primary-soft);
  box-shadow: var(--shadow-sm);
}

.total-sum-title {
  color: var(--primary-dark);
  font-size: 13px;
  font-weight: 900;
}

.total-sum-value {
  margin-top: 6px;
  color: var(--primary-dark);
  font-size: 28px;
  line-height: 1.1;
  font-weight: 900;
}

@media (max-width: 1180px) {
  .form-container {
    grid-template-columns: repeat(3, minmax(150px, 1fr));
  }
  .order-head {
    grid-template-columns: 1fr auto;
  }
  .order-money,
  .order-actions {
    grid-column: auto;
  }
  .order-body {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (max-width: 760px) {
  body {
    padding: 12px;
  }
  .dashboard-card {
    border-radius: 8px;
  }
  .card-title {
    min-height: 52px;
    padding: 0 14px;
    font-size: 18px;
  }
  .summary-bar,
  .form-container,
  .cards-container {
    padding: 12px;
  }
  .summary-bar,
  .form-container {
    grid-template-columns: 1fr;
  }
  .order-head,
  .order-body {
    grid-template-columns: 1fr;
  }
  .order-head {
    padding: 12px;
  }
  .order-actions {
    justify-content: flex-start;
  }
  .form-button {
    width: 100%;
  }
  .pagination {
    flex-wrap: wrap;
    padding: 0 12px 12px;
  }
}

<body>

    <div class="dashboard-card">
        <!--<h1 class="card-title">驾驶记录查询</h1>-->
        <h1 class="card-title" id="pageTitle">订单查询</h1>
        
        <div class="form-container">
            <div class="form-item">
                <label class="form-label">用户ID</label>
                <input type="text" id="uid" class="form-input" placeholder="请输入用户ID">
            </div>
<div class="form-item" id="venueFilterItem" hidden>
    <label class="form-label">场地</label>
    <select id="venue_id" class="form-input">
        <option value="">全部场地</option>
    </select>
</div>
            <div class="form-item">
                <label class="form-label">订单编号</label>
                <input type="text" id="orderNumber" class="form-input" placeholder="请输入订单编号">
                <div id="suggestions" class="suggestions-container"></div>
            </div>
            <div class="form-item">
                <label class="form-label">&nbsp;</label>
                <button onclick="searchOrders()" class="form-button">查询</button>
            </div>
        </div>

        <div class="cards-container" id="orderCardsContainer">
            <!-- 数据将通过 JavaScript 动态插入 -->
        </div>

        <!-- 添加分页控件 -->
        <div class="pagination">
            <button id="prevPage" class="form-button" style="margin-right: 10px;">上一页</button>
            <span id="pageInfo" style="margin: 0 10px;"></span>
            <button id="nextPage" class="form-button" style="margin-left: 10px;">下一页</button>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let pageSize = 5;
        let totalOrders = [];
        let totalCount = 0;
        let orderCache = []; // 用于缓存所有订单数据
let currentRoleId = 0;
let currentVenueId = 0;
const pageVenueId = new URLSearchParams(window.location.search).get('venue_id') || '';

function isPlatformAdmin() {
    return currentRoleId === 1 || currentRoleId === 2;
}

async function fetchCurrentUser() {
    try {
        const resp = await fetch('/api/operat/get_current_user.php', {
            credentials: 'include'
        });
        const json = await resp.json();

        if (json.code === 0 && json.data) {
            currentRoleId = Number(json.data.role_id || 0);
            currentVenueId = Number(json.data.venue_id || 0);
        }
    } catch (e) {
        console.error('获取当前用户失败：', e);
    }

    const venueFilterItem = document.getElementById('venueFilterItem');
    if (venueFilterItem) {
        venueFilterItem.hidden = !isPlatformAdmin();
    }

    if (isPlatformAdmin()) {
        loadVenues();
    }
}
 
        let hasMorePage = false;
        let orderAbortController = null;
        let orderLoading = false;
        
function searchOrders(resetPage = true) {
    if (resetPage) currentPage = 1;

    if (orderAbortController) {
        orderAbortController.abort();
    }

    orderAbortController = new AbortController();
    orderLoading = true;

    const uid = document.getElementById('uid').value.trim();
    const orderNumber = document.getElementById('orderNumber').value.trim();
    const orderType = 'drive';
    const venueSelectEl = document.getElementById('venue_id');
    const venueId = isPlatformAdmin() && venueSelectEl
    ? (venueSelectEl.value || pageVenueId)
    : pageVenueId;

    const params = new URLSearchParams();
    params.set('order_type', orderType);
    params.set('page', currentPage);
    params.set('page_size', pageSize);

    // 关键：告诉后端不要 COUNT 全量，只返回当前页和 has_more
    params.set('fast', '1');

    if (uid) {
        params.set('uid', uid);
    }

    if (orderNumber) {
        params.set('order_number', orderNumber);
    }

    if (venueId) {
        params.set('venue_id', venueId);
    }

    const url = '/api/finance/getDrivOrder.php?' + params.toString();

    document.getElementById('pageTitle').textContent = '订单查询';

    fetch(url, {
        credentials: 'include',
        signal: orderAbortController.signal
    })
        .then(async response => {
            const text = await response.text();

            try {
                return JSON.parse(text);
            } catch (e) {
                console.error('接口返回的不是JSON，原始内容：', text);
                throw e;
            }
        })
        .then(data => {
            if (data.code === 0) {
                const list = Array.isArray(data.data) ? data.data : [];

                totalOrders = list.sort((a, b) => {
                    const bt = b.sort_time || b.start_time || b.send_time || '';
                    const at = a.sort_time || a.start_time || a.send_time || '';
                    return new Date(bt) - new Date(at);
                });

                hasMorePage = !!data.has_more;

                // fast 模式不需要真实总数，只用于前端页码展示兜底
                totalCount = (currentPage - 1) * pageSize + totalOrders.length + (hasMorePage ? 1 : 0);

                orderCache = totalOrders;

function updateRefundUI(btn, hasRefund) {
  const card = btn.closest('.order-card');

  btn.disabled = false;
  btn.classList.remove('refund-btn', 'cancel-refund-btn');
  btn.removeEventListener('click', onRefundClick);
  btn.removeEventListener('click', onCancelRefundClick);

  if (hasRefund) {
    btn.classList.add('cancel-refund-btn');
    btn.style.backgroundColor = '#ff4d4f';
    btn.textContent = '取消退款';
    btn.addEventListener('click', onCancelRefundClick);
  } else {
    btn.classList.add('refund-btn');
    btn.style.backgroundColor = '';
    btn.textContent = '退款';
    btn.addEventListener('click', onRefundClick);
  }

  const refundText = card ? card.querySelector('.refund-status-text') : null;
  if (refundText) {
    refundText.textContent = hasRefund ? '已记录退款' : '—';
    refundText.classList.toggle('empty', !hasRefund);
  }
}

function updateLockUI(btn, isLocked) {
  const card = btn.closest('.order-card');

  btn.disabled = false;
  btn.setAttribute('data-lock-status', isLocked ? '1' : '2');

  btn.classList.remove('lock-action-btn', 'unlock-action-btn');
  btn.classList.add(isLocked ? 'unlock-action-btn' : 'lock-action-btn');

  btn.textContent = isLocked ? '解锁' : '锁定';

  const lockText = card ? card.querySelector('.lock-status-text') : null;
  if (lockText) {
    lockText.className = 'lock-status-badge lock-status-text ' + (isLocked ? 'locked' : 'normal');
    lockText.textContent = isLocked ? '已锁定' : '未锁定';
  }
}
      async function onRefundClick(e) {
          const btn = e.currentTarget;
          const orderId = btn.getAttribute('data-order-id');
          const uid = parseInt(btn.getAttribute('data-uid'), 10);
          const rawAmt = (btn.getAttribute('data-amount') || '').trim();
          const refundAmount = rawAmt === '' ? null : Number(parseFloat(rawAmt).toFixed(2));
        
          const reason = prompt(`为订单【${orderId}】填写退款原因：`, '该订单存在问题已被平台退款');
          if (reason === null) return;
        
          const ok = confirm(`确认提交退款记录？\n订单：${orderId}\n金额：${refundAmount ?? '（未填写）'}\n原因：${reason.trim() || '（空）'}`);
          if (!ok) return;
        
          try {
            btn.disabled = true;
            btn.textContent = '提交中...';
        
            const resp = await fetch('/api/finance/addRefundRecord.php', {
              method: 'POST',
              headers: {'Content-Type':'application/json'},
              credentials: 'include',
              body: JSON.stringify({
                order_id: orderId,
                uid: uid,
                refund_amount: refundAmount,
                reason: reason && reason.trim() ? reason.trim() : null
              })
            });
            const data = await resp.json();
        
            if (data.code === 0) {
              alert('已记录退款');
            //   searchOrders(false);
             updateRefundUI(btn, true);
            } else if (data.code === 3001) {
              alert('该订单已推送过退款或写入失败');
            //   searchOrders(false);
             updateRefundUI(btn, true);
            } else if (data.code === 1001) {
              alert('请先登录后再操作');
              btn.textContent = '退款';
              btn.disabled = false;
            } else if (data.code === 1002) {
              alert('权限不足，无法退款');
              btn.textContent = '退款';
              btn.disabled = false;
            } else if (data.code === 2005) {
              alert('该订单已锁定，请先解锁后再退款');
              btn.textContent = '退款';
              btn.disabled = false;
            } else {
              alert(data.msg || '提交失败');
              btn.textContent = '退款';
              btn.disabled = false;
            }
                        
          } catch (err) {
            console.error(err);
            alert('网络异常，稍后再试');
            btn.textContent = '退款';
            btn.disabled = false;
          }
        }
async function onCancelRefundClick(e) {
  const btn = e.currentTarget;
  const orderId = btn.getAttribute('data-order-id');
  const uid = parseInt(btn.getAttribute('data-uid'), 10);

  const ok = confirm(`确认取消订单【${orderId}】的退款记录吗？\n取消后按钮会恢复为“退款”。`);
  if (!ok) return;

  try {
    btn.disabled = true;
    btn.textContent = '取消中...';

    const resp = await fetch('/api/finance/cancelRefundRecord.php', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      credentials: 'include',
      body: JSON.stringify({
        order_id: orderId,
        uid: uid
      })
    });

    const data = await resp.json();

    if (data.code === 0) {
      alert(data.msg || '已取消退款记录');

     updateRefundUI(btn, false);
    } else if (data.code === 1001) {
      alert('请先登录后再操作');

      btn.textContent = '取消退款';
    } else if (data.code === 2002) {
      alert('退款记录不存在或已取消');

     updateRefundUI(btn, false);
    } else {
      alert(data.msg || '取消退款失败');
      btn.disabled = false;
      btn.textContent = '取消退款';
    }

  } catch (err) {
    console.error(err);
    alert('网络异常，稍后再试');
    btn.disabled = false;
    btn.textContent = '取消退款';
  }
}

        function updateSuggestions(searchText) {
            const suggestionsDiv = document.getElementById('suggestions');
            suggestionsDiv.innerHTML = '';

            if (searchText.length < 3) {
                suggestionsDiv.style.display = 'none';
                return;
            }

            // 从缓存中筛选匹配的订单,使用模糊匹配
const matchedOrders = orderCache.filter(order => {
    return String(order.order_id || '').includes(searchText);
}).slice(0, 10);

            if (matchedOrders.length > 0) {
                matchedOrders.forEach(order => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    // 显示完整订单号,但高亮匹配部分
                    // const orderNumber = order.order_id;
                    const orderNumber = String(order.order_id || '');
                    const highlightedNumber = orderNumber.replace(
                        new RegExp(searchText, 'g'),
                        `<span style="color: var(--primary); font-weight: bold;">${searchText}</span>`
                    );
                    
                    div.innerHTML = highlightedNumber;
                    div.addEventListener('click', () => {
                        document.getElementById('orderNumber').value = order.order_id;
                        suggestionsDiv.style.display = 'none';
                        searchOrders();
                    });
                    suggestionsDiv.appendChild(div);
                });
                suggestionsDiv.style.display = 'block';
            } else {
                suggestionsDiv.style.display = 'none';
            }
        }

        // 修改订单号输入联想处理
        const orderInput = document.getElementById('orderNumber');
        const suggestionsDiv = document.getElementById('suggestions');

        let debounceTimer;
        orderInput.addEventListener('input', function(e) {
            const value = e.target.value.trim();
            
            clearTimeout(debounceTimer);
            
            debounceTimer = setTimeout(() => {
                updateSuggestions(value);
            }, 300);
        });

        // 点击外部时关闭建议列表
        document.addEventListener('click', function(e) {
            if (!orderInput.contains(e.target) && !suggestionsDiv.contains(e.target)) {
                suggestionsDiv.style.display = 'none';
            }
        });

        // 处理键盘导航
        orderInput.addEventListener('keydown', function(e) {
            const items = suggestionsDiv.getElementsByClassName('suggestion-item');
            let currentFocus = -1;

            if (e.key === 'ArrowDown') {
                currentFocus = Math.min(currentFocus + 1, items.length - 1);
                highlightItem(items, currentFocus);
            } else if (e.key === 'ArrowUp') {
                currentFocus = Math.max(currentFocus - 1, 0);
                highlightItem(items, currentFocus);
            } else if (e.key === 'Enter') {
                e.preventDefault(); // 防止表单提交
                if (items.length > 0) { // 如果有建议项
                    orderInput.value = items[0].textContent; // 选择第一条
                    suggestionsDiv.style.display = 'none';
                    searchOrders(); // 执行搜索
                }
            }
        });

        function highlightItem(items, index) {
            Array.from(items).forEach((item, idx) => {
                if (idx === index) {
                    item.style.backgroundColor = '#f0f3ff';
                } else {
                    item.style.backgroundColor = '';
                }
            });
        }
