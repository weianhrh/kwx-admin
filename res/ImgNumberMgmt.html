<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>批量上传图传序列号</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
:root {
  --bg: #f4f7f8;
  --panel: #ffffff;
  --text: #172126;
  --muted: #6b7d84;
  --subtle: #8aa0a8;
  --line: #dfe8eb;
  --line-strong: #c9d8dd;
  --primary: #0f8f8c;
  --primary-dark: #08706e;
  --primary-soft: #e6f6f5;
  --success: #20a876;
  --success-soft: #e8f7f1;
  --warning: #ffb84d;
  --warning-soft: #fff5df;
  --danger: #df5b57;
  --danger-soft: #ffefef;
  --blue: #2f7df6;
  --blue-soft: #eef5ff;
  --purple: #7c5cff;
  --purple-soft: #f0edff;
  --shadow: 0 12px 34px rgba(30, 55, 66, .08);
  --shadow-sm: 0 8px 22px rgba(30, 55, 66, .07);
  --radius: 8px;
  --transition: all .16s ease;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "HarmonyOS Sans SC", "Microsoft YaHei", Arial, sans-serif;
  -webkit-tap-highlight-color: transparent;
}

html,
body {
  width: 100%;
  min-height: 100%;
}

body {
  min-width: 320px;
  min-height: 100vh;
  padding: 26px 28px 34px;
  color: var(--text);
  background: var(--bg);
  overflow-x: hidden;
}

body > canvas {
  display: none !important;
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  user-select: none;
}

input,
select,
textarea {
  outline: none;
}

.container {
  width: 100%;
  max-width: none;
  margin: 0 auto;
}

.card {
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--panel);
  box-shadow: var(--shadow);
  margin-bottom: 18px;
  padding: 0;
}

.card:hover {
  box-shadow: var(--shadow);
}

.card-title-container {
  min-height: 58px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 12px 18px;
  border-bottom: 1px solid var(--line);
  background: #fff;
}

.card-title {
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--text);
  font-size: 20px;
  line-height: 1.2;
  font-weight: 900;
  letter-spacing: .01em;
  padding: 0;
  margin: 0;
  min-width: 0;
}

.card-title::before {
  content: "";
  width: 8px;
  height: 20px;
  border-radius: 999px;
  background: var(--primary);
  flex: 0 0 auto;
}

form,
.card > .form-group,
.card > form,
.output-container,
.query-result {
  padding: 18px;
}

.card > .form-group + .form-group,
form .form-group + .form-group {
  margin-top: 12px;
}

.form-group {
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 7px;
}

.form-group label {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.2;
  font-weight: 800;
}

.form-group input,
.form-group textarea,
.form-group select {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  color: var(--text);
  background: #fff;
  font-size: 13px;
  transition: border .16s ease, box-shadow .16s ease, background .16s ease;
}

.form-group input,
.form-group select {
  min-height: 38px;
  padding: 0 12px;
}

.form-group textarea {
  min-height: 160px;
  padding: 12px;
  resize: vertical;
  line-height: 1.6;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
}

.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus {
  border-color: rgba(15, 143, 140, .48);
  box-shadow: 0 0 0 4px rgba(15, 143, 140, .10);
}

.form-group select {
  cursor: pointer;
}

.action-button,
button.action-button {
  min-height: 38px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 0 16px;
  border: 1px solid var(--primary);
  border-radius: var(--radius);
  color: #fff;
  background: var(--primary);
  cursor: pointer;
  white-space: nowrap;
  font-size: 13px;
  line-height: 1;
  font-weight: 900;
  transition: border-color .16s ease, background .16s ease, box-shadow .16s ease, transform .16s ease;
}

.action-button:hover:not(:disabled) {
  border-color: var(--primary-dark);
  background: var(--primary-dark);
  box-shadow: 0 8px 18px rgba(15, 143, 140, .16);
  transform: translateY(-1px);
}

.action-button:disabled {
  cursor: not-allowed;
  opacity: .55;
  box-shadow: none;
  transform: none;
}

.query-result {
  padding-top: 0;
  color: var(--muted);
  font-size: 13px;
  font-weight: 700;
}

.query-result p {
  padding: 22px 16px;
  border: 1px dashed var(--line-strong);
  border-radius: var(--radius);
  background: #fbfcfd;
  text-align: center;
}

.result-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: #fff;
}

.result-table th,
.result-table td {
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
  color: var(--text);
  text-align: left;
  font-size: 13px;
  line-height: 1.45;
  word-break: break-all;
}

.result-table th {
  color: var(--muted);
  background: #fbfcfd;
  font-size: 12px;
  font-weight: 900;
}

.result-table tr:last-child td {
  border-bottom: 0;
}

.result-table tr:hover td {
  background: var(--primary-soft);
}

.output-container {
  border-top: 1px solid var(--line);
  background: #fff;
}

.output-container h3 {
  margin: 0 0 12px;
  color: var(--text);
  font-size: 15px;
  font-weight: 900;
}

pre {
  width: 100%;
  min-height: 110px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  color: #d9e5e8;
  background: #132328;
  overflow: auto;
  white-space: pre-wrap;
  word-break: break-all;
  font-size: 12px;
  line-height: 1.6;
}

.camera-card {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px 14px;
  margin-top: 12px;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: #fbfcfd;
  box-shadow: var(--shadow-sm);
  transition: border-color .16s ease, box-shadow .16s ease, transform .16s ease;
}

.camera-card:hover {
  border-color: var(--line-strong);
  box-shadow: 0 12px 28px rgba(30, 55, 66, .10);
  transform: translateY(-1px);
}

.camera-card div {
  min-width: 0;
  color: var(--text);
  font-size: 13px;
  line-height: 1.55;
  word-break: break-all;
}

.camera-card strong {
  color: var(--muted);
  font-size: 12px;
  font-weight: 900;
}

@media (max-width: 760px) {
  body {
    padding: 12px;
  }

  .card-title-container {
    min-height: auto;
    align-items: stretch;
    flex-direction: column;
    padding: 14px;
  }

  .card-title {
    font-size: 18px;
  }

  form,
  .card > .form-group,
  .card > form,
  .output-container,
  .query-result {
    padding: 12px;
  }

  .action-button,
  button.action-button {
    width: 100%;
  }

  .result-table {
    display: block;
    overflow-x: auto;
    white-space: nowrap;
  }

  .camera-card {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>
    <div class="container">
        <!-- 添加查询卡片 -->
        <div class="card">
            <div class="card-title-container">
                <h2 class="card-title">查询图传序列号</h2>
                <button onclick="queryData()" class="action-button">查询</button>
            </div>
            <div class="form-group">
                <label for="queryArea">选择区域</label>
                <select id="queryArea">
                    <option value="AA" selected>AA区</option>
                    <!-- 其他区域选项会通过JavaScript填充 -->
                </select>
            </div>
            <div class="form-group">
                <label for="queryGroup">选择组号</label>
                <select id="queryGroup">
                    <option value="1" selected>第1组</option>
                    <!-- 其他组号选项会通过JavaScript填充 -->
                </select>
            </div>
            <div id="queryResult" class="query-result">
                <!-- 查询结果将在这里显示 -->
            </div>
        </div>

        <!-- 原有的上传卡片 -->
        <div class="card">
            <div class="card-title-container">
                <h2 class="card-title">批量上传图传序列号</h2>
                <button type="submit" form="uploadForm" class="action-button">提交</button>
            </div>
            <form id="uploadForm">
                <div class="form-group">
                    <label for="image_device_serials">图传序列号（每行一个）</label>
                    <textarea id="image_device_serials" name="image_device_serials" rows="8" required></textarea>
                </div>
                <div class="form-group">
                    <label for="area">区域（AA-ZZ）</label>
                    <select id="area" name="area" required>
                        <option value="AA" selected>AA区</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="group">组号（1-9）</label>
                    <select id="group" name="group" required>
                        <option value="1" selected>第1组</option>
                    </select>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 填充区域选项
        const areaSelect = document.getElementById('area');
        for (let i = 65; i <= 90; i++) { // ASCII码 A-Z
            const letter = String.fromCharCode(i);
            const doubleLetter = letter + letter; // 创建双字母，如 AA, BB
            const option = document.createElement('option');
            option.value = doubleLetter;
            option.textContent = doubleLetter + '区';
            if (i !== 65) { // 跳过AA，因为已经默认添加
                areaSelect.appendChild(option);
            }
        }

        // 填充组号选项
        const groupSelect = document.getElementById('group');
        for (let i = 2; i <= 9; i++) { // 从2开始，因为1已经默认添加
            const option = document.createElement('option');
            option.value = i;
            option.textContent = `第${i}组`;
            groupSelect.appendChild(option);
        }

        // 表单提交处理
        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const formData = new FormData(this);

            // 检查必要参数
            const serialNumbers = document.getElementById('image_device_serials').value;
            const area = document.getElementById('area').value;
            const group = document.getElementById('group').value;

            if (!serialNumbers || !area || !group) {
                alert('请填写所有必要参数！');
                return;
            }

            // 发送请求
            fetch('/api/devMgr/UploadImgNumber.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                alert(data.msg);
                if (data.code === 200) {
                    // 提交成功后刷新页面
                    window.location.reload();
                }
            })
            .catch(error => {
                alert('请求发生错误：' + error.message);
            });
        });

        // 修改填充查询区域选项的代码
        const queryAreaSelect = document.getElementById('queryArea');
        for (let i = 65; i <= 90; i++) {
            const letter = String.fromCharCode(i);
            const doubleLetter = letter + letter;
            if (doubleLetter !== 'AA') { // 跳过AA，因为已经默认添加
                const option = document.createElement('option');
                option.value = doubleLetter;
                option.textContent = doubleLetter + '区';
                queryAreaSelect.appendChild(option);
            }
        }

        // 修改填充查询组号选项的代码
        const queryGroupSelect = document.getElementById('queryGroup');
        for (let i = 2; i <= 9; i++) { // 从2开始，因为1已经默认添加
            const option = document.createElement('option');
            option.value = i;
            option.textContent = `第${i}组`;
            queryGroupSelect.appendChild(option);
        }

        // // 页面加载完成后自动执行查询
        // window.addEventListener('load', function() {
        //     queryData();
        // });

        // 查询数据函数
        function queryData() {
            const area = document.getElementById('queryArea').value;
            const group = document.getElementById('queryGroup').value;
            
            const queryParams = new URLSearchParams();
            if (area) queryParams.append('area', area);
            if (group) queryParams.append('group', group);

            fetch(`/api/devMgr/QueryImgNumber.php?${queryParams.toString()}`)
                .then(response => response.json())
                .then(data => {
                    if (data.code === 200) {
                        displayResults(data.data);
                    } else {
                        alert(data.msg);
                    }
                })
                .catch(error => {
                    alert('查询失败：' + error.message);
                });
        }

        // 显示查询结果
        function displayResults(data) {
            const resultDiv = document.getElementById('queryResult');
            if (data.length === 0) {
                resultDiv.innerHTML = '<p>没有找到匹配的记录</p>';
                return;
            }

            let html = `
                <table class="result-table">
                    <thead>
                        <tr>
                            <th>序列号</th>
                            <th>区域</th>
                            <th>组号</th>
                            <th>创建时间</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            data.forEach(item => {
                html += `
                    <tr>
                        <td>${item.image_device_serial}</td>
                        <td>${item.area}</td>
                        <td>第${item.group_number}组</td>
                        <td>${item.created_at}</td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            resultDiv.innerHTML = html;
        }
    </script>
</body>

</html>
