<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>金币套餐管理</title>
  <style>
:root {
  --bg: #f4f7f8;
  --panel: #ffffff;
  --text: #172126;
  --muted: #6b7d84;
  --subtle: #8aa0a8;
  --line: #dfe8eb;
  --line-strong: #c9d8dd;
  --primary: #0f8f8c;
  --primary-dark: #08706e;
  --primary-soft: #e6f6f5;
  --warning: #ffb84d;
  --warning-soft: #fff5df;
  --success: #20a876;
  --success-soft: #e8f7f1;
  --danger: #df5b57;
  --danger-soft: #ffefef;
  --blue: #2f7df6;
  --blue-soft: #eef5ff;
  --shadow: 0 12px 34px rgba(30, 55, 66, .08);
  --shadow-sm: 0 8px 22px rgba(30, 55, 66, .07);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "HarmonyOS Sans SC", "Microsoft YaHei", Arial, sans-serif;
  -webkit-tap-highlight-color: transparent;
}

html,
body {
  width: 100%;
  min-height: 100%;
}

body {
  min-width: 320px;
  min-height: 100vh;
  padding: 26px 28px 34px;
  color: var(--text);
  background: var(--bg);
  overflow-x: hidden;
}

body > canvas {
  display: none !important;
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  user-select: none;
}

input,
select,
textarea {
  outline: none;
}


.wrap {
  width: 100%;
  max-width: none;
  margin: 0 auto;
}

.page-head {
  min-height: 58px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 18px;
  padding: 0 18px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  box-shadow: var(--shadow);
}

.page-title {
  margin: 0;
  color: var(--text);
  font-size: 20px;
  line-height: 1.2;
  font-weight: 900;
  letter-spacing: .01em;
}

.page-desc {
  margin: 6px 0 0;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.4;
}

.card {
  width: 100%;
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  box-shadow: var(--shadow);
  padding: 0;
}

.toolbar {
  min-height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 0 18px;
  border-bottom: 1px solid var(--line);
  background: #fff;
}

.toolbar-title {
  color: var(--text);
  font-size: 18px;
  line-height: 1.2;
  font-weight: 900;
}

.btn {
  min-width: 70px;
  height: 34px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 0 14px;
  border: 1px solid transparent;
  border-radius: 7px;
  cursor: pointer;
  font-size: 13px;
  line-height: 1;
  font-weight: 800;
  text-decoration: none;
  white-space: nowrap;
  transition: border-color .16s ease, background .16s ease, color .16s ease, box-shadow .16s ease;
}

.btn-primary {
  border-color: var(--primary);
  color: #fff;
  background: var(--primary);
}

.btn-primary:hover {
  border-color: var(--primary-dark);
  background: var(--primary-dark);
  box-shadow: 0 6px 16px rgba(15, 143, 140, .16);
}

.btn-gray {
  border-color: var(--line);
  color: var(--muted);
  background: #f7fafb;
}

.btn-gray:hover {
  border-color: var(--line-strong);
  color: var(--text);
  background: #eef4f6;
}

.btn-red {
  border-color: rgba(223, 91, 87, .2);
  color: var(--danger);
  background: var(--danger-soft);
}

.btn-red:hover {
  border-color: var(--danger);
  color: #fff;
  background: var(--danger);
}

.table-wrap {
  overflow: auto;
  background: #fff;
}

table {
  width: 100%;
  min-width: 1120px;
  border-collapse: separate;
  border-spacing: 0;
  table-layout: fixed;
  background: #fff;
}

thead th {
  padding: 13px 12px;
  border-bottom: 1px solid var(--line);
  color: var(--muted);
  background: #f7fafb;
  font-size: 13px;
  font-weight: 900;
  text-align: left;
  white-space: nowrap;
}

tbody td {
  padding: 14px 12px;
  border-bottom: 1px solid var(--line);
  color: var(--text);
  font-size: 13px;
  vertical-align: middle;
}

tbody tr:hover {
  background: #fbfdfd;
}

tbody tr:last-child td {
  border-bottom: none;
}

.empty-row {
  padding: 40px 12px;
  color: var(--muted);
  text-align: center;
}

.col-package { width: 28%; }
.col-platform { width: 16%; }
.col-gold { width: 13%; }
.col-price { width: 11%; }
.col-status { width: 10%; }
.col-time { width: 14%; }
.col-actions { width: 8%; }

.package-main {
  min-width: 0;
}

.package-name {
  margin-bottom: 4px;
  color: var(--text);
  font-size: 14px;
  line-height: 1.35;
  font-weight: 900;
}

.package-id {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.45;
  word-break: break-all;
}

.platform-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.platform-chip {
  min-width: 46px;
  height: 24px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0 8px;
  border: 1px solid var(--line-strong);
  border-radius: 999px;
  color: var(--primary);
  background: var(--primary-soft);
  font-size: 11px;
  font-weight: 900;
  white-space: nowrap;
}

.gold-box,
.price-box,
.time-box {
  line-height: 1.45;
}

.gold-main,
.price-main {
  color: var(--text);
  font-size: 14px;
  font-weight: 900;
}

.gold-sub,
.price-sub,
.time-sub {
  margin-top: 2px;
  color: var(--muted);
  font-size: 12px;
}

.time-main {
  color: #42555c;
  font-size: 12px;
}

.tag {
  min-width: 66px;
  height: 28px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0 10px;
  border-radius: 999px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 900;
  user-select: none;
  white-space: nowrap;
  transition: .16s ease;
}

.tag-on {
  color: var(--success);
  background: var(--success-soft);
}

.tag-off {
  color: var(--danger);
  background: var(--danger-soft);
}

.actions {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 8px;
}

.actions .btn {
  min-width: 56px;
  height: 31px;
  padding: 0 10px;
  border-radius: 7px;
  font-size: 12px;
}

.muted {
  color: var(--muted);
}

.modal-mask {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: rgba(16, 34, 38, .42);
}

.modal-mask.show {
  display: flex;
}

.modal {
  width: min(100%, 680px);
  max-height: calc(100vh - 40px);
  overflow: auto;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  box-shadow: 0 24px 60px rgba(16, 34, 38, .22);
}

.modal-head {
  position: sticky;
  top: 0;
  z-index: 2;
  min-height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 0 16px;
  border-bottom: 1px solid var(--line);
  background: #fff;
}

.modal-title {
  margin: 0;
  color: var(--text);
  font-size: 18px;
  font-weight: 900;
}

.modal-close {
  width: 30px;
  height: 30px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--line);
  border-radius: 50%;
  color: var(--muted);
  background: #f7fafb;
  cursor: pointer;
  font-size: 20px;
  font-weight: 700;
  line-height: 1;
}

.modal-close:hover {
  color: var(--danger);
  border-color: rgba(223, 91, 87, .24);
  background: var(--danger-soft);
}

.modal-body {
  padding: 16px;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.form-group {
  margin-bottom: 14px;
}

.form-label {
  display: block;
  margin-bottom: 7px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 800;
}

.form-control {
  width: 100%;
  height: 40px;
  padding: 0 11px;
  border: 1px solid var(--line-strong);
  border-radius: 7px;
  color: var(--text);
  background: #fff;
  font-size: 14px;
}

.form-control:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(15, 143, 140, .12);
}

.hint {
  margin-top: 6px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.45;
}

.platform-select {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.platform-select label {
  cursor: pointer;
}

.platform-select input {
  display: none;
}

.platform-select span {
  min-width: 78px;
  height: 38px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0 14px;
  border: 1px solid var(--line-strong);
  border-radius: 7px;
  color: var(--muted);
  background: #fff;
  font-size: 13px;
  font-weight: 800;
  transition: .16s ease;
}

.platform-select input:checked + span {
  border-color: var(--primary);
  color: var(--primary);
  background: var(--primary-soft);
  box-shadow: 0 0 0 3px rgba(15, 143, 140, .10);
}

.modal-foot {
  position: sticky;
  bottom: 0;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 10px;
  padding: 16px;
  border-top: 1px solid var(--line);
  background: #fbfdfd;
}

@media (max-width: 900px) {
  body { padding: 14px; }

  .wrap { max-width: 100%; }

  .page-head {
    min-height: auto;
    align-items: stretch;
    flex-direction: column;
    padding: 16px;
  }

  .page-head .btn { width: 100%; }

  .card { border-radius: 8px; }

  .toolbar {
    min-height: auto;
    align-items: stretch;
    flex-direction: column;
    padding: 14px;
  }

  .toolbar .btn { width: 100%; }

  .table-wrap {
    overflow: visible;
    background: transparent;
  }

  table {
    min-width: 100%;
  }

  thead { display: none; }

  tbody,
  tbody tr,
  tbody td {
    display: block;
  }

  tbody tr {
    margin: 0 12px 12px;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fff;
    box-shadow: 0 8px 22px rgba(30, 55, 66, .04);
  }

  tbody tr:first-child { margin-top: 12px; }

  tbody td {
    padding: 7px 0;
    border: none;
  }

  tbody td::before {
    content: attr(data-label);
    display: block;
    margin-bottom: 4px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 800;
  }

  .actions {
    flex-direction: row;
    gap: 10px;
    margin-top: 4px;
  }

  .actions .btn {
    flex: 1;
    min-width: 0;
    height: 36px;
  }

  .modal-mask {
    align-items: flex-end;
    padding: 0;
  }

  .modal {
    width: 100%;
    max-height: 92vh;
    border-radius: 8px 8px 0 0;
  }

  .form-row {
    grid-template-columns: 1fr;
    gap: 0;
  }

  .form-control {
    height: 44px;
    font-size: 16px;
  }

  .modal-foot .btn {
    flex: 1;
    height: 40px;
  }
}

@media (max-width: 520px) {
  body { padding: 10px; }

  .page-title { font-size: 19px; }

  .modal-body,
  .modal-foot {
    padding-left: 14px;
    padding-right: 14px;
  }

  .platform-select span {
    min-width: 72px;
    height: 38px;
  }
}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="page-head">
      <div>
        <h1 class="page-title">金币套餐管理</h1>
        <div class="page-desc">支持多平台套餐；展示页隐藏币种，编辑弹窗中仍可修改币种。</div>
      </div>
      <button class="btn btn-primary" type="button" id="btnAdd">+ 新增套餐</button>
    </div>

    <div class="card">
      <div class="toolbar">
        <div class="toolbar-title">套餐列表</div>
        <button class="btn btn-gray" type="button" id="btnRefresh">刷新列表</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="col-package">套餐信息</th>
              <th class="col-platform">平台</th>
              <th class="col-gold">金币信息</th>
              <th class="col-price">价格</th>
              <th class="col-status">状态</th>
              <th class="col-time">时间</th>
              <th class="col-actions">操作</th>
            </tr>
          </thead>
          <tbody id="listBody">
            <tr>
              <td colspan="7" class="empty-row">加载中...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-mask" id="modalMask">
    <div class="modal">
      <div class="modal-head">
        <h2 class="modal-title" id="modalTitle">新增套餐</h2>
        <button class="modal-close" type="button" id="btnClose">×</button>
      </div>

      <form id="packageForm">
        <div class="modal-body">
          <input type="hidden" id="id" name="id" value="0" />

          <div class="form-group">
            <label class="form-label">商品ID</label>
            <input class="form-control" type="text" id="product_id" name="product_id" required />
<div class="hint">建议格式：com.rcwulian.gold.x</div>
          </div>

          <div class="form-group">
            <label class="form-label">支持平台</label>
            <div class="platform-select">
              <label>
                <input type="checkbox" name="platform_type[]" value="ios" />
                <span>iOS</span>
              </label>
              <label>
                <input type="checkbox" name="platform_type[]" value="web" />
                <span>Web</span>
              </label>
              <label>
                <input type="checkbox" name="platform_type[]" value="android" />
                <span>Android</span>
              </label>
            </div>
            <div class="hint">可多选</div>
          </div>

          <div class="form-group">
            <label class="form-label">商品名称</label>
            <input class="form-control" type="text" id="product_name" name="product_name" placeholder="例如：7金币" required />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">金币数量</label>
              <input class="form-control" type="number" min="0" step="1" id="gold_amount" name="gold_amount" value="0" required />
            </div>
            <div class="form-group">
              <label class="form-label">赠送金币</label>
              <input class="form-control" type="number" min="0" step="1" id="bonus_gold" name="bonus_gold" value="0" required />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">价格</label>
              <input class="form-control" type="number" min="0" step="0.01" id="price" name="price" value="0.00" required />
            </div>
            <div class="form-group">
              <label class="form-label">币种</label>
              <input class="form-control" type="text" maxlength="16" id="currency" name="currency" value="RMB" required />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">是否启用</label>
            <select class="form-control" id="is_active" name="is_active">
              <option value="1">启用</option>
              <option value="0">停用</option>
            </select>
          </div>
        </div>

        <div class="modal-foot">
          <button class="btn btn-gray" type="button" id="btnCancel">取消</button>
          <button class="btn btn-primary" type="submit" id="submitBtn">保存</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_URL = '/api/admin/gold_package_manage.php';
const PRODUCT_PREFIX = 'com.rcwulian.gold.';

    const listBodyEl = document.getElementById('listBody');
    const modalMaskEl = document.getElementById('modalMask');
    const modalTitleEl = document.getElementById('modalTitle');
    const packageFormEl = document.getElementById('packageForm');
    const btnAddEl = document.getElementById('btnAdd');
    const btnRefreshEl = document.getElementById('btnRefresh');
    const btnCloseEl = document.getElementById('btnClose');
    const btnCancelEl = document.getElementById('btnCancel');
    const submitBtnEl = document.getElementById('submitBtn');

    const idEl = document.getElementById('id');
    const productIdEl = document.getElementById('product_id');
    const productNameEl = document.getElementById('product_name');
    const goldAmountEl = document.getElementById('gold_amount');
    const bonusGoldEl = document.getElementById('bonus_gold');
    const priceEl = document.getElementById('price');
    const currencyEl = document.getElementById('currency');
    const isActiveEl = document.getElementById('is_active');
    const platformEls = Array.from(document.querySelectorAll('input[name="platform_type[]"]'));

    let syncing = false;

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    async function request(url, options = {}) {
      const response = await fetch(url, {
        credentials: 'include',
        ...options
      });
      return response.json();
    }

    function getCheckedPlatforms() {
      return platformEls.filter(el => el.checked).map(el => el.value);
    }

    function setCheckedPlatforms(values) {
      const arr = Array.isArray(values)
        ? values
        : String(values || '').split(',').map(v => v.trim()).filter(Boolean);

      const set = new Set(arr);
      platformEls.forEach(el => {
        el.checked = set.has(el.value);
      });
    }

    function renderPlatformTags(raw) {
      const arr = String(raw || '')
        .split(',')
        .map(v => v.trim())
        .filter(Boolean);

      if (!arr.length) {
        return '<span class="muted">-</span>';
      }

      return '<div class="platform-tags">' + arr.map(item => {
        let label = item;
        if (item === 'ios') label = 'iOS';
        if (item === 'web') label = 'Web';
        if (item === 'android') label = 'Android';
        return '<span class="platform-chip">' + escapeHtml(label) + '</span>';
      }).join('') + '</div>';
    }

    function formatDateTimeText(value) {
      const text = String(value || '').trim();
      if (!text) return '-';
      return text.replace(' ', '<br>');
    }

    function resetForm() {
      packageFormEl.reset();
      idEl.value = '0';
      productIdEl.value = PRODUCT_PREFIX;
      productNameEl.value = '';
      goldAmountEl.value = '0';
      bonusGoldEl.value = '0';
      priceEl.value = '0.00';
      currencyEl.value = 'RMB';
      isActiveEl.value = '1';
      setCheckedPlatforms(['ios', 'web', 'android']);
    }

    function openAddModal() {
      resetForm();
      modalTitleEl.textContent = '新增套餐';
      submitBtnEl.textContent = '保存';
      modalMaskEl.classList.add('show');
      setTimeout(() => productIdEl.focus(), 0);
    }

    function openEditModal() {
      modalTitleEl.textContent = '编辑套餐';
      submitBtnEl.textContent = '保存修改';
      modalMaskEl.classList.add('show');
    }

    function closeModal() {
      modalMaskEl.classList.remove('show');
    }
function parseXFromProductId(value) {
  const match = String(value || '').trim().match(/^com\.rcwulian\.gold\.(\d+)$/);
  return match ? match[1] : '';
}

    function parseXFromProductName(value) {
      const match = String(value || '').trim().match(/^(\d+)金币$/);
      return match ? match[1] : '';
    }

    function parseXFromGoldAmount(value) {
      const text = String(value || '').trim();
      return /^\d+$/.test(text) ? text : '';
    }

    function syncFields(source) {
      if (syncing) return;
      syncing = true;

      let x = '';
      if (source === 'product_id') x = parseXFromProductId(productIdEl.value);
      if (source === 'product_name') x = parseXFromProductName(productNameEl.value);
      if (source === 'gold_amount') x = parseXFromGoldAmount(goldAmountEl.value);

      if (x !== '') {
        if (source !== 'product_id') productIdEl.value = PRODUCT_PREFIX + x;
        if (source !== 'product_name') productNameEl.value = x + '金币';
        if (source !== 'gold_amount') goldAmountEl.value = x;
      }

      syncing = false;
    }

    function validateLinkedFields() {
      const x1 = parseXFromProductId(productIdEl.value);
      const x2 = parseXFromProductName(productNameEl.value);
      const x3 = parseXFromGoldAmount(goldAmountEl.value);
      const platforms = getCheckedPlatforms();

      if (!x1) {
        alert('商品ID格式必须是：' + PRODUCT_PREFIX + 'x');
        productIdEl.focus();
        return false;
      }

      if (!x2) {
        alert('商品名称格式必须是：x金币');
        productNameEl.focus();
        return false;
      }

      if (!x3) {
        alert('金币数量必须是整数 x');
        goldAmountEl.focus();
        return false;
      }

      if (!(x1 === x2 && x2 === x3)) {
        alert('商品ID、商品名称、金币数量三者的 x 必须一致');
        return false;
      }

      if (!platforms.length) {
        alert('请至少选择一个平台');
        return false;
      }

      return true;
    }

    async function loadList() {
      listBodyEl.innerHTML = '<tr><td colspan="7" class="empty-row">加载中...</td></tr>';

      try {
        const res = await request(API_URL + '?action=list');

        if (res.code !== 200) {
          listBodyEl.innerHTML = '<tr><td colspan="7" class="empty-row">' + escapeHtml(res.msg || '加载失败') + '</td></tr>';
          alert(res.msg || '加载失败');
          return;
        }

        const rows = Array.isArray(res.data) ? res.data : [];
        if (!rows.length) {
          listBodyEl.innerHTML = '<tr><td colspan="7" class="empty-row">暂无金币套餐数据</td></tr>';
          return;
        }

        listBodyEl.innerHTML = rows.map(row => {
          const id = Number(row.id) || 0;
          const isActive = Number(row.is_active) === 1;
          const nextStatus = isActive ? 0 : 1;
          const bonusGold = Number(row.bonus_gold) || 0;

          return `
            <tr>
              <td data-label="套餐信息">
                <div class="package-main">
                  <div class="package-name">${escapeHtml(row.product_name || '-')}</div>
                  <div class="package-id">${escapeHtml(row.product_id || '-')}</div>
                </div>
              </td>

              <td data-label="平台">
                ${renderPlatformTags(row.platform_type)}
              </td>

              <td data-label="金币信息">
                <div class="gold-box">
                  <div class="gold-main">${Number(row.gold_amount) || 0} 金币</div>
                  <div class="gold-sub">赠送 ${bonusGold} 金币</div>
                </div>
              </td>

              <td data-label="价格">
                <div class="price-box">
                  <div class="price-main">${escapeHtml(row.price || '0.00')}</div>
                </div>
              </td>

              <td data-label="状态">
                <span class="tag ${isActive ? 'tag-on' : 'tag-off'}" onclick="toggleItem(${id}, ${nextStatus})">
                  ${isActive ? '启用中' : '已停用'}
                </span>
              </td>

              <td data-label="时间">
                <div class="time-box">
                  <div class="time-main">创：${formatDateTimeText(row.created_at)}</div>
                  <div class="time-sub">更：${formatDateTimeText(row.updated_at)}</div>
                </div>
              </td>

              <td data-label="操作">
                <div class="actions">
                  <button class="btn btn-primary" type="button" onclick="editItem(${id})">编辑</button>
                  <button class="btn btn-red" type="button" onclick='deleteItem(${id}, ${JSON.stringify(String(row.product_name || ""))})'>删除</button>
                </div>
              </td>
            </tr>
          `;
        }).join('');
      } catch (error) {
        listBodyEl.innerHTML = '<tr><td colspan="7" class="empty-row">加载失败</td></tr>';
        alert('加载失败：' + error.message);
      }
    }

    async function editItem(id) {
      try {
        const res = await request(API_URL + '?action=detail&id=' + encodeURIComponent(id));
        if (res.code !== 200) {
          alert(res.msg || '加载详情失败');
          return;
        }

        const row = res.data || {};
        idEl.value = row.id || 0;
        productIdEl.value = row.product_id || PRODUCT_PREFIX;
        productNameEl.value = row.product_name || '';
        goldAmountEl.value = row.gold_amount || 0;
        bonusGoldEl.value = row.bonus_gold || 0;
        priceEl.value = row.price || '0.00';
        currencyEl.value = row.currency || 'RMB';
        isActiveEl.value = String(Number(row.is_active) === 1 ? 1 : 0);
        setCheckedPlatforms(row.platform_type || '');

        openEditModal();
      } catch (error) {
        alert('加载详情失败：' + error.message);
      }
    }

    async function deleteItem(id, name) {
      if (!confirm('确定删除套餐【' + (name || id) + '】吗？')) {
        return;
      }

      try {
        const formData = new FormData();
        formData.append('action', 'delete');
        formData.append('id', String(id));

        const res = await request(API_URL, {
          method: 'POST',
          body: formData
        });

        if (res.code !== 200) {
          alert(res.msg || '删除失败');
          return;
        }

        alert(res.msg || '删除成功');
        loadList();
      } catch (error) {
        alert('删除失败：' + error.message);
      }
    }

    async function toggleItem(id, isActive) {
      const text = isActive === 1 ? '启用' : '停用';

      if (!confirm('确定要' + text + '这个套餐吗？')) {
        return;
      }

      try {
        const formData = new FormData();
        formData.append('action', 'toggle');
        formData.append('id', String(id));
        formData.append('is_active', String(isActive));

        const res = await request(API_URL, {
          method: 'POST',
          body: formData
        });

        if (res.code !== 200) {
          alert(res.msg || '操作失败');
          return;
        }

        alert(res.msg || '操作成功');
        loadList();
      } catch (error) {
        alert('操作失败：' + error.message);
      }
    }

    packageFormEl.addEventListener('submit', async function(e) {
      e.preventDefault();

      syncFields('product_id');
      if (!validateLinkedFields()) return;

      try {
        const formData = new FormData(packageFormEl);
        formData.append('action', 'save');

        const res = await request(API_URL, {
          method: 'POST',
          body: formData
        });

        if (res.code !== 200) {
          alert(res.msg || '保存失败');
          return;
        }

        alert(res.msg || '保存成功');
        closeModal();
        loadList();
      } catch (error) {
        alert('保存失败：' + error.message);
      }
    });

    productIdEl.addEventListener('input', () => syncFields('product_id'));
    productNameEl.addEventListener('input', () => syncFields('product_name'));
    goldAmountEl.addEventListener('input', () => syncFields('gold_amount'));

    btnAddEl.addEventListener('click', openAddModal);
    btnRefreshEl.addEventListener('click', loadList);
    btnCloseEl.addEventListener('click', closeModal);
    btnCancelEl.addEventListener('click', closeModal);

    modalMaskEl.addEventListener('click', function(e) {
      if (e.target === modalMaskEl) closeModal();
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });

    window.editItem = editItem;
    window.deleteItem = deleteItem;
    window.toggleItem = toggleItem;

    loadList();
  </script>
</body>
</html>
