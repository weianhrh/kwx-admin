<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>用户变动记录（金额 / 能量）</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"/>

  <style>
:root {
  --bg: #f4f7f8;
  --panel: #ffffff;
  --text: #172126;
  --muted: #6b7d84;
  --subtle: #8aa0a8;
  --line: #dfe8eb;
  --line-strong: #c9d8dd;
  --primary: #0f8f8c;
  --primary-dark: #08706e;
  --primary-soft: #e6f6f5;
  --success: #20a876;
  --success-soft: #e8f7f1;
  --warning: #ffb84d;
  --warning-soft: #fff5df;
  --danger: #df5b57;
  --danger-soft: #ffefef;
  --blue: #2f7df6;
  --blue-soft: #eef5ff;
  --purple: #7c5cff;
  --purple-soft: #f0edff;
  --shadow: 0 12px 34px rgba(30, 55, 66, .08);
  --shadow-sm: 0 8px 22px rgba(30, 55, 66, .07);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "HarmonyOS Sans SC", "Microsoft YaHei", Arial, sans-serif;
  -webkit-tap-highlight-color: transparent;
}

html,
body {
  width: 100%;
  min-height: 100%;
}

body {
  min-width: 320px;
  min-height: 100vh;
  padding: 26px 28px 34px;
  color: var(--text);
  background: var(--bg);
  overflow-x: hidden;
}

body > canvas {
  display: none !important;
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  user-select: none;
}

input,
select,
textarea {
  outline: none;
}

.wrap {
  width: 100%;
  max-width: none;
  margin: 0 auto;
}

.card {
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  box-shadow: var(--shadow);
}

.header {
  min-height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--line);
  background: var(--panel);
}

.title {
  display: flex;
  flex-direction: column;
  gap: 5px;
  min-width: 0;
}

.title h1 {
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--text);
  font-size: 20px;
  line-height: 1.25;
  font-weight: 900;
  letter-spacing: .01em;
}

.title h1::before {
  content: "";
  width: 8px;
  height: 20px;
  border-radius: 999px;
  background: var(--primary);
  flex: 0 0 auto;
}

.title p {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.4;
  font-weight: 700;
}

.tabs {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 8px;
  flex-wrap: wrap;
}

.tab {
  min-height: 34px;
  padding: 0 13px;
  border: 1px solid var(--line);
  border-radius: 7px;
  color: var(--muted);
  background: #fbfcfd;
  cursor: pointer;
  font-size: 13px;
  line-height: 1;
  font-weight: 800;
  transition: border-color .16s ease, background .16s ease, color .16s ease, box-shadow .16s ease;
}

.tab:hover {
  border-color: rgba(15, 143, 140, .35);
  color: var(--primary-dark);
  background: var(--primary-soft);
}

.tab.active {
  border-color: var(--primary);
  color: #fff;
  background: var(--primary);
  box-shadow: 0 8px 18px rgba(15, 143, 140, .16);
}

.filters {
  display: grid;
  grid-template-columns: repeat(12, minmax(0, 1fr));
  gap: 12px;
  align-items: end;
  padding: 18px;
  border-bottom: 1px solid var(--line);
  background: #fbfcfd;
}

.field {
  min-width: 0;
}

.col-3 { grid-column: span 3; }
.col-2 { grid-column: span 2; }
.col-btn { grid-column: span 2; }

.label {
  margin-bottom: 6px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.2;
  font-weight: 800;
}

input,
select {
  width: 100%;
  height: 38px;
  padding: 0 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--text);
  background: #fff;
  font-size: 13px;
  transition: border .16s ease, box-shadow .16s ease, background .16s ease;
}

input::placeholder {
  color: #9aabb2;
}

input:focus,
select:focus {
  border-color: rgba(15, 143, 140, .48);
  box-shadow: 0 0 0 4px rgba(15, 143, 140, .10);
}

select {
  cursor: pointer;
}

.btn {
  width: 100%;
  min-height: 38px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 0 15px;
  border: 1px solid var(--primary);
  border-radius: 8px;
  color: #fff;
  background: var(--primary);
  cursor: pointer;
  font-size: 13px;
  line-height: 1;
  font-weight: 900;
  transition: border-color .16s ease, background .16s ease, box-shadow .16s ease, transform .16s ease;
}

.btn:hover {
  border-color: var(--primary-dark);
  background: var(--primary-dark);
  box-shadow: 0 8px 18px rgba(15, 143, 140, .16);
  transform: translateY(-1px);
}

.summary {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
  min-height: 0;
  padding: 0 18px;
  background: #fff;
}

.summary:not(:empty) {
  padding-top: 16px;
}

.pill {
  min-height: 32px;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 0 11px;
  border: 1px solid var(--line);
  border-radius: 999px;
  color: var(--muted);
  background: #fbfcfd;
  font-size: 12px;
  line-height: 1;
  font-weight: 900;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--primary);
}

.dot.green { background: var(--success); }
.dot.red { background: var(--danger); }
.dot.amber { background: var(--warning); }
.dot.cyan { background: var(--blue); }
.dot.purple { background: var(--purple); }

.list {
  display: grid;
  gap: 12px;
  padding: 18px;
}

.item {
  display: grid;
  grid-template-columns: 46px minmax(0, 1fr);
  gap: 12px;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  box-shadow: var(--shadow-sm);
  transition: border-color .16s ease, box-shadow .16s ease, transform .16s ease;
}

.item:hover {
  border-color: var(--line-strong);
  box-shadow: 0 12px 28px rgba(30, 55, 66, .10);
  transform: translateY(-1px);
}

.badge {
  width: 42px;
  height: 42px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--primary-dark);
  background: var(--primary-soft);
  font-size: 17px;
}

.badge.green { color: var(--success); background: var(--success-soft); border-color: rgba(32, 168, 118, .20); }
.badge.red { color: var(--danger); background: var(--danger-soft); border-color: rgba(223, 91, 87, .22); }
.badge.amber { color: #a16000; background: var(--warning-soft); border-color: rgba(255, 184, 77, .30); }
.badge.cyan { color: var(--blue); background: var(--blue-soft); border-color: rgba(47, 125, 246, .22); }
.badge.purple { color: var(--purple); background: var(--purple-soft); border-color: rgba(124, 92, 255, .22); }

.content {
  min-width: 0;
}

.top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 10px;
}

.name {
  color: var(--text);
  font-size: 15px;
  line-height: 1.35;
  font-weight: 900;
}

.meta {
  margin-top: 4px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.4;
  font-weight: 700;
}

.amount {
  min-width: 110px;
  text-align: right;
  color: var(--text);
  font-size: 18px;
  line-height: 1.2;
  font-weight: 900;
  white-space: nowrap;
}

.amount.green { color: var(--success); }
.amount.red { color: var(--danger); }
.amount.amber { color: #a16000; }
.amount.cyan { color: var(--blue); }
.amount.purple { color: var(--purple); }

.kv {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px 12px;
}

.kv > div,
.kv-long {
  min-width: 0;
  padding: 8px 10px;
  border: 1px solid #edf3f5;
  border-radius: 7px;
  color: var(--text);
  background: #fbfcfd;
  font-size: 12px;
  line-height: 1.45;
  font-weight: 700;
  word-break: break-all;
}

.kv-long {
  grid-column: 1 / -1;
}

.empty {
  display: none;
  margin: 0 18px 18px;
  padding: 28px 16px;
  border: 1px dashed var(--line-strong);
  border-radius: 8px;
  color: var(--muted);
  background: #fbfcfd;
  text-align: center;
  font-size: 13px;
  font-weight: 800;
}

.empty.show,
.empty[style*="block"] {
  display: block;
}

@media (max-width: 1120px) {
  .col-3 { grid-column: span 4; }
  .col-2,
  .col-btn { grid-column: span 3; }
  .kv { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}

@media (max-width: 760px) {
  body { padding: 12px; }
  .header { align-items: flex-start; flex-direction: column; padding: 14px; }
  .tabs { justify-content: flex-start; width: 100%; }
  .tab { flex: 1 1 auto; }
  .filters { grid-template-columns: 1fr; padding: 12px; }
  .col-3,
  .col-2,
  .col-btn { grid-column: auto; }
  .summary { padding-left: 12px; padding-right: 12px; }
  .list { padding: 12px; }
  .item { grid-template-columns: 1fr; }
  .badge { width: 38px; height: 38px; }
  .top { flex-direction: column; }
  .amount { text-align: left; }
  .kv { grid-template-columns: 1fr; }
}
</style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="header">
        <div class="title">
          <h1>用户变动记录</h1>
          <p>支持：金额（balance_changes） / 能量（energy_changes）</p>
        </div>

        <div class="tabs">
          <button class="tab active" data-mode="all">全部</button>
          <button class="tab" data-mode="money">金额</button>
          <button class="tab" data-mode="energy">能量</button>
        </div>
      </div>

      <div class="filters">
        <div class="field col-3">
          <div class="label">用户 ID（user_id / user_uid / uid）</div>
          <input id="user_id" placeholder="请输入用户ID" />
        </div>

        <div class="field col-3" id="moneyTypeWrap" style="display:none;">
          <div class="label">金额变动类型</div>
          <select id="change_type">
            <option value="">全部类型</option>
            <option value="充值">充值</option>
            <option value="消费">消费</option>
            <option value="提现">提现</option>
            <option value="金额返还">金额返还</option>
          </select>
        </div>

        <div class="field col-2">
          <div class="label">每次最多返回</div>
          <select id="limit">
            <option value="100">100</option>
            <option value="200">200</option>
            <option value="500">500</option>
            <option value="1000">1000</option>
            <option value="5000">5000</option>
            <option value="10000">10000</option>
            <option value="50000" selected>50000</option>
          </select>
        </div>

        <div class="field col-2">
          <div class="label">开始时间</div>
          <input id="start_date" type="text" placeholder="yyyy/mm/dd"
                 onfocus="this.type='date'" onblur="if(!this.value)this.type='text'"/>
        </div>

        <div class="field col-2">
          <div class="label">结束时间</div>
          <input id="end_date" type="text" placeholder="yyyy/mm/dd"
                 onfocus="this.type='date'" onblur="if(!this.value)this.type='text'"/>
        </div>

        <div class="field col-btn">
          <button class="btn" id="search_btn">
            <i class="fas fa-search"></i> 查询
          </button>
        </div>
      </div>

      <div class="summary" id="summary"></div>
      <div class="list" id="list"></div>
      <div class="empty" id="empty">暂无数据</div>
    </div>
  </div>

<script>
  const API = '/api/finance/Comsumquery_v2.php';

  let currentMode = 'all';

  const tabs = document.querySelectorAll('.tab');
  const moneyTypeWrap = document.getElementById('moneyTypeWrap');

  const changeTypeEl = document.getElementById('change_type');

  function fmt(n){
    const x = Number(n || 0);
    return x.toFixed(2);
  }

  function absNum(n){
    return Math.abs(Number(n || 0));
  }

  function sumBy(list, fn){
    return list.reduce((a, b) => a + (fn(b) || 0), 0);
  }

  function pill(color, text){
    const el = document.createElement('div');
    el.className = 'pill';
    el.innerHTML = `<span class="dot ${color}"></span><span>${text}</span>`;
    return el;
  }

  function syncModeUI(){
    moneyTypeWrap.style.display = 'none';

    if (currentMode === 'money') {
      moneyTypeWrap.style.display = 'flex';
    }
  }

  tabs.forEach(btn => {
    btn.addEventListener('click', () => {
      tabs.forEach(x => x.classList.remove('active'));
      btn.classList.add('active');
      currentMode = btn.dataset.mode;
      syncModeUI();
    });
  });

  document.getElementById('search_btn').addEventListener('click', load);

  function renderSummary(data){
    const summary = document.getElementById('summary');
    summary.innerHTML = '';

    const money = data.money || [];
    const energy = data.energy || [];

    const recharge = sumBy(money.filter(x => x.type === '充值'), x => absNum(x.amount));
    const consume  = sumBy(money.filter(x => x.type === '消费'), x => absNum(x.amount));
    const withdraw = sumBy(money.filter(x => x.type === '提现'), x => absNum(x.amount));
    const refund   = sumBy(money.filter(x => x.type === '金额返还'), x => absNum(x.amount));

    const ePlus  = sumBy(energy.filter(x => Number(x.amount) > 0), x => Number(x.amount));
    const eMinus = sumBy(energy.filter(x => Number(x.amount) < 0), x => absNum(x.amount));

    const pills = [];

    if (currentMode === 'all' || currentMode === 'money'){
      if (!changeTypeEl.value){
        pills.push(pill('green', `总充值 +${fmt(recharge)}`));
        pills.push(pill('red', `总消费 -${fmt(consume)}`));
        pills.push(pill('amber', `总提现 -${fmt(withdraw)}`));
        pills.push(pill('cyan', `总返还 +${fmt(refund)}`));
      } else if (changeTypeEl.value === '充值'){
        pills.push(pill('green', `总充值 +${fmt(recharge)}`));
      } else if (changeTypeEl.value === '消费'){
        pills.push(pill('red', `总消费 -${fmt(consume)}`));
      } else if (changeTypeEl.value === '提现'){
        pills.push(pill('amber', `总提现 -${fmt(withdraw)}`));
      } else if (changeTypeEl.value === '金额返还'){
        pills.push(pill('cyan', `总返还 +${fmt(refund)}`));
      }
    }

    if (currentMode === 'all' || currentMode === 'energy'){
      pills.push(pill('green', `能量增加 +${fmt(ePlus)}`));
      pills.push(pill('red', `能量减少 -${fmt(eMinus)}`));
    }

    pills.forEach(p => summary.appendChild(p));
  }

  function renderList(list){
    const wrap = document.getElementById('list');
    const empty = document.getElementById('empty');

    wrap.innerHTML = '';

    if (!list || list.length === 0){
      empty.style.display = 'block';
      return;
    }

    empty.style.display = 'none';

    list.forEach(item => {
      const isMoney = item.kind === 'money';
      const isEnergy = item.kind === 'energy';
      if (!isMoney && !isEnergy) return;

      let badgeCls = 'money';
      let icon = 'fa-yen-sign';
      let title = '';
      let sub = '';
      let amountText = '';
      let amountCls = '';
      let kv = '';

      if (isMoney) {
        const raw = Number(item.amount || 0);

        badgeCls = 'money';
        icon = 'fa-yen-sign';
        title = `金额｜${item.type || '未知类型'}`;
        sub = `user_id: ${item.user_id || ''} · ${item.created_at || ''}`;

        if (item.type === '充值') {
          amountText = `+${fmt(absNum(raw))}`;
          amountCls = 'green';
        } else if (item.type === '金额返还') {
          amountText = `+${fmt(absNum(raw))}`;
          amountCls = 'cyan';
        } else if (item.type === '消费') {
          amountText = `-${fmt(absNum(raw))}`;
          amountCls = 'red';
        } else if (item.type === '提现') {
          amountText = `-${fmt(absNum(raw))}`;
          amountCls = 'amber';
        } else {
          amountText = raw >= 0 ? `+${fmt(raw)}` : `-${fmt(absNum(raw))}`;
          amountCls = raw >= 0 ? 'green' : 'red';
        }

        kv = `
          <div>变动前：${fmt(item.before)}</div>
          <div>变动后：${fmt(item.after)}</div>
          <div>渠道：${item.channel || '-'}</div>
          <div class="kv-long">描述：${item.desc || '-'}</div>
        `;
      }

      if (isEnergy) {
        const raw = Number(item.amount || 0);

        badgeCls = 'energy';
        icon = 'fa-bolt';
        title = `能量｜${item.reason || 'unknown'}`;
        sub = `user_uid: ${item.user_uid || ''} · venue_id: ${item.venue_id ?? ''} · ${item.created_at || ''}`;

        if (raw >= 0) {
          amountText = `+${fmt(raw)}`;
          amountCls = 'green';
        } else {
          amountText = `-${fmt(absNum(raw))}`;
          amountCls = 'red';
        }

        kv = `
          <div>变动前：${fmt(item.before)}</div>
          <div>变动后：${fmt(item.after)}</div>
          <div class="kv-long">原因：${item.reason || '-'}</div>
          <div>ID：${item.id}</div>
        `;
      }

      const card = document.createElement('div');
      card.className = 'item';
      card.innerHTML = `
        <div class="badge ${badgeCls}"><i class="fas ${icon}"></i></div>
        <div class="content">
          <div class="top">
            <div>
              <div class="name">${title}</div>
              <div class="meta">${sub}</div>
            </div>
            <div class="amount ${amountCls}">${amountText}</div>
          </div>
          <div class="kv">${kv}</div>
        </div>
      `;

      wrap.appendChild(card);
    });
  }

  async function load(){
    const userId = document.getElementById('user_id').value.trim();
    const limit = document.getElementById('limit').value;

    if (!userId){
      alert('请先输入用户ID');
      return;
    }

    let url = `${API}?user_id=${encodeURIComponent(userId)}&mode=${encodeURIComponent(currentMode)}&limit=${encodeURIComponent(limit)}`;

    if (currentMode === 'money' && changeTypeEl.value){
      url += `&change_type=${encodeURIComponent(changeTypeEl.value)}`;
    }

    const startDate = document.getElementById('start_date').value;
    const endDate = document.getElementById('end_date').value;

    if (startDate) url += `&start_date=${encodeURIComponent(startDate)}`;
    if (endDate)   url += `&end_date=${encodeURIComponent(endDate)}`;

    try{
      const res = await fetch(url, { credentials: 'include' });
      const json = await res.json();

      if (json.code !== 200){
        alert(json.msg || '查询失败');
        return;
      }

      const data = json.data || {};
      renderSummary(data);

      let list = [];
      if (currentMode === 'all') list = (data.merged || []).filter(item => item.kind === 'money' || item.kind === 'energy');
      if (currentMode === 'money') list = data.money || [];
      if (currentMode === 'energy') list = data.energy || [];

      list.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
      renderList(list);

    }catch(e){
      console.error(e);
      alert('网络或接口异常');
    }
  }

  window.addEventListener('DOMContentLoaded', () => {
    syncModeUI();
  });
</script>
</body>
</html>
