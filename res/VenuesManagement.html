<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>场地管理</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
:root {
  --bg: #f4f7f8;
  --panel: #ffffff;
  --text: #172126;
  --muted: #6b7d84;
  --subtle: #8aa0a8;
  --line: #dfe8eb;
  --line-strong: #c9d8dd;
  --primary: #0f8f8c;
  --primary-dark: #08706e;
  --primary-soft: #e6f6f5;
  --warning: #ffb84d;
  --warning-soft: #fff5df;
  --success: #20a876;
  --success-soft: #e8f7f1;
  --danger: #df5b57;
  --danger-soft: #ffefef;
  --blue: #2f7df6;
  --blue-soft: #eef5ff;
  --purple: #7c5cff;
  --purple-soft: #f0edff;
  --shadow: 0 12px 34px rgba(30, 55, 66, .08);
  --shadow-sm: 0 8px 22px rgba(30, 55, 66, .07);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "HarmonyOS Sans SC", "Microsoft YaHei", Arial, sans-serif;
  -webkit-tap-highlight-color: transparent;
}

html,
body {
  width: 100%;
  min-height: 100%;
}

body {
  min-width: 320px;
  min-height: 100vh;
  padding: 26px 28px 34px;
  color: var(--text);
  background: var(--bg);
  overflow-x: hidden;
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  user-select: none;
}

input,
select,
textarea {
  outline: none;
}

.container {
  width: 100%;
  max-width: none;
  margin: 0 auto;
}

.card {
  width: 100%;
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  box-shadow: var(--shadow);
}

.card-title {
  min-height: 58px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 18px;
  border-bottom: 1px solid var(--line);
  color: var(--text);
  background: var(--panel);
  font-size: 20px;
  line-height: 1.2;
  font-weight: 800;
}

.card-title::before {
  content: "";
  width: 8px;
  height: 20px;
  border-radius: 999px;
  background: var(--primary);
}

.add-btn {
  min-height: 38px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin: 18px 18px 12px;
  padding: 0 14px;
  border: 1px solid var(--primary);
  border-radius: 8px;
  color: #fff;
  background: var(--primary);
  font-size: 13px;
  font-weight: 800;
  cursor: pointer;
  transition: background .16s ease, border .16s ease, color .16s ease, box-shadow .16s ease, transform .16s ease;
}

.add-btn::before {
  content: "+";
  font-size: 18px;
  line-height: 1;
}

.add-btn:hover {
  border-color: var(--primary-dark);
  background: var(--primary-dark);
  box-shadow: 0 10px 24px rgba(15, 143, 140, .18);
  transform: translateY(-1px);
}

#venue_search,
.venue-level-filter {
  width: calc(50% - 22px) !important;
  min-width: 260px;
  height: 38px !important;
  margin: 0 0 12px 18px !important;
  padding: 0 12px !important;
  border: 1px solid var(--line) !important;
  border-radius: 8px !important;
  color: var(--text);
  background: #fff;
  font-size: 13px;
  transition: border .16s ease, box-shadow .16s ease;
  vertical-align: top;
}

.venue-level-filter {
  width: 180px !important;
  min-width: 180px;
  margin-left: 8px !important;
  cursor: pointer;
}

#venue_search::placeholder {
  color: #9aabb2;
}

#venue_search:focus,
.venue-level-filter:focus,
.add-venue-form input:focus,
.add-venue-form select:focus,
.ban-form-group input:focus,
.ban-form-group select:focus,
.ban-form-group textarea:focus,
.form-group textarea:focus {
  border-color: rgba(15, 143, 140, .48) !important;
  box-shadow: 0 0 0 4px rgba(15, 143, 140, .10);
}

.add-venue-form {
  display: none;
  gap: 12px;
  grid-template-columns: repeat(3, minmax(180px, 1fr));
  margin: 0 18px 18px;
  padding: 16px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fbfcfd;
}

.add-venue-form[style*="block"] {
  display: grid !important;
}

.add-venue-form input,
.add-venue-form select {
  width: 100%;
  height: 38px;
  padding: 0 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--text);
  background: #fff;
  font-size: 13px;
}

.add-venue-form label {
  grid-column: 1 / -1;
}

.add-venue-form label input[type="checkbox"] {
  width: auto !important;
  height: auto !important;
  accent-color: var(--primary);
}

.add-venue-form button[type="submit"] {
  min-height: 38px;
  padding: 0 16px;
  border: 1px solid var(--primary);
  border-radius: 8px;
  color: #fff;
  background: var(--primary);
  font-size: 13px;
  font-weight: 800;
  cursor: pointer;
}

.add-venue-form button[type="submit"]:hover {
  background: var(--primary-dark);
}

.venue-toolbar {
  display: block;
  padding: 0 18px 14px;
  border-bottom: 1px solid var(--line);
  background: var(--panel);
}

.venue-stats {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.stat-card {
  min-height: 76px;
  display: grid;
  align-content: center;
  gap: 8px;
  padding: 14px 16px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fbfcfd;
  cursor: pointer;
  transition: border .16s ease, background .16s ease, transform .16s ease, box-shadow .16s ease;
}

.stat-card:hover,
.stat-card.active {
  border-color: rgba(15, 143, 140, .38);
  background: var(--primary-soft);
  transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
}

.stat-label {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.2;
  font-weight: 800;
}

.stat-value {
  color: var(--text);
  font-size: 26px;
  line-height: 1;
  font-weight: 900;
}

.stat-live .stat-value { color: var(--primary); }
.stat-open .stat-value { color: var(--success); }
.stat-rest .stat-value { color: #a16d13; }

#venue-list {
  display: grid;
  gap: 14px;
  padding: 18px;
  background: var(--panel);
}

.loading {
  min-height: 96px;
  display: grid;
  place-items: center;
  color: var(--muted);
  font-size: 14px;
  border: 1px dashed var(--line-strong);
  border-radius: 8px;
  background: #fbfcfd;
}

.venue-card {
  width: 100%;
  overflow: hidden;
  border: 1px solid var(--line);
  border-left: 4px solid var(--subtle);
  border-radius: 8px;
  background: #fff;
  box-shadow: var(--shadow-sm);
  transition: border .16s ease, box-shadow .16s ease, transform .16s ease;
}

.venue-card:hover {
  border-color: var(--line-strong);
  box-shadow: 0 16px 34px rgba(30, 55, 66, .11);
  transform: translateY(-1px);
}

.venue-card.status-open { border-left-color: var(--success); }
.venue-card.status-rest { border-left-color: var(--warning); }
.venue-card.status-build { border-left-color: var(--danger); }

.venue-card-top {
  display: grid;
  grid-template-columns: 132px minmax(0, 1fr);
  gap: 16px;
  padding: 16px;
}

.venue-img {
  width: 132px;
  height: 96px;
  object-fit: cover;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: #eef3f4;
}

.venue-info {
  min-width: 0;
  display: grid;
  gap: 10px;
  color: var(--text);
  font-size: 13px;
}

.venue-name {
  display: block;
  color: var(--text);
  font-size: 16px;
  line-height: 1.35;
  font-weight: 900;
  word-break: break-word;
}

.venue-subtitle {
  display: block;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.4;
  word-break: break-word;
}

.venue-meta-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
}

.venue-status-badge,
.venue-live-badge,
.venue-review-badge,
.venue-level-control {
  min-height: 28px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 0 10px;
  border: 1px solid transparent;
  border-radius: 999px;
  font-size: 12px;
  line-height: 1;
  font-weight: 800;
  white-space: nowrap;
}

.venue-status-badge {
  cursor: pointer;
}

.venue-status-badge.open,
.venue-live-badge {
  color: var(--success);
  background: var(--success-soft);
}

.venue-status-badge.rest {
  color: #a16d13;
  background: var(--warning-soft);
}

.venue-status-badge.build,
.venue-review-badge {
  color: var(--danger);
  background: var(--danger-soft);
}

.venue-level-control {
  color: #486169;
  background: #fbfcfd;
  border-color: var(--line);
}

.venue-level-control span {
  color: var(--muted);
}

.venue-level-select {
  height: 24px;
  padding: 0 6px;
  border: 0;
  border-left: 1px solid var(--line);
  color: var(--text);
  background: transparent;
  font-size: 12px;
  font-weight: 900;
  cursor: pointer;
}

.review-time-row,
.live-time-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fbfcfd;
}

.review-time-label,
.live-time-label {
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
}

.review-time-value,
.live-time-value {
  color: var(--text);
  font-size: 13px;
  font-weight: 800;
}

.venue-detail-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(150px, 1fr));
  gap: 8px;
}

.venue-pill {
  min-height: 30px;
  display: inline-flex;
  align-items: center;
  justify-content: flex-start;
  gap: 6px;
  min-width: 0;
  padding: 0 10px;
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 8px;
  color: #486169;
  background: #fbfcfd;
  font-size: 12px;
  line-height: 1.25;
  font-weight: 800;
  text-overflow: ellipsis;
  white-space: nowrap;
}

button.venue-pill {
  cursor: pointer;
}

button.venue-pill:hover {
  border-color: rgba(15, 143, 140, .28);
  color: var(--primary);
  background: var(--primary-soft);
}

.venue-pill-desc {
  grid-column: span 2;
}

.venue-pill-green {
  color: var(--success);
  background: var(--success-soft);
  border-color: rgba(32, 168, 118, .18);
}

.venue-pill-red {
  color: var(--danger);
  background: var(--danger-soft);
  border-color: rgba(223, 91, 87, .18);
}

.venue-pill-orange,
.venue-pill-amber {
  color: #a16d13;
  background: var(--warning-soft);
  border-color: rgba(255, 184, 77, .32);
}

.venue-pill-cyan,
.venue-pill-blue {
  color: var(--primary);
  background: var(--primary-soft);
  border-color: rgba(15, 143, 140, .18);
}

.venue-pill-spending {
  border-color: rgba(47, 125, 246, .18);
}

.venue-pill-gray {
  color: #667985;
  background: #f3f7f8;
}

.venue-action-area {
  display: flex;
  justify-content: flex-start;
  padding: 14px 16px;
  border-top: 1px solid var(--line);
  background: #fbfcfd;
}

.venue-actions {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
}

.edit-btn,
.unban-btn,
.ban-btn,
.live-btn,
.ban-submit-btn,
.form-group button,
#unbanForm button[type="submit"] {
  min-height: 36px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 0 12px;
  border: 1px solid transparent;
  border-radius: 8px;
  font-size: 12px;
  line-height: 1;
  font-weight: 800;
  white-space: nowrap;
  cursor: pointer;
  transition: background .16s ease, border .16s ease, color .16s ease, box-shadow .16s ease, transform .16s ease, opacity .16s ease;
}

.edit-btn,
.live-btn,
#unbanForm button[type="submit"] {
  color: #fff !important;
  background: var(--primary) !important;
  border-color: var(--primary) !important;
}

.edit-btn:hover,
.live-btn:hover,
#unbanForm button[type="submit"]:hover {
  background: var(--primary-dark) !important;
  border-color: var(--primary-dark) !important;
  box-shadow: 0 10px 24px rgba(15, 143, 140, .18);
  transform: translateY(-1px);
}

.live-btn.cancel {
  color: #486169 !important;
  background: #fff !important;
  border-color: var(--line) !important;
}

.live-btn.cancel:hover {
  color: var(--primary) !important;
  border-color: rgba(15, 143, 140, .28) !important;
  background: var(--primary-soft) !important;
}

.ban-btn {
  color: #fff !important;
  background: var(--warning) !important;
  border-color: var(--warning) !important;
}

.ban-btn:hover {
  box-shadow: 0 10px 24px rgba(255, 184, 77, .20);
  transform: translateY(-1px);
}

.unban-btn {
  color: #fff !important;
  background: var(--danger) !important;
  border-color: var(--danger) !important;
}

.unban-btn:hover {
  box-shadow: 0 10px 24px rgba(223, 91, 87, .20);
  transform: translateY(-1px);
}

.modal {
  position: fixed !important;
  inset: 0 !important;
  width: 100% !important;
  height: 100% !important;
  background: rgba(16, 34, 38, .46) !important;
  z-index: 1000 !important;
  overflow-y: auto;
  padding: 24px 14px;
}

.ban-modal-content,
.modal-content {
  position: relative !important;
  width: min(92vw, 560px) !important;
  margin: 6vh auto !important;
  padding: 18px !important;
  border: 1px solid var(--line) !important;
  border-radius: 8px !important;
  background: #fff !important;
  box-shadow: 0 22px 56px rgba(16, 34, 38, .18) !important;
}

.modal-content h2,
.ban-modal-title {
  margin: 0 32px 16px 0;
  color: var(--text);
  font-size: 18px;
  line-height: 1.2;
  font-weight: 900;
}

.modal-close,
.unban-modal-close {
  position: absolute !important;
  top: 12px !important;
  right: 14px !important;
  width: 32px;
  height: 32px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  color: var(--muted);
  font-size: 24px !important;
  line-height: 1;
  cursor: pointer;
}

.modal-close:hover,
.unban-modal-close:hover {
  color: var(--danger);
  background: var(--danger-soft);
}

.ban-form-group,
.form-group {
  display: grid;
  gap: 7px;
  margin-bottom: 14px;
}

.ban-form-group label,
.form-group label {
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
}

.ban-form-group input,
.ban-form-group select,
.ban-form-group textarea,
.form-group textarea {
  width: 100% !important;
  min-height: 38px;
  padding: 9px 11px;
  border: 1px solid var(--line) !important;
  border-radius: 8px !important;
  color: var(--text);
  background: #fff;
  font-size: 13px;
}

.ban-form-group textarea,
.form-group textarea {
  min-height: 96px !important;
  line-height: 1.55;
  resize: vertical;
}

.ban-desc-tips {
  color: var(--subtle);
  font-size: 12px;
  line-height: 1.5;
}

.ban-template-list {
  display: grid;
  gap: 8px;
  margin: 2px 0 4px;
}

.ban-desc-option {
  min-height: 38px;
  padding: 0 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  color: #486169;
  background: #fbfcfd;
  font-size: 12px;
  font-weight: 800;
  text-align: left;
  cursor: pointer;
}

.ban-desc-option:hover,
.ban-desc-option.active {
  color: var(--primary);
  border-color: rgba(15, 143, 140, .28);
  background: var(--primary-soft);
}

.ban-preview-list {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.ban-preview-img,
.ban-preview-video {
  width: 100%;
  height: 96px;
  max-height: 96px;
  object-fit: cover;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fbfcfd;
}

.ban-submit-btn {
  width: 100%;
  min-height: 40px;
  color: #fff;
  background: var(--primary);
  border-color: var(--primary);
}

.ban-submit-btn:hover {
  background: var(--primary-dark);
}

@media (max-width: 1180px) {
  .venue-detail-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .venue-pill-desc {
    grid-column: span 2;
  }

  .venue-actions {
    width: 100%;
  }
}

@media (max-width: 760px) {
  body {
    padding: 14px 10px 22px;
  }

  .card-title {
    min-height: 52px;
    padding: 0 14px;
    font-size: 18px;
  }

  .add-btn {
    width: calc(100% - 28px);
    margin: 14px 14px 10px;
  }

  #venue_search,
  .venue-level-filter {
    width: calc(100% - 28px) !important;
    min-width: 0;
    margin: 0 14px 10px !important;
  }

  .add-venue-form {
    grid-template-columns: 1fr;
    margin: 0 14px 14px;
    padding: 14px;
  }

  .venue-toolbar,
  #venue-list {
    padding-left: 14px;
    padding-right: 14px;
  }

  .venue-stats {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }

  .stat-card {
    min-height: 64px;
  }

  .stat-value {
    font-size: 22px;
  }

  .venue-card-top {
    grid-template-columns: 1fr;
    padding: 14px;
  }

  .venue-img {
    width: 100%;
    height: 180px;
  }

  .venue-detail-grid {
    grid-template-columns: 1fr;
  }

  .venue-pill-desc {
    grid-column: auto;
  }

  .venue-pill {
    width: 100%;
  }

  .venue-action-area {
    padding: 12px 14px;
  }

  .venue-actions {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    width: 100%;
  }

  .edit-btn,
  .unban-btn,
  .ban-btn,
  .live-btn {
    width: 100%;
    min-height: 38px;
  }

  .ban-modal-content,
  .modal-content {
    width: calc(100vw - 24px) !important;
    margin: 4vh auto !important;
    padding: 16px !important;
  }
}


/* =========================
   场地管理页面整理：顶部工具栏 + 列表按钮规整
   仅调整布局与展示，不改接口逻辑
========================= */
.card {
  display: grid;
  grid-template-columns: 132px minmax(260px, 1fr) 180px;
  gap: 12px;
  padding: 0;
}

.card-title {
  grid-column: 1 / -1;
  min-height: 64px;
  padding: 0 20px;
  font-size: 21px;
  background: linear-gradient(180deg, #ffffff, #fbfcfd);
}

.add-btn {
  grid-column: 1;
  width: calc(100% - 18px);
  margin: 0 0 0 18px;
  align-self: stretch;
  min-height: 40px;
}

#venue_search {
  grid-column: 2;
  width: 100% !important;
  min-width: 0 !important;
  margin: 0 !important;
  height: 40px !important;
  align-self: stretch;
}

.venue-level-filter {
  grid-column: 3;
  width: calc(100% - 18px) !important;
  min-width: 0 !important;
  margin: 0 18px 0 0 !important;
  height: 40px !important;
  align-self: stretch;
}

#venue_options {
  display: none;
}

.add-venue-form {
  grid-column: 1 / -1;
  margin: 0 18px 4px;
}

.venue-toolbar {
  grid-column: 1 / -1;
  padding: 2px 18px 14px;
  border-bottom: 1px solid var(--line);
}

.venue-stats {
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}

.stat-card {
  min-height: 58px;
  align-content: center;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
}

.stat-label {
  font-size: 12px;
}

.stat-value {
  font-size: 22px;
}

#venue-list,
#loading {
  grid-column: 1 / -1;
}

#venue-list {
  gap: 12px;
  padding: 16px 18px 18px;
}

.venue-card {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 152px;
  align-items: stretch;
}

.venue-card-top {
  grid-column: 1;
  grid-template-columns: 120px minmax(0, 1fr);
  gap: 14px;
  padding: 14px 16px;
}

.venue-img {
  width: 120px;
  height: 88px;
}

    <script>
const BAN_DESC_TEMPLATES = {
    1: '主播服装/行为/动作严重违反平台内容安全条例，请尽快调整，否则将面临场地长时间处罚。',
    2: '主播服装/行为/动作严重违反平台内容安全条例，请整改直播内容。',
    3: '场地存在违规行为,依照安全管理条例给予相应处罚,请尽快更改调整!'
};

function setBanDescriptionTemplate(type) {
    const reasonEl = document.getElementById('banReason');
    if (reasonEl) {
        reasonEl.value = BAN_DESC_TEMPLATES[type] || '';
    }

    document.querySelectorAll('.ban-desc-option').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.template === String(type));
    });
}

function openBanModal(venueId) {
    document.getElementById('banVenueId').value = venueId;

    // 默认封禁时长：10分钟
    document.getElementById('banDuration').value = '600';

    // 默认使用选项3的封禁描述
    setBanDescriptionTemplate(3);

    // 每次打开时清空已选图片/视频预览
    const fileInput = document.getElementById('banImage');
    const previewList = document.getElementById('banPreviewList');
    
    if (fileInput) fileInput.value = '';
    if (previewList) previewList.innerHTML = '';

    document.getElementById('banModal').style.display = 'block';
}
        // 保存场地映射表（id -> name）
        const venueMap = new Map();

        document.addEventListener('DOMContentLoaded', function () {
            const addVenueBtn = document.getElementById('add-venue-btn');
            const addVenueForm = document.getElementById('add-venue-form');
            const venueList = document.getElementById('venue-list');
            const loading = document.getElementById('loading');
            const venueSearch = document.getElementById('venue_search');
            const venueLevelFilter = document.getElementById('venue_level_filter');
            const statCards = document.querySelectorAll('.stat-card');

            let allVenues = [];
    let currentStatus = '营业中';

            addVenueBtn.addEventListener('click', function () {
                const isHidden = window.getComputedStyle(addVenueForm).display === 'none';
                addVenueForm.style.display = isHidden ? 'block' : 'none';

                document.getElementById('venue_search').style.display = isHidden ? 'none' : 'block';
                if (venueLevelFilter) venueLevelFilter.style.display = 'none';
                document.querySelector('.venue-toolbar').style.display = isHidden ? 'none' : 'block';
            });

            function escapeHtml(str) {
                return String(str || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }
            
function normalizeVenueLevel(level) {
    const v = String(level || 'A').trim().toUpperCase();
    return ['S', 'A', 'B', 'C', 'D'].includes(v) ? v : 'A';
}

function getVenueLevelRateText(level) {
    const v = normalizeVenueLevel(level);

    if (v === 'A') return '80%';
    if (v === 'C') return '60%';

    return '预留';
}

function getVenueLevelClass(level) {
    const v = normalizeVenueLevel(level);

    if (v === 'A') return 'venue-level-a';
    if (v === 'C') return 'venue-level-c';

    return 'venue-level-reserved';
}

function renderVenueLevelOptions(currentLevel) {
    const current = normalizeVenueLevel(currentLevel);
    const levels = ['S', 'A', 'B', 'C', 'D'];

    return levels.map(level => {
        const selected = level === current ? 'selected' : '';
        return `<option value="${level}" ${selected}>${level}</option>`;
    }).join('');
}
function isRecommendTop(venue) {
    return Number(venue.is_live || 0) === 1 && Number(venue.is_recommend || 0) === 1;
}

function formatLiveMarkedAt(value) {
    if (!value) return '';
    const str = String(value).replace('T', ' ');
    return str.length >= 16 ? str.slice(0, 16) : str;
}
function getStatusOrder(venue) {
    if (needPriorityReview(venue)) return -1; // 优先检测排最前
    if (isRecommendTop(venue)) return 0;
    if (isVenueLive(venue)) return 1;
    if ((venue.venue_status || '').trim() === '营业中') return 2;
    if (getVenueStatusGroup(venue) === '休息中') return 3;
    return 99;
}

function getLiveMarkedTimestamp(venue) {
    if (!venue.live_marked_at) return Number.MAX_SAFE_INTEGER;
    const t = new Date(String(venue.live_marked_at).replace(' ', 'T')).getTime();
    return Number.isNaN(t) ? Number.MAX_SAFE_INTEGER : t;
}
function isVenueLive(venue) {
    return (venue.venue_status || '').trim() === '营业中'
        && Number(venue.is_live || 0) === 1;
}

function getVenueStatusGroup(venue) {
    const status = (venue.venue_status || '').trim();

    // 建设中也归到休息中
    if (status === '建设中') {
        return '休息中';
    }

    return status;
}
function needPriorityReview(venue) {
    return Number(venue.need_live_review || 0) === 1;
}

function formatReviewTime(value) {
    if (!value) return '';
    const str = String(value).replace('T', ' ');
    return str.length >= 16 ? str.slice(0, 16) : str;
}
function updateStats(venues) {
    const openCount = venues.filter(v => getVenueStatusGroup(v) === '营业中').length;
    const restCount = venues.filter(v => getVenueStatusGroup(v) === '休息中').length;

    document.getElementById('open-count').textContent = openCount;
    document.getElementById('rest-count').textContent = restCount;
}
function renderVenues(list) {
    if (!list.length) {
        venueList.innerHTML = `<div class="loading">暂无符合条件的场地</div>`;
        return;
    }

    const venueHTML = list.map(venue => {
        const status = (venue.venue_status || '').trim();
        const isOpen = status === '营业中';
        const isBuild = status === '建设中';
        const isLive = isVenueLive(venue);
        const isPriorityReview = needPriorityReview(venue);

        const isSpendingAlert = Number(venue.is_spending_alert || 0) === 1;
        const venueLevel = normalizeVenueLevel(venue.venue_level);
        // const isDrSynced = String(venue.dr_venue_id || '').trim() !== '';

        return `
            <div class="venue-card ${isOpen ? 'status-open' : (isBuild ? 'status-build' : 'status-rest')}">
                <div class="venue-card-top">
                    <img class="venue-img" src="${escapeHtml(venue.image_url || 'default-image.jpg')}">

                    <div class="venue-info">
                        <span class="venue-name">ID:${venue.id}-${escapeHtml(venue.venue_name)}</span>
                        ${venue.venue_subtitle ? `<span class="venue-subtitle">${escapeHtml(venue.venue_subtitle)}</span>` : ''}

<div class="venue-meta-row">
    <button type="button"
        class="venue-status-badge venue-status-switch ${isOpen ? 'open' : (isBuild ? 'build' : 'rest')}"
        onclick="setVenueStatus(${venue.id}, '${status || '休息中'}')"
        title="点击切换场地状态">
    ${escapeHtml(status || '未知')}
</button>
    ${isLive ? `<span class="venue-live-badge">直播中</span>` : ''}
    ${isPriorityReview ? `<span class="venue-review-badge">优先检测</span>` : ''}
</div>

${isPriorityReview ? `
<div class="review-time-row">
    <span class="review-time-label">待复检时间</span>
    <span class="review-time-value">
        ${venue.last_live_cleared_at ? escapeHtml(formatReviewTime(venue.last_live_cleared_at)) : '刚进入待检测'}
    </span>
</div>
` : ''}

${isLive ? `
<div class="live-time-row">
    <span class="live-time-label">上位时间</span>
    <span class="live-time-value">
        ${venue.live_marked_at ? escapeHtml(formatLiveMarkedAt(venue.live_marked_at)) : '暂无或者测试场地'}
    </span>
</div>
` : ''}

<div class="venue-detail-grid">
    <span class="venue-pill venue-pill-blue venue-pill-desc" title="${escapeHtml(venue.venue_description || '')}">
        <span class="venue-pill-text">${escapeHtml(venue.venue_description || '暂无描述')}</span>
    </span>

    <span class="venue-pill venue-pill-amber venue-pill-tag">
        标签：${escapeHtml(venue.venue_tags || '未设置')}
    </span>

    <span class="venue-pill venue-pill-cyan venue-pill-time">
        开放时间：${escapeHtml(venue.start_time || '未设置')}
    </span>

    <span class="venue-pill venue-pill-spending ${isSpendingAlert ? 'venue-pill-orange' : 'venue-pill-gray'}">
        高消费：${isSpendingAlert ? '已开启' : '未开启'}
    </span>
</div>
                    </div>
                </div>

<div class="venue-action-area">
    <div class="venue-actions">
        <button class="edit-btn" onclick="editVenue(${venue.id})">修改信息</button>
        ${venue.is_banned_venue
            ? `<button class="unban-btn" onclick="openUnbanModal(${venue.id})">解封</button>`
            : `<button class="ban-btn" onclick="openBanModal(${venue.id})">封禁</button>`
        }

    </div>
</div>
            </div>
        `;
    }).join('');

    venueList.innerHTML = venueHTML;
}

            function updateStatCardActive() {
                statCards.forEach(card => {
                    const status = card.getAttribute('data-status');
                    card.classList.toggle('active', currentStatus === status);
                });
            }

function applyFilters() {
    const keyword = venueSearch.value.trim().toLowerCase();
    const selectedLevel = ''; // 评级筛选已停用
    let filtered = [...allVenues];

    filtered = filtered.filter(v => getVenueStatusGroup(v) === currentStatus);

    if (keyword) {
        filtered = filtered.filter(v => {
            const idText = String(v.id || '');
            const nameText = String(v.venue_name || '').toLowerCase();
            const subtitleText = String(v.venue_subtitle || '').toLowerCase();
            const mixText = `${v.id} - ${v.venue_name} - ${v.venue_subtitle || ''}`.toLowerCase();
            return idText.includes(keyword)
                || nameText.includes(keyword)
                || subtitleText.includes(keyword)
                || mixText.includes(keyword);
        });
    }

    if (selectedLevel) {
        filtered = filtered.filter(v => normalizeVenueLevel(v.venue_level) === selectedLevel);
    }

    updateStatCardActive();
    renderVenues(filtered);
}

statCards.forEach(card => {
    card.addEventListener('click', function () {
        currentStatus = this.getAttribute('data-status');
        applyFilters();
    });
});
window.setVenueStatus = function (venueId, currentStatus) {
    const current = String(currentStatus || '').trim() === '营业中' ? '营业中' : '休息中';
    const nextStatus = current === '营业中' ? '休息中' : '营业中';

    if (!confirm(`确定把该场地状态从【${current}】改为【${nextStatus}】吗？`)) {
        return;
    }

    const formData = new FormData();
    formData.append('action', 'set_venue_status');
    formData.append('venue_id', venueId);
    formData.append('venue_status', nextStatus);

    fetch('/api/venue/VenuesManagement.php', {
        method: 'POST',
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        if (data.code === 0 || data.code === 200) {
            alert(data.msg || '状态修改成功');
            loadVenues();
        } else {
            alert(data.msg || '状态修改失败');
        }
    })
    .catch(err => {
        console.error('设置场地状态失败:', err);
        alert('请求异常');
    });
};

window.setVenueLevel = function (venueId, venueLevel) {
    const level = normalizeVenueLevel(venueLevel);
    const rateText = getVenueLevelRateText(level);

    if (!confirm(`确定把该场地评级修改为 ${level}（${rateText}）吗？`)) {
        loadVenues();
        return;
    }

    const formData = new FormData();
    formData.append('action', 'set_venue_level');
    formData.append('venue_id', venueId);
    formData.append('venue_level', level);

    fetch('/api/venue/VenuesManagement.php', {
        method: 'POST',
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        if (data.code === 0 || data.code === 200) {
            alert(data.msg || '评级修改成功');
            loadVenues();
        } else {
            alert(data.msg || '评级修改失败');
            loadVenues();
        }
    })
    .catch(err => {
        console.error('设置场地评级失败:', err);
        alert('请求异常');
        loadVenues();
    });
};
            function loadVenues() {
                loading.style.display = 'block';
                venueList.innerHTML = '';

                const formData = new FormData();
                formData.append('action', 'loadingdata');

                fetch('/api/venue/VenuesManagement.php', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    loading.style.display = 'none';

                    if (data.code === 200) {
                        const venues = Array.isArray(data.data) ? data.data : [];
                        window.role = data.role;

                        const venueOptions = document.getElementById('venue_options');
                        venueOptions.innerHTML = '';
                        venueMap.clear();

                        venues.forEach(venue => {
                            const option = document.createElement('option');
                            option.value = `${venue.id} - ${venue.venue_name}${venue.venue_subtitle ? ` - ${venue.venue_subtitle}` : ''}`;
                            venueOptions.appendChild(option);
                            venueMap.set(venue.id, venue.venue_name);
                        });

allVenues = venues.sort((a, b) => {
    const statusDiff = getStatusOrder(a) - getStatusOrder(b);
    if (statusDiff !== 0) return statusDiff;

    // 两个都是推荐位直播时，按上位时间排
    if (isRecommendTop(a) && isRecommendTop(b)) {
        const timeDiff = getLiveMarkedTimestamp(a) - getLiveMarkedTimestamp(b);
        if (timeDiff !== 0) return timeDiff; // 越早上位越靠前 return -timeDiff;
    }

    return Number(a.id) - Number(b.id);
});

                        updateStats(allVenues);
                        applyFilters();
                    } else {
                        venueList.innerHTML = `<div class="loading">加载失败：${data.msg || '未知错误'}</div>`;
                        console.error(data.msg);
                    }
                })
                .catch(error => {
                    loading.style.display = 'none';
                    venueList.innerHTML = `<div class="loading">数据加载出错</div>`;
                    console.error('数据加载出错:', error);
                });
                
               
            }
             window.loadVenues = loadVenues;
            addVenueForm.addEventListener('submit', function (e) {
                e.preventDefault();
                const formData = new FormData(this);
                formData.append('action', 'addvenues');

                fetch('/api/venue/VenuesManagement.php', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.code === 0) {
                        let msg = data.msg || '场地添加成功';
                    
                        if (data.sync_overseas) {
                            if (data.sync_overseas.ok) {
                                const drVenueId = data.dr_venue_id || data.sync_overseas.dr_venue_id || '';
                                msg += '\n海外 DR 同步成功' + (drVenueId ? `，DR场地ID：${drVenueId}` : '');
                            }else {
                                msg += '\n海外 DR 同步失败：' + (data.sync_overseas.error || data.sync_overseas.msg || '未知错误');
                            }
                        }
                    
                        alert(msg);
                    
                        addVenueForm.reset();
                        addVenueForm.style.display = 'none';
                        document.getElementById('venue_search').style.display = 'block';
                        document.getElementById('venue_level_filter').style.display = 'block';
                        document.querySelector('.venue-toolbar').style.display = 'block';
                        loadVenues();
                    } else {
                        alert(data.msg);
                    }
                })
                .catch(error => {
                    console.error('添加场地出错:', error);
                });
            });

            venueSearch.addEventListener('input', applyFilters);
            if (venueLevelFilter) venueLevelFilter.addEventListener('change', applyFilters);

            loadVenues();
            // 新增：封禁描述模板点击事件
            document.querySelectorAll('.ban-desc-option').forEach(btn => {
                btn.addEventListener('click', function () {
                    setBanDescriptionTemplate(this.dataset.template);
                });
            });
            document.querySelector('.modal-close').addEventListener('click', () => {
                document.getElementById('banModal').style.display = 'none';
            });

            window.addEventListener('click', function (event) {
                const banModal = document.getElementById('banModal');
                if (event.target === banModal) banModal.style.display = 'none';
            });

            // 图片/视频预览
            // 图片/视频预览，最多3个
            const banInput = document.getElementById('banImage');
            const previewList = document.getElementById('banPreviewList');
            
            function renderBanPreviews(files) {
                previewList.innerHTML = '';
            
                files.forEach(file => {
                    const url = URL.createObjectURL(file);
                    const isMp4 = file.type === 'video/mp4' || file.name.toLowerCase().endsWith('.mp4');
            
                    let el;
                    if (isMp4) {
                        el = document.createElement('video');
                        el.controls = true;
                        el.src = url;
                        el.className = 'ban-preview-video';
                    } else {
                        el = document.createElement('img');
                        el.src = url;
                        el.className = 'ban-preview-img';
                    }
            
                    previewList.appendChild(el);
                });
            }
            
            banInput.addEventListener('change', function () {
                const files = Array.from(this.files || []);
            
                if (files.length > 3) {
                    alert('最多只能上传3个文件');
                    this.value = '';
                    previewList.innerHTML = '';
                    return;
                }
            
                renderBanPreviews(files);
            });
            
            async function uploadBanFile(file) {
                const fd = new FormData();
                fd.append('file', file);
            
                const upRes = await fetch('/api/devMgr/upload_violation_image.php', {
                    method: 'POST',
                    body: fd
                });
            
                const upJson = await upRes.json();
            
                if (!upRes.ok || upJson.code !== 0) {
                    throw new Error(upJson.msg || upRes.status);
                }
            
                const imageUrl = upJson.data && upJson.data.image_url ? upJson.data.image_url : '';
            
                if (!imageUrl) {
                    throw new Error('上传接口未返回 image_url');
                }
            
                return imageUrl;
            }
            
            // 提交封禁：先上传最多3个文件，再封禁
            document.getElementById('banForm').addEventListener('submit', async function (e) {
                e.preventDefault();
            
                const venueId = document.getElementById('banVenueId').value;
                const duration = document.getElementById('banDuration').value;
                const reason = document.getElementById('banReason').value;
            
                if (!reason.trim()) {
                    alert('请填写封禁描述');
                    return;
                }
            
                const fileInput = document.getElementById('banImage');
                const files = Array.from(fileInput.files || []);
            
                if (files.length > 3) {
                    alert('最多只能上传3个文件');
                    return;
                }
            
                let imageUrls = [];
            
                if (files.length > 0) {
                    try {
                        for (const file of files) {
                            const url = await uploadBanFile(file);
                            imageUrls.push(url);
                        }
                    } catch (err) {
                        alert('文件上传异常：' + err.message);
                        return;
                    }
                }
            
                const xhr = new XMLHttpRequest();
                xhr.open('POST', '/api/devMgr/devMgtV2.php', true);
                xhr.setRequestHeader('Content-Type', 'application/json');
            
                xhr.onreadystatechange = function () {
                    if (xhr.readyState === 4) {
                        if (xhr.status === 200) {
                            try {
                                const response = JSON.parse(xhr.responseText);
                                if (response.code === 0) {
                                    alert('封禁成功');
                                    document.getElementById('banModal').style.display = 'none';
                                    loadVenues();
                                } else {
                                    alert('封禁失败: ' + response.msg);
                                }
                            } catch (err) {
                                console.error('响应解析失败:', err);
                                alert('服务器响应格式错误');
                            }
                        } else {
                            alert('请求失败，状态码: ' + xhr.status);
                        }
                    }
                };
            
                const data = {
                    ban: true,
                    id: 1,
                    venue_id: venueId,
                    banType: 'venue',
                    ban_duration: parseInt(duration, 10),
                    ban_reason: reason.trim(),
            
                    // 兼容后端单字段
                    image_url: imageUrls[0] || null,
                    image_url_2: imageUrls[1] || null,
                    image_url_3: imageUrls[2] || null,
            
                    // 也传数组，后端以后扩展更方便
                    image_urls: imageUrls
                };
            
                xhr.send(JSON.stringify(data));
            });
        });

        function editVenue(venueId) {
            window.location.href = `venue.html?id=${venueId}`;
        }

        function openUnbanModal(venueId) {
            document.getElementById('unbanVenueId').value = venueId;
            document.getElementById('unbanReason').value = '场地已完成整改，申请解除封禁并承诺后续合规运营。';
            document.getElementById('unbanModal').style.display = 'block';
        }

        document.addEventListener('DOMContentLoaded', function () {
            const closeBtn = document.querySelector('.unban-modal-close');
            if (closeBtn) {
                closeBtn.addEventListener('click', () => {
                    document.getElementById('unbanModal').style.display = 'none';
                });
            }

            window.addEventListener('click', function (event) {
                const modal = document.getElementById('unbanModal');
                if (event.target === modal) modal.style.display = 'none';
            });

            document.getElementById('unbanForm').addEventListener('submit', function (e) {
                e.preventDefault();
            
                const venueId = document.getElementById('unbanVenueId').value;
                const reason = document.getElementById('unbanReason').value.trim();
                const submitBtn = this.querySelector('button[type="submit"]');
            
                if (!reason) {
                    alert('请填写解封原因');
                    return;
                }
            
                if (submitBtn) {
                    submitBtn.disabled = true;
                    submitBtn.textContent = '解封中...';
                    submitBtn.style.opacity = '0.7';
                    submitBtn.style.cursor = 'not-allowed';
                }
            
                const formData = new FormData();
                formData.append('action', 'unban_venue');
                formData.append('venue_id', venueId);
                formData.append('unban_reason', reason);
            
                fetch('/api/venue/VenuesManagement.php', {
                    method: 'POST',
                    body: formData
                })
                .then(res => res.json())
                .then(data => {
                    // 兼容后端返回 code=0 或 code=200
                    if (data.code === 0 || data.code === 200) {
                        document.getElementById('unbanModal').style.display = 'none';
                        alert('解封成功');
            
                        // 稍微延迟一下，避免弹窗状态没来得及更新
                        setTimeout(() => {
                            location.reload();
                        }, 300);
                    } else {
                        alert('解封失败：' + (data.msg || data.message || '未知错误'));
                    }
                })
                .catch(err => {
                    alert('请求异常：' + err);
                })
                .finally(() => {
                    if (submitBtn) {
                        submitBtn.disabled = false;
                        submitBtn.textContent = '确认解封';
                        submitBtn.style.opacity = '1';
                        submitBtn.style.cursor = 'pointer';
                    }
                });
            });
        });
    </script>

<!-- 封禁模态框 -->
<div id="banModal" class="modal"
    style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.45); z-index: 1000;">
    
    <div class="ban-modal-content">
        <span class="modal-close"
            style="position: absolute; top: 14px; right: 18px; font-size: 24px; cursor: pointer;">&times;</span>

        <div class="ban-modal-title">封禁场地</div>

        <form id="banForm">
            <input type="hidden" id="banVenueId">

            <div class="ban-form-group">
                <label for="banDuration">封禁时长</label>
                <select id="banDuration" required>
                    <option value="600">10分钟</option>
                    <option value="1800">30分钟</option>
                    <option value="3600">1小时</option>
                    <option value="10800">3小时</option>
                    <option value="86400">一天</option>
                    <option value="259200">三天</option>
                    <option value="604800">一周</option>
                    <option value="1296000">半个月</option>
                    <option value="2592000">1月</option>
                    <option value="31536000">1年</option>
                </select>
            </div>

            <div class="ban-form-group">
                <label for="banReason">封禁描述</label>

                <div class="ban-desc-tips">选择下方模板后，可在输入框内继续自定义修改。</div>

                <div class="ban-template-list">
                    <button type="button" class="ban-desc-option" data-template="1">
                        选项1：严重违规，提示可能面临长时间处罚
                    </button>

                    <button type="button" class="ban-desc-option" data-template="2">
                        选项2：要求整改直播内容
                    </button>

                    <button type="button" class="ban-desc-option active" data-template="3">
                        选项3：通用违规处罚描述
                    </button>
                </div>

                <textarea id="banReason" placeholder="请输入封禁描述">场地存在违规行为,依照安全管理条例给予相应处罚,请尽快更改调整!</textarea>
            </div>

            <!--<div class="ban-form-group">-->
            <!--    <label for="banImage">违规图片/视频（可选）</label>-->
            <!--    <input type="file" id="banImage" accept="image/*,video/mp4" />-->
            <!--    <img id="banImagePreview" class="ban-preview-img" />-->
            <!--    <video id="banVideoPreview" class="ban-preview-video" controls></video>-->
            <!--</div>-->
            <div class="ban-form-group">
                <label for="banImage">违规图片/视频（可选，最多3个）</label>
                <input type="file" id="banImage" accept="image/*,video/mp4" multiple />
                <div id="banPreviewList" class="ban-preview-list"></div>
            </div>
            <button type="submit" class="ban-submit-btn">确认封禁</button>
        </form>
    </div>
</div>

    <!-- 解封模态框 -->
    <div id="unbanModal" class="modal"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.4); z-index: 1000;">
        <div class="modal-content"
            style="background:#fff; width:400px; margin:10% auto; padding:20px; border-radius:8px; position:relative;">
            <span class="unban-modal-close"
                style="position:absolute; top:10px; right:15px; font-size:20px; cursor:pointer;">&times;</span>
            <h2>解封场地</h2>
            <form id="unbanForm">
                <input type="hidden" id="unbanVenueId">
                <div class="form-group">
                    <label for="unbanReason">解封原因</label>
                    <textarea id="unbanReason" rows="3" style="width:100%;" placeholder="请填写解封原因（必填）"></textarea>
                </div>
                <button type="submit"
                    style="margin-top:10px; background-color:#5b8cff; color:#fff; border:none; padding:10px 15px; border-radius:6px; cursor:pointer;">
                    确认解封
                </button>
            </form>
        </div>
    </div>
</body>
