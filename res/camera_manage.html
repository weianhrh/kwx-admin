<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>摄像头版本管理</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
:root {
  --bg: #f4f7f8;
  --panel: #ffffff;
  --text: #172126;
  --muted: #6b7d84;
  --subtle: #8aa0a8;
  --line: #dfe8eb;
  --line-strong: #c9d8dd;
  --primary: #0f8f8c;
  --primary-dark: #08706e;
  --primary-soft: #e6f6f5;
  --success: #20a876;
  --success-soft: #e8f7f1;
  --warning: #ffb84d;
  --warning-soft: #fff5df;
  --danger: #df5b57;
  --danger-soft: #ffefef;
  --blue: #2f7df6;
  --blue-soft: #eef5ff;
  --purple: #7c5cff;
  --purple-soft: #f0edff;
  --shadow: 0 12px 34px rgba(30, 55, 66, .08);
  --shadow-sm: 0 8px 22px rgba(30, 55, 66, .07);
  --radius: 8px;
  --transition: all .16s ease;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "HarmonyOS Sans SC", "Microsoft YaHei", Arial, sans-serif;
  -webkit-tap-highlight-color: transparent;
}

html,
body {
  width: 100%;
  min-height: 100%;
}

body {
  min-width: 320px;
  min-height: 100vh;
  padding: 26px 28px 34px;
  color: var(--text);
  background: var(--bg);
  overflow-x: hidden;
}

body > canvas {
  display: none !important;
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  user-select: none;
}

input,
select,
textarea {
  outline: none;
}

.container {
  width: 100%;
  max-width: none;
  margin: 0 auto;
}

.card {
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--panel);
  box-shadow: var(--shadow);
  margin-bottom: 18px;
  padding: 0;
}

.card:hover {
  box-shadow: var(--shadow);
}

.card-title-container {
  min-height: 58px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 12px 18px;
  border-bottom: 1px solid var(--line);
  background: #fff;
}

.card-title {
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--text);
  font-size: 20px;
  line-height: 1.2;
  font-weight: 900;
  letter-spacing: .01em;
  padding: 0;
  margin: 0;
  min-width: 0;
}

.card-title::before {
  content: "";
  width: 8px;
  height: 20px;
  border-radius: 999px;
  background: var(--primary);
  flex: 0 0 auto;
}

form,
.card > .form-group,
.card > form,
.output-container,
.query-result {
  padding: 18px;
}

.card > .form-group + .form-group,
form .form-group + .form-group {
  margin-top: 12px;
}

.form-group {
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 7px;
}

.form-group label {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.2;
  font-weight: 800;
}

.form-group input,
.form-group textarea,
.form-group select {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  color: var(--text);
  background: #fff;
  font-size: 13px;
  transition: border .16s ease, box-shadow .16s ease, background .16s ease;
}

.form-group input,
.form-group select {
  min-height: 38px;
  padding: 0 12px;
}

.form-group textarea {
  min-height: 160px;
  padding: 12px;
  resize: vertical;
  line-height: 1.6;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
}

.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus {
  border-color: rgba(15, 143, 140, .48);
  box-shadow: 0 0 0 4px rgba(15, 143, 140, .10);
}

.form-group select {
  cursor: pointer;
}

.action-button,
button.action-button {
  min-height: 38px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 0 16px;
  border: 1px solid var(--primary);
  border-radius: var(--radius);
  color: #fff;
  background: var(--primary);
  cursor: pointer;
  white-space: nowrap;
  font-size: 13px;
  line-height: 1;
  font-weight: 900;
  transition: border-color .16s ease, background .16s ease, box-shadow .16s ease, transform .16s ease;
}

.action-button:hover:not(:disabled) {
  border-color: var(--primary-dark);
  background: var(--primary-dark);
  box-shadow: 0 8px 18px rgba(15, 143, 140, .16);
  transform: translateY(-1px);
}

.action-button:disabled {
  cursor: not-allowed;
  opacity: .55;
  box-shadow: none;
  transform: none;
}

.query-result {
  padding-top: 0;
  color: var(--muted);
  font-size: 13px;
  font-weight: 700;
}

.query-result p {
  padding: 22px 16px;
  border: 1px dashed var(--line-strong);
  border-radius: var(--radius);
  background: #fbfcfd;
  text-align: center;
}

.result-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: #fff;
}

.result-table th,
.result-table td {
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
  color: var(--text);
  text-align: left;
  font-size: 13px;
  line-height: 1.45;
  word-break: break-all;
}

.result-table th {
  color: var(--muted);
  background: #fbfcfd;
  font-size: 12px;
  font-weight: 900;
}

.result-table tr:last-child td {
  border-bottom: 0;
}

.result-table tr:hover td {
  background: var(--primary-soft);
}

.output-container {
  border-top: 1px solid var(--line);
  background: #fff;
}

.output-container h3 {
  margin: 0 0 12px;
  color: var(--text);
  font-size: 15px;
  font-weight: 900;
}

pre {
  width: 100%;
  min-height: 110px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  color: #d9e5e8;
  background: #132328;
  overflow: auto;
  white-space: pre-wrap;
  word-break: break-all;
  font-size: 12px;
  line-height: 1.6;
}

.camera-card {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px 14px;
  margin-top: 12px;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: #fbfcfd;
  box-shadow: var(--shadow-sm);
  transition: border-color .16s ease, box-shadow .16s ease, transform .16s ease;
}

.camera-card:hover {
  border-color: var(--line-strong);
  box-shadow: 0 12px 28px rgba(30, 55, 66, .10);
  transform: translateY(-1px);
}

.camera-card div {
  min-width: 0;
  color: var(--text);
  font-size: 13px;
  line-height: 1.55;
  word-break: break-all;
}

.camera-card strong {
  color: var(--muted);
  font-size: 12px;
  font-weight: 900;
}

@media (max-width: 760px) {
  body {
    padding: 12px;
  }

  .card-title-container {
    min-height: auto;
    align-items: stretch;
    flex-direction: column;
    padding: 14px;
  }

  .card-title {
    font-size: 18px;
  }

  form,
  .card > .form-group,
  .card > form,
  .output-container,
  .query-result {
    padding: 12px;
  }

  .action-button,
  button.action-button {
    width: 100%;
  }

  .result-table {
    display: block;
    overflow-x: auto;
    white-space: nowrap;
  }

  .camera-card {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="card-title-container">
        <h2 class="card-title">摄像头版本管理</h2>
        <button type="button" class="action-button" onclick="submitForm('get')">获取版本</button>
        <button type="button" class="action-button" onclick="submitForm('upgrade')">升级版本</button>
      </div>
      <form id="cameraForm">
        <div class="form-group">
          <label for="dev_ids">设备 DevId（每行一个）</label>
          <textarea id="dev_ids" name="dev_ids" rows="8" required></textarea>
        </div>
      </form>
    <!-- 渲染区域：清晰表格 -->
    <div class="output-container">
      <h3>返回结果：</h3>
      <div id="result_table"></div>
    </div>

    </div>
  </div>

 <script>
    function submitForm(action) {
      const form = document.getElementById('cameraForm');
      const formData = new FormData(form);
      const url = action === 'get' ? '/api/operat/get_device_ver.php' : '/api/operat/upgrade_device_ver.php';

      fetch(url, {
        method: 'POST',
        body: formData
      })
      .then(res => res.json())
        .then(data => {
          const container = document.getElementById('result_table');
        
          // 支持 get 和 upgrade 两种结构（兼容数组 / 单个对象）
          const resultList = Array.isArray(data.list) ? data.list : (Array.isArray(data) ? data : [data]);
        
          const cards = resultList.map(item => {
            const devId = item.DevId || '(未知设备)';
            const code = item.code ?? 0;
        
            // 判断是否 upgrade 类型结果（有 newver）
            const isUpgradeResult = item.data && (item.data.curver || item.data.newver);
            const isSuccess = code === 200;
        
            if (isUpgradeResult) {
              const statusHtml = isSuccess
                ? `<span style="color:green;"><i class="fas fa-check-circle"></i> 升级成功</span>`
                : `<span style="color:red;"><i class="fas fa-times-circle"></i> 升级失败</span>`;
        
              const curver = item.data.curver ?? '-';
              const newver = item.data.newver ?? '-';
              const down = item.data.down === 1 ? '✔️ 已下载' : '❌ 未下载';
              const reason = item.reason ?? '-';
        
              return `
                <div class="camera-card">
                  <div><strong>📷 DevId：</strong>${devId}</div>
                  <div><strong>🚀 升级状态：</strong>${statusHtml}</div>
                  ${isSuccess ? `
                    <div><strong>🧩 当前版本：</strong>${curver}</div>
                    <div><strong>📦 新版本：</strong>${newver}</div>
                    <div><strong>💾 下载状态：</strong>${down}</div>
                    <div><strong>🧬 RandId：</strong>${item.data?.RandId || '-'}</div>
                  ` : `
                    <div><strong>❗ 错误原因：</strong>${reason}</div>
                  `}
                </div>
              `;
            } else {
              // get 状态
              const isOnline = item.status === 1;
              const statusHtml = isOnline
                ? `<span style="color:green;"><i class="fas fa-check-circle"></i> 在线</span>`
                : `<span style="color:red;"><i class="fas fa-times-circle"></i> 离线</span>`;
        
              return `
                <div class="camera-card">
                  <div><strong>📷 DevId：</strong>${item.DevId}</div>
                  <div><strong>📶 状态：</strong>${statusHtml}</div>
                  <div><strong>🔢 版本号：</strong>${item.Ver || '-'}</div>
                  <div><strong>🌐 控制服务器：</strong>${item.CtlServer || '-'}</div>
                  <div><strong>🧬 RandId：</strong>${item.RandId || '-'}</div>
                </div>
              `;
            }
          }).join('');
        
          container.innerHTML = cards;
        })


      .catch(err => {
        document.getElementById('result').textContent = '请求失败：' + err;
      });
    }
  </script>
</body>
</html>
