<!DOCTYPE html>
<html lang="zh-CN">
<!-- PaymentDisbursement.html - Stitch风格优化版 -->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>提现申请</title>
  <style>
    :root {
      --page-bg: #f4f7f8;
      --card-bg: #ffffff;
      --card-soft: #f8fbfc;
      --border: #dfe8eb;
      --border-light: #edf3f5;
      --text: #172126;
      --muted: #6b7d84;
      --muted-2: #8aa0a8;
      --primary: #0f8f8c;
      --primary-dark: #08706e;
      --primary-soft: #e6f6f5;
      --warning: #d58a16;
      --warning-soft: #fff6e4;
      --danger: #df5b57;
      --danger-soft: #fff0f0;
      --success-bg: #e8f7f1;
      --success-text: #168a61;
      --pending-bg: #fff5df;
      --pending-text: #a66a00;
      --danger-bg: #ffefef;
      --danger-text: #c84d4a;
      --shadow: 0 14px 38px rgba(30, 55, 66, .08);
      --shadow-sm: 0 8px 22px rgba(30, 55, 66, .06);
      --radius: 10px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "HarmonyOS Sans SC", "Microsoft YaHei", Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
    }

    body {
      min-width: 320px;
      min-height: 100vh;
      padding: 22px 24px 32px;
      color: var(--text);
      background:
        linear-gradient(90deg, rgba(15, 143, 140, .045), rgba(47, 125, 246, .035) 56%, rgba(213, 138, 22, .025)),
        var(--page-bg);
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      user-select: none;
    }

    input {
      outline: none;
    }

    .page {
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
    }

    .page-title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 44px;
      margin: 0 0 16px;
      color: var(--text);
      font-size: 22px;
      line-height: 1.2;
      font-weight: 900;
      letter-spacing: 0;
    }

    .page-title::before {
      content: "";
      width: 8px;
      height: 22px;
      border-radius: 999px;
      background: var(--primary);
      box-shadow: 0 6px 14px rgba(15, 143, 140, .20);
      flex: 0 0 auto;
    }

    .section-card {
      margin-bottom: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .98);
      box-shadow: var(--shadow);
    }

    .section-head {
      padding: 18px 20px 14px;
    }

    .section-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 9px;
      color: var(--text);
      font-size: 17px;
      line-height: 1.25;
      font-weight: 900;
    }

    .section-title::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 0 5px var(--primary-soft);
      flex: 0 0 auto;
    }

    .section-desc {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .account-line {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .account-chip {
      max-width: 100%;
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      padding: 0 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: #33464d;
      background: #f8fbfc;
      font-size: 13px;
      line-height: 30px;
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .amount-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      padding: 0 20px 20px;
      border-top: 0;
    }

    .amount-item {
      min-height: 84px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #ffffff;
      box-shadow: var(--shadow-sm);
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease, background .16s ease;
    }

    .amount-item:hover {
      transform: translateY(-1px);
      border-color: rgba(15, 143, 140, .28);
      box-shadow: 0 12px 28px rgba(30, 55, 66, .10);
    }

    .amount-item:nth-child(3n),
    .amount-item:nth-child(2n),
    .amount-item:nth-last-child(-n + 3),
    .amount-item:nth-last-child(-n + 2) {
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .amount-icon {
      width: 40px;
      min-width: 40px;
      height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      color: var(--primary);
      background: var(--primary-soft);
      font-size: 24px;
      line-height: 1;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      font-weight: 900;
    }

    .amount-content {
      min-width: 0;
      flex: 1;
    }

    .amount-label {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.25;
      font-weight: 800;
    }

    .amount-value {
      margin-top: 6px;
      color: var(--text);
      font-size: 22px;
      line-height: 1.1;
      font-weight: 900;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .amount-value small {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .amount-item.is-primary {
      border-color: rgba(15, 143, 140, .22);
      background: linear-gradient(135deg, #ffffff, #f1fbfa);
    }

    .amount-item.is-primary .amount-icon {
      color: #fff;
      background: var(--primary);
    }

    .amount-item.is-primary .amount-value {
      color: var(--primary-dark);
    }

    .amount-item.is-primary .amount-label {
      color: var(--primary-dark);
    }

    .amount-item.is-warning {
      border-color: rgba(213, 138, 22, .22);
      background: linear-gradient(135deg, #fff, #fffaf0);
    }

    .amount-item.is-warning .amount-icon {
      color: var(--warning);
      background: var(--warning-soft);
    }

    .amount-item.is-warning .amount-value {
      color: #9a5d00;
    }

    .amount-item.is-warning .amount-label {
      color: #8a5a0a;
    }

    .amount-item.is-danger {
      border-color: rgba(223, 91, 87, .24);
      background: linear-gradient(135deg, #fff, #fff5f5);
    }

    .amount-item.is-danger .amount-icon {
      color: var(--danger);
      background: var(--danger-soft);
    }

    .amount-item.is-danger .amount-value,
    .amount-item.is-danger .amount-label {
      color: var(--danger-text);
    }

    .amount-item.is-muted .amount-icon {
      color: var(--muted);
      background: #eef3f5;
    }

    .amount-grid.has-full .amount-item.amount-full {
      grid-column: 1 / -1;
      min-height: 76px;
      padding: 16px 18px;
      border-color: rgba(15, 143, 140, .28);
      background:
        linear-gradient(135deg, rgba(15, 143, 140, .09), rgba(15, 143, 140, .035)),
        #ffffff;
    }

    .amount-grid.has-full .amount-item.amount-full .amount-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      width: 100%;
    }

    .amount-grid.has-full .amount-item.amount-full .amount-label {
      color: var(--primary-dark);
      font-size: 15px;
      white-space: nowrap;
    }

    .amount-grid.has-full .amount-item.amount-full .amount-value {
      margin-top: 0;
      color: var(--primary-dark);
      font-size: clamp(24px, 3.2vw, 34px);
      text-align: right;
    }

    .check-money-btn {
      min-height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-left: 0;
      padding: 0 9px;
      border: 1px solid rgba(15, 143, 140, .24);
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary-dark);
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
      vertical-align: middle;
      transition: background .16s ease, border-color .16s ease, color .16s ease;
    }

    .check-money-btn:hover {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }

    .help-dot {
      width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-left: 0;
      padding: 0;
      border: 1px solid rgba(15, 143, 140, .28);
      border-radius: 50%;
      color: var(--primary-dark);
      background: var(--primary-soft);
      font-size: 11px;
      line-height: 1;
      font-weight: 900;
      cursor: pointer;
      vertical-align: middle;
    }

    .amount-item.help-clickable {
      cursor: pointer;
    }

    .withdraw-box {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 148px 188px;
      gap: 10px;
      padding: 0 20px 20px;
      border-top: 0;
    }

    .form-topline {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }

    .fee-tip {
      color: var(--muted);
      font-weight: 700;
      white-space: nowrap;
    }

    .withdraw-input {
      width: 100%;
      height: 42px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      padding: 0 13px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease, background .15s ease;
    }

    .withdraw-input:focus {
      border-color: rgba(15, 143, 140, .55);
      box-shadow: 0 0 0 4px rgba(15, 143, 140, .10);
    }

    .withdraw-button,
    .ledger-button,
    .custom-modal-btn {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1;
      font-weight: 900;
      cursor: pointer;
      transition: background .16s ease, border-color .16s ease, color .16s ease, box-shadow .16s ease, transform .16s ease, opacity .16s ease;
    }

    .withdraw-button {
      width: 100%;
      height: 42px;
      margin-top: 0;
      border: 1px solid var(--primary);
      background: var(--primary);
      color: #fff;
      box-shadow: 0 10px 22px rgba(15, 143, 140, .18);
    }

    .withdraw-button:hover {
      border-color: var(--primary-dark);
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .withdraw-button:disabled {
      border-color: #c9d8dd;
      background: #c9d8dd;
      box-shadow: none;
      color: #fff;
      cursor: not-allowed;
      transform: none;
      opacity: .88;
    }

    .ledger-button {
      width: 100%;
      height: 42px;
      margin-top: 0;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--primary-dark);
    }

    .ledger-button:hover {
      border-color: rgba(15, 143, 140, .35);
      background: var(--primary-soft);
      transform: translateY(-1px);
    }

    .status-message {
      grid-column: 1 / -1;
      display: none;
      min-height: 32px;
      align-items: center;
      justify-content: center;
      margin-top: 0;
      border: 1px solid rgba(15, 143, 140, .18);
      border-radius: 8px;
      background: var(--primary-soft);
      color: var(--primary-dark);
      text-align: center;
      font-size: 13px;
      font-weight: 800;
    }

    .table-wrap {
      margin: 0 20px 0;
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      box-shadow: var(--shadow-sm);
    }

    table {
      width: 100%;
      min-width: 760px;
      border-collapse: separate;
      border-spacing: 0;
    }

    thead th {
      height: 42px;
      padding: 0 14px;
      border-bottom: 1px solid var(--border);
      background: #f8fbfc;
      color: #33464d;
      font-size: 13px;
      font-weight: 900;
      text-align: left;
      white-space: nowrap;
    }

    tbody td {
      height: 44px;
      padding: 0 14px;
      border-bottom: 1px solid var(--border-light);
      color: var(--text);
      font-size: 13px;
      white-space: nowrap;
      vertical-align: middle;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    tbody tr:hover td {
      background: #f8fbfc;
    }

    .amount-cell {
      font-weight: 900;
    }

    .record-no {
      display: inline-block;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      vertical-align: middle;
    }

    .badge {
      min-height: 24px;
      display: inline-flex;
      align-items: center;
      padding: 0 9px;
      border-radius: 999px;
      font-size: 12px;
      line-height: 24px;
      font-weight: 900;
    }

    .badge.pending {
      background: var(--pending-bg);
      color: var(--pending-text);
    }

    .badge.success {
      background: var(--success-bg);
      color: var(--success-text);
    }

    .badge.danger {
      background: var(--danger-bg);
      color: var(--danger-text);
    }

    .badge.gray {
      background: #eef3f5;
      color: var(--muted);
    }

    .detail-link {
      border: none;
      background: transparent;
      color: var(--primary-dark);
      cursor: pointer;
      font-size: 13px;
      font-weight: 900;
      padding: 4px 0;
    }

    .detail-link:hover {
      color: var(--primary);
      text-decoration: underline;
    }

    .empty-state {
      margin: 0 20px 20px;
      padding: 26px 18px;
      border: 1px dashed var(--border);
      border-radius: 10px;
      background: #f8fbfc;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .pager {
      min-height: 50px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      padding: 10px 20px 16px;
      color: var(--muted);
      font-size: 12px;
      flex-wrap: wrap;
    }

    .pager button {
      min-width: 30px;
      height: 30px;
      padding: 0 9px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
    }

    .pager button.active {
      border-color: var(--primary);
      background: var(--primary-soft);
      color: var(--primary-dark);
      font-weight: 900;
    }

    .pager button:hover:not(:disabled) {
      border-color: rgba(15, 143, 140, .35);
      color: var(--primary-dark);
    }

    .pager button:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .custom-modal-mask {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
      background: rgba(16, 34, 38, .46);
      backdrop-filter: blur(2px);
    }

    .custom-modal {
      width: min(476px, 100%);
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 22px 58px rgba(16, 34, 38, .20);
      animation: modalFadeIn .16s ease-out;
    }

    .custom-modal-head {
      min-height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      background: #f8fbfc;
    }

    .custom-modal-title {
      color: var(--text);
      font-size: 17px;
      font-weight: 900;
    }

    .custom-modal-close {
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
    }

    .custom-modal-close:hover {
      color: var(--danger);
    }

    .custom-modal-content {
      padding: 18px 20px 20px;
      color: var(--text);
      font-size: 14px;
      line-height: 1.8;
      white-space: pre-line;
      text-align: left !important;
    }

    .detail-list {
      display: grid;
      gap: 9px;
      width: 100%;
      margin: 0;
      justify-items: stretch;
      text-align: left;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 112px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
      justify-content: start;
      font-size: 14px;
      line-height: 1.45;
      text-align: left;
    }

    .detail-label {
      color: var(--muted);
      font-weight: 900;
      text-align: left;
    }

    .detail-value {
      color: var(--text);
      font-weight: 700;
      word-break: break-all;
      text-align: left;
    }

    .detail-note {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #f8fbfc;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .custom-modal-actions {
      padding: 0 20px 20px;
    }

    .custom-modal-btn {
      width: 100%;
      height: 42px;
      border: 1px solid var(--primary);
      background: var(--primary);
      color: #fff;
    }

    .custom-modal-btn:hover {
      border-color: var(--primary-dark);
      background: var(--primary-dark);
    }

    @keyframes modalFadeIn {
      from { opacity: 0; transform: translateY(8px) scale(.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (max-width: 1120px) {
      .amount-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .withdraw-box {
        grid-template-columns: minmax(0, 1fr) 140px 174px;
      }
    }

    @media (max-width: 820px) {
      body {
        padding: 14px 10px 28px;
      }

      .page-title {
        min-height: 38px;
        margin-bottom: 12px;
        font-size: 20px;
      }

      .section-card {
        margin-bottom: 12px;
        border-radius: 9px;
      }

      .section-head {
        padding: 15px 14px 12px;
      }

      .section-title {
        font-size: 16px;
      }

      .amount-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        padding: 0 14px 14px;
      }

      .amount-item {
        min-height: 76px;
        padding: 12px;
        gap: 9px;
      }

      .amount-icon {
        width: 32px;
        min-width: 32px;
        height: 32px;
        font-size: 20px;
        border-radius: 8px;
      }

      .amount-label {
        font-size: 12px;
      }

      .amount-value {
        font-size: 18px;
      }

      .amount-grid.has-full .amount-item.amount-full {
        grid-column: 1 / -1;
        min-height: 68px;
      }

      .amount-grid.has-full .amount-item.amount-full .amount-content {
        gap: 10px;
      }

      .amount-grid.has-full .amount-item.amount-full .amount-label {
        font-size: 13px;
      }

      .amount-grid.has-full .amount-item.amount-full .amount-value {
        font-size: clamp(20px, 5.6vw, 26px);
      }

      .withdraw-box {
        grid-template-columns: 1fr;
        padding: 0 14px 14px;
      }

      .form-topline,
      .status-message {
        grid-column: 1;
      }

      .withdraw-button,
      .ledger-button,
      .withdraw-input {
        height: 40px;
        min-height: 40px;
      }

      .table-wrap {
        margin: 0 14px;
      }

      table {
        min-width: 720px;
      }

      thead th,
      tbody td {
        padding: 0 12px;
      }

      .empty-state {
        margin: 0 14px 14px;
      }

      .pager {
        justify-content: flex-start;
        padding: 10px 14px 14px;
      }

      .detail-row {
        grid-template-columns: 94px minmax(0, 1fr);
      }

      .custom-modal-head {
        padding: 0 16px;
      }

      .custom-modal-content {
        padding: 16px;
      }

      .custom-modal-actions {
        padding: 0 16px 16px;
      }
    }

    @media (max-width: 520px) {
      .amount-grid {
        grid-template-columns: 1fr;
      }

      .amount-grid.has-full .amount-item.amount-full .amount-content {
        display: block;
      }

      .amount-grid.has-full .amount-item.amount-full .amount-value {
        margin-top: 6px;
        text-align: left;
      }

      .account-chip {
        width: 100%;
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1 class="page-title">提现申请</h1>

    <section class="section-card">
      <div class="section-head">
        <div class="section-title">账户信息</div>
        <div class="section-desc">账户信息用于提现账户展示，并完成可提现余额计算。</div>
        <div class="account-line" id="account-info">
          <span class="account-chip">账户信息加载中...</span>
        </div>
      </div>
    </section>

    <section class="section-card">
      <div class="section-head">
        <div class="section-title">余额详情</div>
      </div>
      <div class="amount-grid" id="amount-info">
        <div class="amount-item"><div class="amount-icon">≋</div><div class="amount-content"><div class="amount-label">总余额:</div><div class="amount-value">--</div></div></div>
        <div class="amount-item"><div class="amount-icon">❄</div><div class="amount-content"><div class="amount-label">可提现:</div><div class="amount-value">--</div></div></div>
        <div class="amount-item"><div class="amount-icon">↔</div><div class="amount-content"><div class="amount-label">冻结中:</div><div class="amount-value">--</div></div></div>
        <div class="amount-item"><div class="amount-icon">◷</div><div class="amount-content"><div class="amount-label">锁定订单:</div><div class="amount-value">--</div></div></div>
        <div class="amount-item"><div class="amount-icon">?</div><div class="amount-content"><div class="amount-label">待复核订单:</div><div class="amount-value">--</div></div></div>
        <div class="amount-item"><div class="amount-icon">▤</div><div class="amount-content"><div class="amount-label">未核对金额:</div><div class="amount-value">--</div></div></div>
      </div>
      <input type="hidden" id="available-balance" value="0">
      <input type="hidden" id="unsettled-image-fee-total" value="0">
      <input type="hidden" id="unsettled-image-ids" value="[]">
    </section>

    <section class="section-card">
      <div class="section-head">
        <div class="section-title-row">
          <div class="section-title">提现操作</div>
        </div>
      </div>
      <div class="withdraw-box">
        <div class="form-topline">
          <label for="withdraw-amount">提现金额</label>
          <!--<span class="fee-tip">手续费：以系统计算为准</span>-->
        </div>
        <input type="number" id="withdraw-amount" class="withdraw-input" placeholder="提现金额" min="0" step="0.01" />
        <button class="withdraw-button" id="withdraw-button" type="button" onclick="applyWithdrawal()">立即提现</button>
        <button class="ledger-button" type="button" onclick="window.location.href='VenueFundChanges.html'">场地流水变动记录</button>
        <div id="status-message" class="status-message">正在申请提现...</div>
      </div>
    </section>

    <section class="section-card">
      <div class="section-head">
        <div class="section-title">提现记录</div>
      </div>
      <div class="table-wrap" id="record-table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width: 90px;">状态</th>
              <th style="width: 170px;">申请时间</th>
              <th style="width: 120px;">提现金额</th>
              <th style="width: 120px;">图传扣减</th>
              <th style="width: 130px;">实际到账金额</th>
              <th style="width: 90px;">操作</th>
            </tr>
          </thead>
          <tbody id="withdrawal-tbody"></tbody>
        </table>
      </div>
      <div class="empty-state" id="empty-state" style="display:none;">暂无提现记录</div>
      <div class="pager" id="record-pager"></div>
    </section>
  </div>

  <div class="custom-modal-mask" id="custom-modal-mask" onclick="closeCustomModal()">
    <div class="custom-modal" onclick="event.stopPropagation()">
      <div class="custom-modal-head">
        <div class="custom-modal-title" id="custom-modal-title">提示</div>
        <button class="custom-modal-close" type="button" onclick="closeCustomModal()">×</button>
      </div>
      <div class="custom-modal-content" id="custom-modal-content"></div>
      <div class="custom-modal-actions">
        <button class="custom-modal-btn" type="button" onclick="closeCustomModal()">知道了</button>
      </div>
    </div>
  </div>

  <script>
    const API_ACCOUNT = '/api/pay/CalculateSettlements.php';
    const API_APPLY = '/api/pay/ApplyWithdrawal.php';
    const API_RECORDS = '/api/pay/getWithdrawalRecords.php';
    const pageVenueId = new URLSearchParams(window.location.search).get('venue_id') || '';

    function withVenueParam(url) {
      if (!pageVenueId) return url;
      return url + (url.includes('?') ? '&' : '?') + 'venue_id=' + encodeURIComponent(pageVenueId);
    }

    let accountCache = {};
    let withdrawalRecords = [];
    let currentPage = 1;
    const pageSize = 5;

    function money(value) {
      const num = parseFloat(value);
      if (isNaN(num)) return '0.00';
      return num.toFixed(2);
    }

    function esc(value) {
      return String(value ?? '').replace(/[&<>"']/g, s => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[s]));
    }

    function openCustomModal(title, content, isHtml) {
      document.getElementById('custom-modal-title').textContent = title || '提示';
      const contentEl = document.getElementById('custom-modal-content');
      if (isHtml) {
        contentEl.innerHTML = content || '';
      } else {
        contentEl.textContent = content || '';
      }
      document.getElementById('custom-modal-mask').style.display = 'flex';
    }

    function showCustomModal(title, content) {
      openCustomModal(title, content, false);
    }

    function closeCustomModal() {
      document.getElementById('custom-modal-mask').style.display = 'none';
    }

    function formatAmount(value, unit) {
      return `${money(value)} <small>${unit || '元'}</small>`;
    }

    function getReceivedAmount(record) {
      return record.actual_amount || (
        parseFloat(record.withdrawal_amount || 0)
        - parseFloat(record.withdrawal_fee || 0)
        - parseFloat(record.technical_service_fee || 0)
      );
    }


    function getDisplayWithdrawalAmount(record) {
      return record.display_withdrawal_amount ?? record.withdrawal_amount ?? 0;
    }

    function getImageFeeAmount(record) {
      return record.image_fee_amount ?? 0;
    }

    function getSettlementAmount(record) {
      return record.settlement_amount ?? record.withdrawal_amount ?? 0;
    }

    function getTotalDebitAmount(record) {
      return record.total_debit_amount ?? getDisplayWithdrawalAmount(record);
    }

    function showImageFeeInfo(event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }
      showCustomModal(
        '图传费用说明',
        '图传费用 = 驾驶分钟数 × 0.03元\n\n该费用会在提现时作为扣减项参与结算。'
      );
    }

    function renderAccountInfo(data) {
      const accountInfo = document.getElementById('account-info');
      accountInfo.innerHTML = `
        <span class="account-chip">账户号：${esc(data.account_number || '-')}</span>
        <span class="account-chip">账户姓名：${esc(data.account_name || '-')}</span>
        <span class="account-chip">账户类型：${esc(data.account_pay || '-')}</span>
      `;
    }

    function renderAmountInfo(data) {
      const unsettledFee = parseFloat(data.unsettled_image_transmission_fee || 0);
      const hasUnsettledFee = unsettledFee > 0;
      document.getElementById('available-balance').value = money(data.available_balance);
      document.getElementById('unsettled-image-fee-total').value = money(unsettledFee);
      document.getElementById('unsettled-image-ids').value = JSON.stringify(data.unsettled_image_ids || []);

      const checkBtn = Math.abs(parseFloat(data.notSettledAmount || 0)) > 0
        ? `<button type="button" class="check-money-btn" onclick="location.href='moeny.html'">去核对</button>`
        : '';

const feeHelp = `
  <button
    type="button"
    class="help-dot"
    onclick="showImageFeeInfo(event)"
    aria-label="图传费用说明"
  >?</button>
`;

      const amountGrid = document.getElementById('amount-info');
      amountGrid.classList.add('has-full');
      amountGrid.innerHTML = `
        <div class="amount-item">
          <div class="amount-icon">≋</div>
          <div class="amount-content"><div class="amount-label">总余额:</div><div class="amount-value">${formatAmount(data.account_balance)}</div></div>
        </div>
<div class="amount-item is-primary">
  <div class="amount-icon">❄</div>
  <div class="amount-content"><div class="amount-label">可提现:</div><div class="amount-value">${formatAmount(data.available_balance)}</div></div>
</div>
<div class="amount-item is-warning">
  <div class="amount-icon">↔</div>
  <div class="amount-content"><div class="amount-label">冻结中:</div><div class="amount-value">${formatAmount(data.frozen_amount)}</div></div>
</div>
<div class="amount-item is-muted">
  <div class="amount-icon">◷</div>
  <div class="amount-content"><div class="amount-label">锁定订单:</div><div class="amount-value">${esc(data.lock_order_count || 0)} <small>笔</small></div></div>
</div>
<div class="amount-item is-warning">
  <div class="amount-icon">?</div>
  <div class="amount-content"><div class="amount-label">待复核订单:</div><div class="amount-value">${esc(data.lock_amount || 0)} <small>电池</small></div></div>
</div>
<div class="amount-item is-warning">
  <div class="amount-icon">▤</div>
  <div class="amount-content"><div class="amount-label">未核对金额:${checkBtn}</div><div class="amount-value">${formatAmount(data.notSettledAmount)}</div></div>
</div>
<div class="amount-item is-danger">
  <div class="amount-icon">↺</div>
  <div class="amount-content"><div class="amount-label">退款金额:</div><div class="amount-value">${formatAmount(data.total_refund)}</div></div>
</div>
<div class="amount-item is-warning help-clickable" onclick="showImageFeeInfo(event)">
  <div class="amount-icon">▥</div>
  <div class="amount-content">
    <div class="amount-label">未结算图传:${feeHelp}</div>
    <div class="amount-value">${formatAmount(unsettledFee)}</div>
  </div>
</div>
<div class="amount-item amount-full is-primary">
          <div class="amount-icon">✓</div>
          <div class="amount-content"><div class="amount-label">实际可提现:</div><div class="amount-value">${formatAmount(data.available_balance)}</div></div>
        </div>
      `;
    }

    function loadAccountInfo() {
      fetch(withVenueParam(API_ACCOUNT))
        .then(response => response.json())
        .then(data => {
          if (data.code === 0) {
            accountCache = data;
            renderAccountInfo(data);
            renderAmountInfo(data);
            const withdrawAmountInput = document.getElementById('withdraw-amount');
            withdrawAmountInput.value = money(data.available_balance);
            updateWithdrawButtonState();
          } else if (data.code === 1002) {
            if (confirm('需要先绑定收款账号才可以提现，是否立即绑定？')) {
              window.location.href = 'paybind.html';
            } else {
              window.history.back();
            }
          } else {
            showCustomModal('加载失败', '加载账户信息失败，请稍后再试。');
          }
        })
        .catch(error => {
          console.error('请求失败:', error);
          showCustomModal('加载失败', '加载账户信息失败，请重试。');
        });
    }

    function updateWithdrawButtonState() {
      const withdrawAmount = parseFloat(document.getElementById('withdraw-amount').value);
      const maxWithdrawAmount = parseFloat(document.getElementById('available-balance').value) || 0;
      const btn = document.getElementById('withdraw-button');
      btn.disabled = !(withdrawAmount > 0 && withdrawAmount <= maxWithdrawAmount);
    }

    function applyWithdrawal() {
      const withdrawButton = document.getElementById('withdraw-button');
      const statusMessage = document.getElementById('status-message');
      const withdrawAmount = parseFloat(document.getElementById('withdraw-amount').value);

      if (isNaN(withdrawAmount) || withdrawAmount <= 0) {
        showCustomModal('提现提示', '请输入有效的提现金额。');
        return;
      }

      statusMessage.style.display = 'block';
      withdrawButton.disabled = true;

      const data = {
        amount: withdrawAmount,
        unsettled_image_transmission_fee: document.getElementById('unsettled-image-fee-total').value || 0,
        unsettled_image_ids: document.getElementById('unsettled-image-ids').value || '[]'
      };
      if (pageVenueId) data.venue_id = pageVenueId;

      fetch(withVenueParam(API_APPLY), {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
        body: new URLSearchParams(data).toString()
      })
        .then(response => response.json())
        .then(data => {
          statusMessage.style.display = 'none';
          if (data.code === 0) {
            showCustomModal('提现申请成功', '提现申请已提交，请等待平台处理。');
            loadAccountInfo();
            loadWithdrawalRecords();
          } else if (data.code === 1005) {
            showCustomModal('无法提现', '场地已被封禁，无法提现，请联系运营处理。');
            updateWithdrawButtonState();
          } else if (data.code === 1008) {
            showCustomModal(
              '超过可提现额度',
              `账户余额：${data.data.account_balance} 元\n冻结金额：${data.data.frozen_amount} 元\n退款金额：${data.data.total_refund || 0} 元\n待复核订单：${data.data.lock_amount || 0} 电池\n可提现：${data.data.available_balance} 元`
            );
            updateWithdrawButtonState();
          } else {
            showCustomModal('提现失败', data.msg || '提现申请失败，请稍后重试。');
            updateWithdrawButtonState();
          }
        })
        .catch(error => {
          console.error('提现申请失败:', error);
          statusMessage.style.display = 'none';
          showCustomModal('提现失败', '提现申请失败，请重试。');
          updateWithdrawButtonState();
        });
    }

    function applicationStatusText(status) {
      const s = Number(status);
      if (s === 0) return '待处理';
      if (s === 1) return '已处理';
      if (s === 2) return '已打款';
      return '拒绝';
    }

    function payoutStatusText(status) {
      return Number(status) === 1 ? '已打款' : '未打款';
    }

    function applicationBadgeClass(record) {
      const s = Number(record.application_status);
      if (s === 0) return 'pending';
      if (s === 1 || s === 2 || Number(record.payout_status) === 1) return 'success';
      return 'danger';
    }

function listStatusText(record) {
  // 列表只看是否已打款
  if (Number(record.payout_status) === 1 || Number(record.application_status) === 2) {
    return '已打款';
  }

  return '未处理';
}

function listStatusBadgeClass(record) {
  return listStatusText(record) === '已打款' ? 'success' : 'pending';
}
    function getRecordNo(record) {
      return record.withdrawal_no || record.withdrawal_number || record.order_number || record.id || '-';
    }

    function loadWithdrawalRecords() {
      fetch(withVenueParam(API_RECORDS))
        .then(response => response.json())
        .then(data => {
          if (data.code === 0 && data.data && data.data.length > 0) {
            withdrawalRecords = data.data.slice().sort((a, b) => String(b.application_time || '').localeCompare(String(a.application_time || '')));
            currentPage = 1;
            renderWithdrawalRecords();
          } else {
            withdrawalRecords = [];
            renderWithdrawalRecords();
          }
        })
        .catch(error => {
          console.error('提现记录加载失败:', error);
          withdrawalRecords = [];
          renderWithdrawalRecords('提现记录加载失败');
        });
    }

    function renderWithdrawalRecords(errorText) {
      const tbody = document.getElementById('withdrawal-tbody');
      const emptyState = document.getElementById('empty-state');
      const tableWrap = document.getElementById('record-table-wrap');
      const pager = document.getElementById('record-pager');

      if (!withdrawalRecords.length) {
        tbody.innerHTML = '';
        tableWrap.style.display = 'none';
        emptyState.style.display = 'block';
        emptyState.textContent = errorText || '暂无提现记录';
        pager.innerHTML = '';
        return;
      }

      tableWrap.style.display = 'block';
      emptyState.style.display = 'none';

      const totalPages = Math.max(1, Math.ceil(withdrawalRecords.length / pageSize));
      if (currentPage > totalPages) currentPage = totalPages;
      const start = (currentPage - 1) * pageSize;
      const rows = withdrawalRecords.slice(start, start + pageSize);

      tbody.innerHTML = rows.map((record, index) => {
        const globalIndex = start + index;
        const receivedAmount = getReceivedAmount(record);
        const displayWithdrawalAmount = getDisplayWithdrawalAmount(record);
        const imageFeeAmount = getImageFeeAmount(record);

        return `
          <tr>
            <td><span class="badge ${listStatusBadgeClass(record)}">${listStatusText(record)}</span></td>
            <td>${esc(record.application_time || '-')}</td>
            <td class="amount-cell">${money(displayWithdrawalAmount)} 元</td>
            <td class="amount-cell">${money(imageFeeAmount)} 元</td>
            <td class="amount-cell">${money(receivedAmount)} 元</td>
            <td><button class="detail-link" type="button" onclick="showWithdrawalDetail(${globalIndex})">查看详情</button></td>
          </tr>
        `;
      }).join('');

      renderPager(totalPages);
    }

    function renderPager(totalPages) {
      const pager = document.getElementById('record-pager');
      const buttons = [];
      buttons.push(`<span>共${totalPages}页</span>`);
      buttons.push(`<button type="button" ${currentPage <= 1 ? 'disabled' : ''} onclick="changePage(1)">|&lt;</button>`);
      buttons.push(`<button type="button" ${currentPage <= 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})">&lt;</button>`);

      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 1) {
          buttons.push(`<button type="button" class="${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`);
        } else if (i === currentPage - 2 || i === currentPage + 2) {
          buttons.push('<span>...</span>');
        }
      }

      buttons.push(`<button type="button" ${currentPage >= totalPages ? 'disabled' : ''} onclick="changePage(${currentPage + 1})">&gt;</button>`);
      buttons.push(`<button type="button" ${currentPage >= totalPages ? 'disabled' : ''} onclick="changePage(${totalPages})">&gt;|</button>`);
      pager.innerHTML = buttons.join('');
    }

    function changePage(page) {
      currentPage = page;
      renderWithdrawalRecords();
    }

    function showWithdrawalDetail(index) {
      const record = withdrawalRecords[index];
      if (!record) return;

      const recordNo = getRecordNo(record);
      const receivedAmount = getReceivedAmount(record);
      const displayWithdrawalAmount = getDisplayWithdrawalAmount(record);
      const imageFeeAmount = getImageFeeAmount(record);
      const settlementAmount = getSettlementAmount(record);
      const totalDebitAmount = getTotalDebitAmount(record);
      const refundDeductAmount = record.refund_deduct_amount ?? 0;

      const imageFeeRow = parseFloat(imageFeeAmount) > 0
        ? `<div class="detail-row"><div class="detail-label">图传费用扣减:</div><div class="detail-value">${money(imageFeeAmount)} 元</div></div>`
        : '';

      const refundRow = parseFloat(refundDeductAmount) > 0
        ? `<div class="detail-row"><div class="detail-label">退款扣减:</div><div class="detail-value">${money(refundDeductAmount)} 元</div></div>`
        : '';

      const detailHtml = `
        <div class="detail-list">
          <div class="detail-row"><div class="detail-label">提现流水号:</div><div class="detail-value">${esc(recordNo)}</div></div>
          <div class="detail-row"><div class="detail-label">申请时间:</div><div class="detail-value">${esc(record.application_time || '-')}</div></div>

          <div class="detail-row"><div class="detail-label">提现金额:</div><div class="detail-value">${money(displayWithdrawalAmount)} 元</div></div>
          ${imageFeeRow}
          <div class="detail-row"><div class="detail-label">结算金额:</div><div class="detail-value">${money(settlementAmount)} 元</div></div>

          <div class="detail-row"><div class="detail-label">技术服务费:</div><div class="detail-value">${money(record.technical_service_fee)} 元</div></div>
          <div class="detail-row"><div class="detail-label">提现手续费:</div><div class="detail-value">${money(record.withdrawal_fee)} 元</div></div>
          <div class="detail-row"><div class="detail-label">实际到账金额:</div><div class="detail-value">${money(receivedAmount)} 元</div></div>

          ${refundRow}
          <div class="detail-row"><div class="detail-label">账户扣减:</div><div class="detail-value">${money(totalDebitAmount)} 元</div></div>

          <div class="detail-row"><div class="detail-label">申请状态:</div><div class="detail-value">${applicationStatusText(record.application_status)}</div></div>
          <div class="detail-row"><div class="detail-label">打款状态:</div><div class="detail-value">${payoutStatusText(record.payout_status)}</div></div>
        </div>
        <div class="detail-note">
          说明：提现金额为本次从场地余额发起的提现总额；图传费用会先从提现金额中扣减，剩余结算金额再计算技术服务费和提现手续费。
        </div>
      `;

      openCustomModal('提现详情', detailHtml, true);
    }

    document.getElementById('withdraw-amount').addEventListener('input', updateWithdrawButtonState);
    loadAccountInfo();
    loadWithdrawalRecords();
  </script>
</body>
</html>
