<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>加盟申请</title>
  <link rel="stylesheet" href="./common/kwx-legacy-page.css">
  <style>
    :root {
      --brand: #0f8f8c;
      --brand-dark: #08706e;
      --brand-soft: #e6f6f5;
      --ink: #172126;
      --muted: #667985;
      --line: #dfe8eb;
      --panel: #fff;
      --page: #f4f7f8;
      --shadow: 0 14px 34px rgba(30, 55, 66, .08);
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--page);
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }

    .franchise-shell {
      width: 100%;
      min-height: 100vh;
      padding: 22px;
    }

    .panel {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .page-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 22px 24px;
      border-bottom: 1px solid var(--line);
    }

    .page-title h1 {
      position: relative;
      margin: 0;
      padding-left: 16px;
      font-size: 24px;
      line-height: 1.25;
      font-weight: 800;
    }

    .page-title h1::before {
      position: absolute;
      left: 0;
      top: 4px;
      width: 6px;
      height: 24px;
      border-radius: 999px;
      background: var(--brand);
      content: "";
    }

    .page-title p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .btn {
      min-height: 40px;
      border: 1px solid rgba(15, 143, 140, .24);
      border-radius: 8px;
      padding: 0 16px;
      color: var(--brand-dark);
      background: #eefaf8;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn.primary {
      border-color: var(--brand);
      color: #fff;
      background: var(--brand);
    }

    .application-list {
      display: grid;
      gap: 14px;
      padding: 18px 24px 24px;
    }

    .application-card {
      display: grid;
      grid-template-columns: minmax(180px, 260px) 1fr auto;
      gap: 18px;
      align-items: stretch;
      border: 1px solid var(--line);
      border-left: 4px solid var(--brand);
      border-radius: 10px;
      padding: 16px;
      background: #fff;
    }

    .applicant h3 {
      overflow: hidden;
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.3;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .applicant span {
      color: var(--muted);
      font-size: 13px;
    }

    .message-box {
      min-width: 0;
      border: 1px solid #edf2f3;
      border-radius: 8px;
      padding: 12px;
      background: #f8fbfb;
    }

    .message-box span {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .message-box p {
      margin: 0;
      color: var(--ink);
      line-height: 1.7;
      word-break: break-word;
    }

    .card-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .empty-state {
      padding: 42px 18px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 860px) {
      .page-head,
      .application-card {
        grid-template-columns: 1fr;
      }

      .page-head {
        display: grid;
      }

      .card-actions {
        justify-content: stretch;
      }

      .card-actions .btn,
      .page-head .btn {
        width: 100%;
      }
    }

    @media (max-width: 640px) {
      .franchise-shell {
        padding: 12px;
      }

      .page-head,
      .application-list {
        padding-left: 14px;
        padding-right: 14px;
      }
    }
  </style>
</head>
<body class="kwx-legacy-page franchise-application-page">
  <main class="franchise-shell">
    <section class="panel">
      <header class="page-head">
        <div class="page-title">
          <h1>加盟申请</h1>
          <p>查看官网提交的加盟资料，并标记已处理。</p>
        </div>
        <button id="back-btn" class="btn" type="button">返回加盟管理</button>
      </header>
      <div id="franchise-list" class="application-list">
        <div class="empty-state">正在加载加盟申请...</div>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const apiApplications = '/api/franchise/FranchiesList.php';
      const list = document.getElementById('franchise-list');
      const backBtn = document.getElementById('back-btn');

      function parseJson(response) {
        return response.text().then(function (text) {
          try {
            return JSON.parse(text);
          } catch (error) {
            throw new Error((text || '接口未返回 JSON').slice(0, 160));
          }
        });
      }

      function escapeHtml(value) {
        return String(value == null ? '' : value).replace(/[&<>"']/g, function (char) {
          return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[char];
        });
      }

      function valueOrDash(value) {
        return value === null || value === undefined || value === '' ? '-' : value;
      }

      function render(items) {
        if (!items.length) {
          list.innerHTML = '<div class="empty-state">暂无待处理加盟申请</div>';
          return;
        }

        list.innerHTML = items.map(function (item) {
          return '<article class="application-card">' +
            '<div class="applicant">' +
              '<h3>' + escapeHtml(valueOrDash(item.name)) + '</h3>' +
              '<span>ID: ' + escapeHtml(valueOrDash(item.id)) + '</span><br>' +
              '<span>邮箱: ' + escapeHtml(valueOrDash(item.email)) + '</span><br>' +
              '<span>提交时间: ' + escapeHtml(valueOrDash(item.submitted_at)) + '</span>' +
            '</div>' +
            '<div class="message-box"><span>申请内容</span><p>' + escapeHtml(valueOrDash(item.message)) + '</p></div>' +
            '<div class="card-actions">' +
              '<button class="btn primary" type="button" data-id="' + escapeHtml(item.id) + '">标记已处理</button>' +
            '</div>' +
          '</article>';
        }).join('');
      }

      function loadApplications() {
        list.innerHTML = '<div class="empty-state">正在加载加盟申请...</div>';
        fetch(apiApplications, {
          credentials: 'same-origin',
          cache: 'no-store'
        }).then(parseJson).then(function (data) {
          if (data.code === 200) {
            render(Array.isArray(data.data) ? data.data : []);
          } else if (data.code === 1003) {
            render([]);
          } else {
            throw new Error(data.msg || '加盟申请加载失败');
          }
        }).catch(function (error) {
          list.innerHTML = '<div class="empty-state">加盟申请加载失败：' + escapeHtml(error.message) + '</div>';
        });
      }

      list.addEventListener('click', function (event) {
        const button = event.target.closest('button[data-id]');
        if (!button) return;
        if (!confirm('确认将该加盟申请标记为已处理？')) return;

        fetch(apiApplications, {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: 'id=' + encodeURIComponent(button.dataset.id)
        }).then(parseJson).then(function (data) {
          if (data.code === 200) {
            loadApplications();
          } else {
            alert(data.msg || '处理失败');
          }
        }).catch(function (error) {
          alert('请求出错：' + error.message);
        });
      });

      backBtn.addEventListener('click', function () {
        window.location.href = './FranchiseManagement.html?embed=dashboard';
      });

      loadApplications();
    })();
  </script>
</body>
</html>
