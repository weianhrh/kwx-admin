<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收入明细</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"> 
    <style>
        :root {
            --bg: #f4f7f8;
            --panel: #ffffff;
            --text: #172126;
            --muted: #6b7d84;
            --subtle: #8aa0a8;
            --line: #dfe8eb;
            --line-strong: #c9d8dd;
            --primary: #0f8f8c;
            --primary-dark: #08706e;
            --primary-soft: #e6f6f5;
            --success: #20a876;
            --success-soft: #e8f7f1;
            --warning: #d97706;
            --warning-soft: #fff7ed;
            --danger: #df5b57;
            --shadow: 0 12px 34px rgba(30, 55, 66, .08);
            --shadow-sm: 0 8px 22px rgba(30, 55, 66, .07);
            --radius: 8px;
            --transition: all .16s ease;
            --card-bg: #ffffff;
            --border-color: #dfe8eb;
            --text-color: #172126;
            --secondary: #6b7d84;
            --background-gradient-start: #f4f7f8;
            --background-gradient-end: #eef3f4;
            --highlight-bg: #f7fbfb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "HarmonyOS Sans SC", "Microsoft YaHei", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
        }

        body {
            min-width: 320px;
            min-height: 100vh;
            padding: 22px 24px 30px;
            display: block;
            color: var(--text);
            background:
                radial-gradient(circle at 16% 0%, rgba(15, 143, 140, .08), transparent 28%),
                radial-gradient(circle at 86% 8%, rgba(47, 125, 246, .07), transparent 32%),
                var(--bg);
            overflow-x: hidden;
        }

        button,
        input {
            font: inherit;
        }

        button {
            user-select: none;
        }

        input {
            outline: none;
        }

        .container {
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
        }

        .card {
            width: 100%;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 0;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: rgba(255, 255, 255, .98);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: none;
        }

        .card:hover {
            box-shadow: var(--shadow);
        }

        .card-title {
            min-height: 74px;
            margin: 0 !important;
            padding: 20px 22px !important;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            border-bottom: 1px solid var(--line) !important;
            color: var(--text);
            background:
                linear-gradient(135deg, rgba(15, 143, 140, .07), rgba(47, 125, 246, .04)),
                #fff;
            font-size: 22px;
            line-height: 1.2;
            font-weight: 900;
        }

        .card-title::before {
            content: "";
            width: 8px;
            height: 22px;
            border-radius: 999px;
            background: var(--primary);
            flex: 0 0 auto;
        }

        .card-title {
            justify-content: flex-start;
        }

        #total-amount {
            float: none !important;
            margin-left: auto;
            min-height: 34px;
            display: inline-flex;
            align-items: center;
            padding: 0 12px;
            border: 1px solid rgba(15, 143, 140, .20);
            border-radius: 999px;
            color: var(--primary) !important;
            background: var(--primary-soft);
            font-size: 14px !important;
            line-height: 1;
            font-weight: 900 !important;
            white-space: nowrap;
        }

        .date-filter {
            margin: 18px 22px 0 !important;
            padding: 12px !important;
            display: grid !important;
            grid-template-columns: minmax(200px, 1fr) auto minmax(200px, 1fr) auto;
            align-items: center !important;
            gap: 10px !important;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: #f8fbfb;
        }

        .date-filter span {
            color: var(--muted);
            font-size: 13px;
            font-weight: 800;
            text-align: center;
        }

        .date-filter input,
        .date-input,
        #jumpPage {
            width: 100% !important;
            height: 38px !important;
            min-height: 38px !important;
            padding: 0 12px !important;
            border: 1px solid var(--line) !important;
            border-radius: var(--radius) !important;
            color: var(--text) !important;
            background: #fff !important;
            font-size: 13px !important;
            line-height: 38px !important;
            box-shadow: none !important;
            transition: border .16s ease, box-shadow .16s ease, background .16s ease;
        }

        .date-filter input:focus,
        #jumpPage:focus {
            border-color: rgba(15, 143, 140, .48) !important;
            box-shadow: 0 0 0 4px rgba(15, 143, 140, .10) !important;
        }

        .date-filter button,
        .pagination button {
            min-height: 38px !important;
            display: inline-flex !important;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0 14px !important;
            border: 1px solid var(--primary) !important;
            border-radius: var(--radius) !important;
            color: #fff !important;
            background: var(--primary) !important;
            font-size: 13px !important;
            line-height: 1 !important;
            font-weight: 900;
            cursor: pointer;
            box-shadow: none !important;
            transition: background .16s ease, border .16s ease, box-shadow .16s ease, transform .16s ease, opacity .16s ease;
            white-space: nowrap;
        }

        .date-filter button:hover,
        .pagination button:hover:not(:disabled) {
            border-color: var(--primary-dark) !important;
            background: var(--primary-dark) !important;
            box-shadow: 0 10px 24px rgba(15, 143, 140, .18) !important;
            transform: translateY(-1px);
        }

        .pagination button:disabled {
            opacity: .45 !important;
            cursor: not-allowed !important;
            transform: none !important;
            box-shadow: none !important;
        }

        #income-details {
            padding: 18px 22px 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 14px;
        }

        .order-item {
            position: relative;
            min-width: 0;
            margin: 0 !important;
            padding: 16px 16px 14px !important;
            display: grid;
            gap: 10px;
            border: 1px solid var(--line) !important;
            border-radius: var(--radius) !important;
            background: #fff !important;
            box-shadow: var(--shadow-sm);
            transition: border .16s ease, box-shadow .16s ease, transform .16s ease, background .16s ease;
            overflow: hidden;
        }

        .order-item::before {
            content: "";
            position: absolute;
            inset: 0 auto 0 0;
            width: 3px;
            background: var(--primary);
            opacity: .78;
        }

        .order-item:hover {
            background: #fff !important;
            border-color: rgba(15, 143, 140, .28) !important;
            box-shadow: 0 14px 30px rgba(30, 55, 66, .09);
            transform: translateY(-1px);
        }

        .field {
            min-width: 0;
            display: grid !important;
            grid-template-columns: 112px minmax(0, 1fr);
            align-items: start !important;
            justify-content: start !important;
            gap: 10px;
            color: var(--text);
            font-size: 13px !important;
            line-height: 1.5;
        }

        .field .label {
            color: var(--muted);
            font-size: 12px;
            font-weight: 900;
            white-space: nowrap;
        }

        .field .value {
            min-width: 0;
            color: var(--text);
            font-size: 13px;
            font-weight: 700;
            text-align: right;
            word-break: break-word;
        }

        .field .value.datetime {
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
        }

        .payment-amount {
            display: inline-flex;
            align-items: center;
            justify-content: flex-end;
            padding: 2px 8px;
            border-radius: 999px;
            color: var(--primary) !important;
            background: var(--primary-soft);
            font-size: 14px;
            font-weight: 900;
        }

        .status {
            color: var(--muted);
            font-size: 12px;
        }

        .datetime {
            color: var(--muted);
            font-size: 12px;
        }

        .pagination {
            margin: 18px 22px 20px !important;
            padding: 12px !important;
            min-height: 58px;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            gap: 10px !important;
            flex-wrap: wrap;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: #f8fbfb;
            color: var(--muted);
            font-size: 13px;
            font-weight: 800;
        }

        .pagination span {
            color: var(--muted);
            line-height: 38px !important;
            white-space: nowrap;
        }

        #pageInfo {
            min-height: 38px;
            display: inline-flex;
            align-items: center;
            padding: 0 12px;
            border-radius: 999px;
            color: var(--primary);
            background: var(--primary-soft);
            font-weight: 900;
        }

        #jumpPage {
            width: 86px !important;
            text-align: center !important;
        }

        .loading {
            margin: 0 22px 22px;
            padding: 18px;
            border: 1px dashed var(--line-strong);
            border-radius: var(--radius);
            color: var(--primary);
            background: #f8fbfb;
            text-align: center;
            font-size: 14px;
            font-weight: 800;
        }

        @media (max-width: 900px) {
            body {
                padding: 14px 10px 24px;
            }

            .card-title {
                min-height: auto;
                padding: 18px 16px !important;
                align-items: flex-start;
                flex-wrap: wrap;
                font-size: 20px;
            }

            #total-amount {
                width: 100%;
                justify-content: center;
                margin-left: 0;
            }

            .date-filter {
                margin: 14px 14px 0 !important;
                grid-template-columns: 1fr;
                align-items: stretch !important;
            }

            .date-filter span {
                display: none;
            }

            #income-details {
                padding: 14px 14px 0;
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .order-item {
                padding: 14px !important;
            }

            .field {
                grid-template-columns: 98px minmax(0, 1fr);
                gap: 8px;
            }

            .pagination {
                margin: 14px 14px 16px !important;
                align-items: stretch !important;
                flex-direction: column;
            }

            .pagination button,
            .pagination input,
            .pagination span,
            #jumpPage,
            #pageInfo {
                width: 100% !important;
                text-align: center;
                justify-content: center;
            }

            .loading {
                margin: 0 14px 16px;
            }
        }

        @media (max-width: 520px) {
            .field {
                grid-template-columns: 1fr;
                gap: 4px;
                padding-bottom: 8px;
                border-bottom: 1px solid #edf2f4;
            }

            .field:last-child {
                padding-bottom: 0;
                border-bottom: 0;
            }

            .field .value {
                text-align: left;
            }

            .payment-amount {
                justify-content: flex-start;
            }
        }

    </style>
</head>

<body>

    <div class="container">
        <div class="card">
            <div class="card-title">
              收入明细
              <span id="total-amount" style="float: right; font-size: 16px; font-weight: normal; color: var(--primary);">累计收入：0 元</span>
            </div>

            <div class="date-filter" style="margin-bottom: 20px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                <input type="datetime-local" id="startDate" class="date-input" style="padding: 8px; border: 1px solid var(--border-color); border-radius: 4px;">
                <span>至</span>
                <input type="datetime-local" id="endDate" class="date-input" style="padding: 8px; border: 1px solid var(--border-color); border-radius: 4px;">
                <button onclick="filterByDate()" style="padding: 5px; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer;">筛选</button>
            </div>

            <div id="income-details">
                <!-- 订单信息将动态加载 -->
            </div>
            <!-- 添加分页控制器 -->
            <div class="pagination" style="display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 20px;">
                <button onclick="prevPage()" id="prevBtn" style="padding: 8px 16px; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer;">上一页</button>
                
                <span id="pageInfo" style="line-height: 35px;"></span>
                
                <button onclick="nextPage()" id="nextBtn" style="padding: 8px 16px; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer;">下一页</button>
                
                <span>跳转至</span>
                <input id="jumpPage" type="number" min="1" style="width: 60px; padding: 6px; border: 1px solid var(--border-color); border-radius: 4px;">
                <button onclick="goToPage()" style="padding: 6px 10px; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer;">跳转</button>
            </div>

            <div id="loading" class="loading" style="display: none;">正在加载...</div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        const limit = 10;
        // 修改日期初始化
        let startDate = new Date().toISOString().split('T')[0]; // 获取当天日期
        let endDate = startDate; // 默认结束日期也是当天
        let totalPages = 0;

      
        document.addEventListener('DOMContentLoaded', function () {
            const now = new Date();
            const yyyy_mm_dd = now.toISOString().slice(0, 10); // 获取当前日期 yyyy-mm-dd
        
            // 设置默认时间为 00:00 和 23:59
            document.getElementById('startDate').value = `${yyyy_mm_dd}T00:00`;
            document.getElementById('endDate').value = `${yyyy_mm_dd}T23:59`;
        
            // 初始化时间变量
            startDate = `${yyyy_mm_dd} 00:00:00`;
            endDate = `${yyyy_mm_dd} 23:59:59`;
        
            // 默认加载当天全部数据
            loadIncomeData(currentPage);
        });


        // 修改加载数据的函数
        function loadIncomeData(page) {
            const url = `/api/venue/GetDrivingOrders.php?page=${page}&limit=${limit}&order_number=&start_date=${startDate}&end_date=${endDate}&exclude_energy=on&uid=`;
            console.log('请求URL:', url);

            document.getElementById('loading').style.display = 'block';
            document.getElementById('income-details').innerHTML = ''; // 清空现有数据

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.code === 0) {
                        if (data.total_income !== undefined) {
                            document.getElementById('total-amount').textContent = `累计收入：${parseFloat(data.total_income).toFixed(2)} 元`;
                        }

                        totalPages = Math.ceil(data.count / limit);  // ✅ 始终更新总页数
                        updatePagination();
                    
                        if (data.data.length > 0) {
                            displayIncomeDetails(data.data);
                        } else {
                            document.getElementById('loading').textContent = '没有更多数据了';
                        }
                    }

                    document.getElementById('loading').style.display = 'none';
                })
                .catch(error => {
                    console.error('数据加载失败:', error);
                    document.getElementById('loading').textContent = '加载失败，请重试';
                    setTimeout(() => document.getElementById('loading').style.display = 'none', 2000);
                });
        }

        // 添加分页控制函数
        function updatePagination() {
            const pageInfo = document.getElementById('pageInfo');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            pageInfo.textContent = `第 ${currentPage} 页 / 共 ${totalPages} 页`;
            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage === totalPages;

            // 更新按钮样式
            prevBtn.style.opacity = currentPage === 1 ? '0.5' : '1';
            nextBtn.style.opacity = currentPage === totalPages ? '0.5' : '1';
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                loadIncomeData(currentPage);
            }
        }

        function nextPage() {
            if (currentPage < totalPages) {
                currentPage++;
                loadIncomeData(currentPage);
            }
        }
        function formatDateTimeLocal(value) {
            return value.replace('T', ' ') + ':00'; // 转为 'YYYY-MM-DD HH:mm:00'
        }

        // 修改日期筛选函数
        function filterByDate() {
            const startInput = document.getElementById('startDate').value;
            const endInput = document.getElementById('endDate').value;
        
            if (startInput && endInput && startInput > endInput) {
                alert('开始日期不能大于结束日期');
                return;
            }
        
            startDate = formatDateTimeLocal(startInput);
            endDate = formatDateTimeLocal(endInput);
        
            currentPage = 1;
            loadIncomeData(currentPage);
        }


        // 显示收入明细
        function displayIncomeDetails(orders) {
            const incomeDetailsContainer = document.getElementById('income-details');
            incomeDetailsContainer.innerHTML = ''; // 清空前次内容
        
            orders.forEach(order => {
                const orderItem = document.createElement('div');
                orderItem.classList.add('order-item');
                const startTime = new Date(order.start_time);
                const endTime = new Date(order.end_time);
                const durationMs = endTime - startTime;
const totalSeconds = Math.floor(durationMs / 1000);
const minutes = Math.floor(totalSeconds / 60);
const seconds = totalSeconds % 60;


                orderItem.innerHTML = `
                    <div class="field">
                        <div class="label">订单编号:</div>
                        <div class="value">${order.order_id}</div> 
                    </div>
                    <div class="field">
                        <div class="label">用户信息:</div>
                        <div class="value">${order.uid} - ${order.nickname}</div> 
                    </div>
                    <div class="field">
                        <div class="label">支付金额:</div>
                        <div class="value payment-amount">${order.payment_amount} 元</div>
                    </div>
                    <div class="field">
                        <div class="label">支付类型:</div>
                        <div class="value">${order.pays_type}</div> 
                    </div>
                    <div class="field">
                        <div class="label">套餐驾驶时长:</div>
                        <div class="value">${order.billing_rules} 分钟</div>
                    </div>
                 <div class="field">
  <div class="label">实际驾驶时长:</div>
  <div class="value">${minutes} 分 ${seconds} 秒</div>
</div>

                    <div class="field">
                        <div class="label">驾驶时间:</div>
                        <div class="value datetime">${order.start_time} - ${order.end_time}</div> 
                    </div>
                `;
                incomeDetailsContainer.appendChild(orderItem);
            });
        }

        function goToPage() {
            const pageInput = document.getElementById('jumpPage').value;
            const pageNum = parseInt(pageInput);
        
            if (!isNaN(pageNum) && pageNum >= 1 && pageNum <= totalPages) {
                currentPage = pageNum;
                loadIncomeData(currentPage);
            } else {
                alert(`请输入 1 到 ${totalPages} 之间的有效页码`);
            }
        }

        // 页面加载时获取收入数据
        loadIncomeData(currentPage);
    </script>

</body>

</html>
