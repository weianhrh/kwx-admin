<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>邀请码排行</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />

  <style>
:root {
  --bg: #f4f7f8;
  --panel: #ffffff;
  --text: #172126;
  --muted: #6b7d84;
  --subtle: #8aa0a8;
  --line: #dfe8eb;
  --line-strong: #c9d8dd;
  --primary: #0f8f8c;
  --primary-dark: #08706e;
  --primary-soft: #e6f6f5;
  --danger: #df5b57;
  --success: #20a876;
  --warning: #f59e0b;
  --secondary: #6b7d84;
  --card-bg: #ffffff;
  --border-color: #dfe8eb;
  --text-color: #172126;
  --shadow: 0 12px 34px rgba(30, 55, 66, .08);
  --shadow-sm: 0 8px 22px rgba(30, 55, 66, .07);
  --transition: all .16s ease;
  --hover-bg: #fbfcfd;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "HarmonyOS Sans SC", "Microsoft YaHei", Arial, sans-serif;
  -webkit-tap-highlight-color: transparent;
}

html,
body {
  width: 100%;
  min-height: 100%;
}

body {
  min-width: 320px;
  min-height: 100vh;
  padding: 24px 28px 34px;
  color: var(--text);
  background: var(--bg);
  display: block;
  overflow-x: hidden;
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  user-select: none;
}

button:disabled {
  cursor: not-allowed !important;
  opacity: .45;
  transform: none !important;
  box-shadow: none !important;
}

.container {
  width: 100%;
  max-width: none;
  margin: 0 auto;
}

.card {
  width: 100%;
  margin: 0;
  padding: 18px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  box-shadow: var(--shadow);
  transition: var(--transition);
}

.card-title {
  min-height: 34px;
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 0 0 18px 0;
  padding: 0 0 14px 0;
  border-bottom: 1px solid var(--line);
  color: var(--text);
  font-size: 20px;
  line-height: 1.2;
  font-weight: 900;
  text-align: left;
}

.card-title::before {
  content: "";
  width: 8px;
  height: 20px;
  border-radius: 999px;
  background: var(--primary);
  flex: 0 0 auto;
}

.toolbar {
  display: flex;
  align-items: flex-end;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 18px;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fbfcfd;
}

.form-item {
  width: min(320px, 100%);
  display: flex;
  flex-direction: column;
  gap: 7px;
}

.form-label {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.2;
  font-weight: 800;
}

.form-input {
  width: 100%;
  height: 38px;
  padding: 0 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--text);
  background: #fff;
  font-size: 13px;
  line-height: 38px;
  outline: none;
  transition: border .16s ease, box-shadow .16s ease, background .16s ease;
}

.form-input::placeholder {
  color: var(--subtle);
}

.form-input:focus {
  border-color: rgba(15, 143, 140, .48);
  box-shadow: 0 0 0 4px rgba(15, 143, 140, .10);
}

.btn,
.edit-btn,
.pagination button {
  min-height: 38px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 0 14px;
  border: 1px solid var(--primary);
  border-radius: 8px;
  color: #fff;
  background: var(--primary);
  font-size: 13px;
  line-height: 1;
  font-weight: 900;
  cursor: pointer;
  white-space: nowrap;
  transition: background .16s ease, border .16s ease, color .16s ease, box-shadow .16s ease, transform .16s ease, opacity .16s ease;
}

.btn:hover,
.edit-btn:hover,
.pagination button:hover:not(:disabled) {
  border-color: var(--primary-dark);
  background: var(--primary-dark);
  box-shadow: 0 10px 24px rgba(15, 143, 140, .18);
  transform: translateY(-1px);
}

.btn-ghost {
  color: var(--primary);
  border-color: rgba(15, 143, 140, .22);
  background: var(--primary-soft);
}

.btn-ghost:hover {
  color: #fff;
  border-color: var(--primary);
  background: var(--primary);
}

#rank-list {
  display: grid;
  gap: 12px;
}

.venue-card {
  width: 100%;
  min-height: 96px;
  display: grid;
  grid-template-columns: 58px minmax(0, 1fr) auto;
  align-items: center;
  gap: 14px;
  margin: 0;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  box-shadow: none;
  transition: border .16s ease, background .16s ease, box-shadow .16s ease, transform .16s ease;
}

.venue-card:hover {
  border-color: rgba(15, 143, 140, .24);
  background: #fbfcfd;
  box-shadow: var(--shadow-sm);
  transform: translateY(-1px);
}

.venue-img {
  width: 58px;
  height: 58px;
  border: 1px solid rgba(15, 143, 140, .18);
  border-radius: 8px;
  color: var(--primary);
  background: var(--primary-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}

.venue-info {
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
  color: var(--text);
  font-size: 13px;
  line-height: 1.5;
}

.venue-info .venue-name {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  color: var(--text);
  font-size: 15px;
  line-height: 1.45;
  font-weight: 900;
  word-break: break-all;
}

.badge {
  min-height: 24px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0 10px;
  border: 1px solid rgba(15, 143, 140, .20);
  border-radius: 999px;
  color: var(--primary);
  background: var(--primary-soft);
  font-size: 12px;
  line-height: 1;
  font-weight: 900;
  white-space: nowrap;
}

.venue-info span[style] {
  color: var(--muted) !important;
  font-size: 12px;
  line-height: 1.45;
}

.venue-actions {
  min-width: 170px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 8px;
  padding-left: 0;
}

.venue-actions .edit-btn {
  width: 100%;
}

.venue-actions .edit-btn[style*="background:var(--secondary)"] {
  border-color: var(--line-strong) !important;
  color: #486169 !important;
  background: #fff !important;
}

.venue-actions .edit-btn[style*="background:var(--secondary)"]:hover {
  border-color: rgba(15, 143, 140, .35) !important;
  color: var(--primary) !important;
  background: var(--primary-soft) !important;
}

.loading {
  min-height: 62px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 12px;
  padding: 16px;
  border: 1px dashed var(--line-strong);
  border-radius: 8px;
  color: var(--muted);
  background: #fbfcfd;
  font-size: 14px;
  font-weight: 800;
  text-align: center;
}

.pagination {
  margin-top: 18px;
  padding-top: 16px;
  border-top: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
}

.pagination button {
  min-width: 90px;
}

#page-info {
  min-height: 32px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0 10px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 800;
}

@media (max-width: 920px) {
  body {
    padding: 14px 10px 22px;
  }

  .card {
    padding: 16px;
  }

  .card-title {
    font-size: 18px;
    margin-bottom: 14px;
  }

  .toolbar {
    padding: 12px;
  }

  .venue-card {
    grid-template-columns: 50px minmax(0, 1fr);
    align-items: start;
  }

  .venue-img {
    width: 50px;
    height: 50px;
    font-size: 21px;
  }

  .venue-actions {
    grid-column: 1 / -1;
    min-width: 0;
    flex-direction: row;
    align-items: stretch;
  }

  .venue-actions .edit-btn {
    flex: 1 1 0;
  }
}

@media (max-width: 640px) {
  .toolbar {
    flex-direction: column;
    align-items: stretch;
  }

  .form-item,
  .btn {
    width: 100%;
  }

  .venue-card {
    grid-template-columns: 1fr;
  }

  .venue-img {
    width: 100%;
    height: 54px;
  }

  .venue-info .venue-name {
    font-size: 14px;
  }

  .venue-actions {
    flex-direction: column;
  }

  .pagination {
    gap: 10px;
  }

  .pagination button,
  #page-info {
    width: 100%;
  }
}
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <div class="card-title">邀请码排行</div>

      <!-- 搜索区 -->
      <div class="toolbar">
        <div class="form-item">
          <label class="form-label">邀请码搜索</label>
          <input id="kw" class="form-input" type="text" placeholder="输入邀请码（支持模糊）" />
        </div>

        <button id="searchBtn" class="btn" type="button">
          <i class="fas fa-search"></i> 搜索
        </button>

        <button id="resetBtn" class="btn btn-ghost" type="button">
          <i class="fas fa-undo"></i> 重置
        </button>
      </div>

      <!-- 列表 -->
      <div id="rank-list"></div>
      <div id="loading" class="loading" style="display:none;">正在加载...</div>

      <!-- 分页 -->
      <div class="pagination">
        <button id="prev-page" disabled>上一页</button>
        <span id="page-info">第 1 页，共 1 页</span>
        <button id="next-page" disabled>下一页</button>
      </div>
    </div>
  </div>

  <script>
    const API = "/api/operat/invitationRank.php";

    const listEl = document.getElementById("rank-list");
    const loadingEl = document.getElementById("loading");
    const pageInfoEl = document.getElementById("page-info");
    const prevBtn = document.getElementById("prev-page");
    const nextBtn = document.getElementById("next-page");

    const kwEl = document.getElementById("kw");
    const searchBtn = document.getElementById("searchBtn");
    const resetBtn = document.getElementById("resetBtn");

    let currentPage = 1;
    let totalPages = 1;
    let lastParams = {};

    function buildQuery(params){
      return Object.entries(params)
        .filter(([_, v]) => v !== undefined && v !== null && String(v).trim() !== "")
        .map(([k, v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`)
        .join("&");
    }

    async function loadData(params = {}) {
      lastParams = params;

      const p = { ...params };
      p.page = currentPage;
      p.limit = 20;

      const url = `${API}?${buildQuery(p)}`;

      loadingEl.style.display = "block";
      listEl.innerHTML = "";

      try {
        const r = await fetch(url, { credentials: "include" });
        const d = await r.json();

        loadingEl.style.display = "none";

        if (d.code !== 0) {
          listEl.innerHTML = `<div class="loading">加载失败：${d.msg || "未知错误"}</div>`;
          return;
        }

        const count = Number(d.count || 0);
        totalPages = Math.max(1, Math.ceil(count / p.limit));
        pageInfoEl.textContent = `第 ${currentPage} 页，共 ${totalPages} 页（共 ${count} 个邀请码）`;

        prevBtn.disabled = currentPage <= 1;
        nextBtn.disabled = currentPage >= totalPages;

        const rows = d.data || [];
        if (rows.length === 0) {
          listEl.innerHTML = `<div class="loading">暂无数据</div>`;
          return;
        }

        rows.forEach((row, idx) => {
          const rankNo = (currentPage - 1) * p.limit + idx + 1;
          const code = row.invitation_code || "-";
          const userCount = row.user_count || 0;

          const html = `
            <div class="venue-card">
              <div class="venue-img" title="排行">
                <i class="fas fa-trophy"></i>
              </div>

              <div class="venue-info">
                <div class="venue-name">
                  #${rankNo} 邀请码：${code}
                  <span class="badge">${userCount} 人</span>
                </div>
                <span style="color:var(--secondary);">点击“查看该邀请码用户”可跳转筛选</span>
              </div>

              <div class="venue-actions">
                <button class="edit-btn" type="button" onclick="copyCode('${code}')">
                  <i class="fas fa-copy"></i> 复制邀请码
                </button>
                <button class="edit-btn" type="button" style="background:var(--secondary);" onclick="searchUsersByCode('${code}')">
                  <i class="fas fa-users"></i> 查看该邀请码用户
                </button>
              </div>
            </div>
          `;
          listEl.insertAdjacentHTML("beforeend", html);
        });

      } catch (e) {
        loadingEl.style.display = "none";
        listEl.innerHTML = `<div class="loading">请求异常，请稍后再试</div>`;
        console.error(e);
      }
    }

    // 复制邀请码
    async function copyCode(code){
      try{
        await navigator.clipboard.writeText(code);
        alert("已复制：" + code);
      }catch(e){
        const t = document.createElement("textarea");
        t.value = code;
        document.body.appendChild(t);
        t.select();
        document.execCommand("copy");
        document.body.removeChild(t);
        alert("已复制：" + code);
      }
    }

    // 跳转到用户页并带邀请码搜索
    function searchUsersByCode(code){
      window.location.href = `Balancerecharge.html?invitation_code=${encodeURIComponent(code)}`;
    }

    // 搜索
    searchBtn.addEventListener("click", () => {
      currentPage = 1;
      loadData({ invitation_code: kwEl.value.trim() });
    });

    // 重置
    resetBtn.addEventListener("click", () => {
      kwEl.value = "";
      currentPage = 1;
      loadData({});
    });

    // 分页
    prevBtn.addEventListener("click", () => {
      if (currentPage > 1) {
        currentPage--;
        loadData(lastParams);
      }
    });

    nextBtn.addEventListener("click", () => {
      if (currentPage < totalPages) {
        currentPage++;
        loadData(lastParams);
      }
    });

    // 初始加载
    loadData({});
  </script>
</body>
</html>
