<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>场地流水变动记录</title>
<style>
:root {
  --kx-page: #f4f7f8;
  --kx-surface: #ffffff;
  --kx-soft: #f8fbfc;
  --kx-soft-2: #eef7f6;
  --kx-border: #dfe8eb;
  --kx-border-light: #edf3f5;
  --kx-text: #172126;
  --kx-muted: #6b7d84;
  --kx-primary: #0f8f8c;
  --kx-primary-dark: #08706e;
  --kx-primary-soft: #e6f6f5;
  --kx-danger: #df5b57;
  --kx-danger-soft: #fff0f0;
  --kx-success: #168a61;
  --kx-success-soft: #e8f7f1;
  --kx-warning: #d58a16;
  --kx-warning-soft: #fff6e4;
  --kx-shadow: 0 14px 38px rgba(30, 55, 66, .08);
  --kx-shadow-sm: 0 8px 22px rgba(30, 55, 66, .06);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "HarmonyOS Sans SC", "Microsoft YaHei", Arial, sans-serif;
  -webkit-tap-highlight-color: transparent;
}

html,
body {
  width: 100%;
  min-height: 100%;
}

body {
  min-width: 320px;
  min-height: 100vh;
  padding: 22px 24px 32px;
  color: var(--kx-text);
  background:
    linear-gradient(90deg, rgba(15, 143, 140, .045), rgba(8, 112, 110, .035) 56%, rgba(213, 138, 22, .025)),
    var(--kx-page);
  overflow-x: hidden;
}

button,
input,
select {
  font: inherit;
}

button {
  user-select: none;
}

input,
select {
  outline: none;
}

.container {
  width: 100%;
  max-width: 1280px;
  margin: 0 auto;
}

.card {
  position: relative;
  overflow: hidden;
  margin-bottom: 14px;
  padding: 20px;
  border: 1px solid var(--kx-border);
  border-radius: 10px;
  background: rgba(255, 255, 255, .98);
  box-shadow: var(--kx-shadow);
}

.header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 14px;
  padding-bottom: 16px;
  margin-bottom: 16px;
  border-bottom: 1px solid var(--kx-border-light);
}

.title {
  display: flex;
  align-items: center;
  gap: 10px;
  min-height: 40px;
  color: var(--kx-text);
  font-size: 22px;
  line-height: 1.2;
  font-weight: 900;
}

.title::before {
  content: "";
  width: 8px;
  height: 22px;
  border-radius: 999px;
  background: var(--kx-primary);
  box-shadow: 0 6px 14px rgba(15, 143, 140, .20);
  flex: 0 0 auto;
}

.back-btn,
.search-btn,
.pager button {
  min-height: 38px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  font-weight: 900;
  transition: background .16s ease, border-color .16s ease, color .16s ease, box-shadow .16s ease, transform .16s ease, opacity .16s ease;
}

.back-btn {
  padding: 0 14px;
  border: 1px solid rgba(15, 143, 140, .28);
  background: var(--kx-primary-soft);
  color: var(--kx-primary-dark);
  white-space: nowrap;
}

.back-btn:hover {
  border-color: var(--kx-primary);
  background: var(--kx-primary);
  color: #fff;
  transform: translateY(-1px);
}

.filters {
  display: grid;
  grid-template-columns: minmax(150px, 1fr) minmax(150px, 1fr) minmax(150px, 1fr) minmax(150px, 1fr) minmax(120px, .8fr) 112px;
  gap: 12px;
  align-items: end;
}

.field label {
  display: block;
  margin-bottom: 7px;
  color: var(--kx-muted);
  font-size: 13px;
  font-weight: 900;
}

.field input,
.field select {
  width: 100%;
  height: 40px;
  padding: 0 12px;
  border: 1px solid var(--kx-border);
  border-radius: 8px;
  background: #fff;
  color: var(--kx-text);
  font-size: 14px;
  transition: border-color .15s ease, box-shadow .15s ease, background .15s ease;
}

.field input:focus,
.field select:focus {
  border-color: rgba(15, 143, 140, .55);
  box-shadow: 0 0 0 4px rgba(15, 143, 140, .10);
}

.search-btn {
  width: 100%;
  height: 40px;
  border: 1px solid var(--kx-primary);
  background: var(--kx-primary);
  color: #fff;
  box-shadow: 0 10px 22px rgba(15, 143, 140, .16);
}

.search-btn:hover {
  border-color: var(--kx-primary-dark);
  background: var(--kx-primary-dark);
  transform: translateY(-1px);
}

.summary {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
}

.kpi {
  min-height: 92px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 16px;
  border: 1px solid var(--kx-border);
  border-radius: 10px;
  background: #fff;
  box-shadow: var(--kx-shadow-sm);
}

.kpi .label {
  margin-bottom: 8px;
  color: var(--kx-muted);
  font-size: 13px;
  font-weight: 900;
}

.kpi .value {
  color: var(--kx-text);
  font-size: 24px;
  line-height: 1.15;
  font-weight: 900;
  word-break: break-word;
}

.kpi:first-child {
  border-color: rgba(22, 138, 97, .20);
  background: linear-gradient(135deg, #fff, var(--kx-success-soft));
}

.kpi:first-child .value {
  color: var(--kx-success);
}

.kpi.problem {
  border-color: rgba(213, 138, 22, .22);
  background: linear-gradient(135deg, #fff, var(--kx-warning-soft));
}

.kpi.problem .value {
  color: var(--kx-warning);
}

.table-wrap {
  overflow-x: auto;
  border: 1px solid var(--kx-border);
  border-radius: 10px;
  background: #fff;
  box-shadow: var(--kx-shadow-sm);
}

table {
  width: 100%;
  min-width: 980px;
  border-collapse: separate;
  border-spacing: 0;
}

th,
td {
  height: 44px;
  padding: 0 14px;
  border-bottom: 1px solid var(--kx-border-light);
  text-align: left;
  font-size: 13px;
  white-space: nowrap;
  vertical-align: middle;
}

th {
  height: 42px;
  color: #33464d;
  background: #f8fbfc;
  font-weight: 900;
}

tbody tr:last-child td {
  border-bottom: none;
}

tbody tr:hover td {
  background: #f8fbfc;
}

.problem-row td {
  background: #fffaf0;
}

.problem-row:hover td {
  background: #fff4dc;
}

.amount-revenue,
.amount-withdrawal {
  font-weight: 900;
}

.amount-revenue {
  color: var(--kx-success);
}

.amount-withdrawal {
  color: var(--kx-danger);
}

.problem-badge {
  min-height: 24px;
  display: inline-flex;
  align-items: center;
  padding: 0 9px;
  border: 1px solid rgba(213, 138, 22, .26);
  border-radius: 999px;
  background: var(--kx-warning-soft);
  color: #9a5d00;
  font-size: 12px;
  line-height: 24px;
  font-weight: 900;
}

.empty,
.loading {
  height: 84px;
  color: var(--kx-muted);
  text-align: center;
  font-weight: 800;
}

.error {
  min-height: 20px;
  margin-top: 10px;
  color: var(--kx-danger);
  font-size: 13px;
  font-weight: 800;
}

.pager {
  min-height: 48px;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 14px;
  color: var(--kx-muted);
}

.pager button {
  min-width: 74px;
  padding: 0 12px;
  border: 1px solid var(--kx-border);
  background: #fff;
  color: var(--kx-muted);
}

.pager button:hover:not(:disabled) {
  border-color: rgba(15, 143, 140, .35);
  background: var(--kx-primary-soft);
  color: var(--kx-primary-dark);
  transform: translateY(-1px);
}

.pager button:disabled {
  opacity: .48;
  cursor: not-allowed;
  transform: none;
}

.page-info {
  font-size: 13px;
  color: var(--kx-muted);
  font-weight: 800;
}

@media (max-width: 1120px) {
  .filters {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .search-btn {
    grid-column: 1 / -1;
  }
}

@media (max-width: 760px) {
  body {
    padding: 14px 10px 28px;
  }

  .card {
    padding: 15px 14px;
    border-radius: 9px;
  }

  .header {
    flex-direction: column;
    align-items: stretch;
    gap: 12px;
  }

  .title {
    font-size: 20px;
  }

  .back-btn {
    width: 100%;
  }

  .filters,
  .summary {
    grid-template-columns: 1fr;
  }

  .kpi {
    min-height: 78px;
  }

  .kpi .value {
    font-size: 21px;
  }

  th,
  td {
    padding: 0 12px;
  }

  .pager {
    justify-content: center;
    flex-wrap: wrap;
  }

  .page-info {
    width: 100%;
    text-align: center;
    order: -1;
  }

  .pager button {
    flex: 1 1 120px;
  }
}
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="header">
      <div class="title">场地流水变动记录</div>
      <button class="back-btn" type="button" onclick="location.href='PaymentDisbursement_optimized.html'">返回提现申请</button>
    </div>
    <div class="filters">
      <div class="field"><label for="changeType">变动类型</label><select id="changeType"><option value="">全部</option><option value="revenue">收益入账</option><option value="withdrawal">提现出账</option></select></div>
      <div class="field"><label for="dataStatus">数据状态</label><select id="dataStatus"><option value="">全部数据</option><option value="abnormal">异常数据</option></select></div>
      <div class="field"><label for="startDate">开始日期</label><input id="startDate" type="date" /></div>
      <div class="field"><label for="endDate">结束日期</label><input id="endDate" type="date" /></div>
      <div class="field"><label for="pageSize">每页条数</label><select id="pageSize"><option value="20">20</option><option value="50">50</option><option value="100">100</option></select></div>
      <button class="search-btn" type="button" onclick="reload()">查询</button>
    </div>
    <div id="error" class="error"></div>
  </div>
  <div class="card">
    <div class="summary">
      <div class="kpi"><div class="label">收益入账合计</div><div id="revenueTotal" class="value">--</div></div>
      <div class="kpi"><div class="label">流水记录数</div><div id="recordTotal" class="value">--</div></div>
      <div class="kpi problem"><div class="label">异常数据数</div><div id="abnormalTotal" class="value">--</div></div>
    </div>
  </div>
  <div class="card">
    <div class="table-wrap">
      <table>
        <thead><tr><th>ID</th><th>类型</th><th>变动金额</th><th>变动后余额</th><th>变动时间</th><th>收益账期</th><th>原因</th><th>来源</th><th>操作人</th><th>备注</th></tr></thead>
        <tbody id="tbody"><tr><td colspan="10" class="loading">加载中...</td></tr></tbody>
      </table>
    </div>
    <div class="pager"><button id="prevBtn" type="button" onclick="changePage(-1)">上一页</button><span id="pageInfo" class="page-info">--</span><button id="nextBtn" type="button" onclick="changePage(1)">下一页</button></div>
  </div>
</div>
<script>
const API_URL='/api/pay/GetVenueFundChanges.php';
const PROBLEM_SOURCE='存在问题订单';
let currentPage=1,total=0;
const els={changeType:document.getElementById('changeType'),dataStatus:document.getElementById('dataStatus'),startDate:document.getElementById('startDate'),endDate:document.getElementById('endDate'),pageSize:document.getElementById('pageSize'),error:document.getElementById('error'),tbody:document.getElementById('tbody'),revenueTotal:document.getElementById('revenueTotal'),recordTotal:document.getElementById('recordTotal'),abnormalTotal:document.getElementById('abnormalTotal'),pageInfo:document.getElementById('pageInfo'),prevBtn:document.getElementById('prevBtn'),nextBtn:document.getElementById('nextBtn')};
function money(v){return Number(v||0).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2})}
function text(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]))}
function typeName(t){return t==='withdrawal'?'提现出账':'收益入账'}
function isProblem(row){return row.source_type===PROBLEM_SOURCE}
function sourceText(row){const parts=[];if(row.source_type)parts.push(row.source_type);if(row.source_id)parts.push(`#${row.source_id}`);return parts.length?parts.join(' '):'--'}
function sourceHtml(row){return isProblem(row)?`<span class="problem-badge">${text(row.source_type)}</span>`:text(sourceText(row))}
function params(){const q=new URLSearchParams();q.set('page',currentPage);q.set('page_size',els.pageSize.value);if(els.changeType.value)q.set('change_type',els.changeType.value);if(els.dataStatus.value==='abnormal')q.set('abnormal','1');if(els.startDate.value)q.set('start_date',els.startDate.value);if(els.endDate.value)q.set('end_date',els.endDate.value);return q.toString()}
async function loadData(){els.error.textContent='';els.tbody.innerHTML='<tr><td colspan="10" class="loading">加载中...</td></tr>';try{const res=await fetch(`${API_URL}?${params()}`,{credentials:'include'});const json=await res.json();if(json.code!==0)throw new Error(json.msg||'查询失败');render(json.data||{})}catch(err){els.error.textContent=err.message||'网络异常，请稍后重试';els.tbody.innerHTML='<tr><td colspan="10" class="empty">暂无数据</td></tr>';renderPager(0,1,Number(els.pageSize.value))}}

function render(data){
  const rows=Array.isArray(data.rows)?data.rows:[];
  const summary=data.summary||{};
  total=Number(data.total||0);
  els.revenueTotal.textContent=`${money(summary.revenue_total)} 元`;
  els.recordTotal.textContent=total.toLocaleString('zh-CN');
  els.abnormalTotal.textContent=Number(summary.abnormal_total||0).toLocaleString('zh-CN');
  if(!rows.length){
    els.tbody.innerHTML='<tr><td colspan="10" class="empty">\u6682\u65e0\u6d41\u6c34\u8bb0\u5f55</td></tr>';
  }else{
    els.tbody.innerHTML=rows.map(row=>{
      const amountClass=row.change_type==='withdrawal'?'amount-withdrawal':'amount-revenue';
      const amountPrefix=row.change_type==='withdrawal'?'-':'+';
      const rowClass=isProblem(row)?' class="problem-row"':'';
      return `<tr${rowClass}><td>${text(row.id)}</td><td>${typeName(row.change_type)}</td><td class="${amountClass}">${amountPrefix} ${money(row.change_amount)} 元</td><td>${money(row.balance_after_change)} 元</td><td>${text(row.change_date)}</td><td>${text(row.revenue_date||'--')}</td><td>${text(row.change_reason||'--')}</td><td>${sourceHtml(row)}</td><td>${text(row.operator_id||'--')}</td><td>${text(row.remarks||'--')}</td></tr>`;
    }).join('');
  }
  renderPager(total,Number(data.page||currentPage),Number(data.page_size||els.pageSize.value));
}
function renderPager(totalRows,page,pageSize){const pages=Math.max(1,Math.ceil(totalRows/pageSize));currentPage=Math.min(page,pages);els.pageInfo.textContent=`第 ${currentPage} / ${pages} 页，共 ${totalRows} 条`;els.prevBtn.disabled=currentPage<=1;els.nextBtn.disabled=currentPage>=pages}
function reload(){currentPage=1;loadData()}function changePage(delta){const pages=Math.max(1,Math.ceil(total/Number(els.pageSize.value)));const next=currentPage+delta;if(next<1||next>pages)return;currentPage=next;loadData()}
els.pageSize.addEventListener('change',reload);els.dataStatus.addEventListener('change',reload);loadData();
</script>
</body>
</html>
