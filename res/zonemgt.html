<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>专区管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
:root {
  --bg: #f4f7f8;
  --panel: #ffffff;
  --text: #172126;
  --muted: #6b7d84;
  --subtle: #8aa0a8;
  --line: #dfe8eb;
  --line-strong: #c9d8dd;
  --primary: #0f8f8c;
  --primary-dark: #08706e;
  --primary-soft: #e6f6f5;
  --success: #20a876;
  --success-soft: #e8f7f1;
  --warning: #ffb84d;
  --warning-soft: #fff5df;
  --danger: #df5b57;
  --danger-soft: #ffefef;
  --blue: #2f7df6;
  --blue-soft: #eef5ff;
  --shadow: 0 12px 34px rgba(30, 55, 66, .08);
  --shadow-sm: 0 8px 22px rgba(30, 55, 66, .07);
  --transition: all .16s ease;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "HarmonyOS Sans SC", "Microsoft YaHei", Arial, sans-serif;
  -webkit-tap-highlight-color: transparent;
}

html,
body {
  width: 100%;
  min-height: 100%;
}

body {
  min-width: 320px;
  min-height: 100vh;
  padding: 22px 24px 32px;
  color: var(--text);
  background: var(--bg);
  overflow-x: hidden;
}

body > canvas {
  display: none !important;
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  border: 0;
  user-select: none;
}

input,
select,
textarea {
  outline: none;
}

.page-shell {
  width: 100%;
  max-width: none;
  margin: 0 auto;
}

.hero-card,
.content-card,
.stat-card,
.summary-card,
.zone-card,
.venue-card {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  box-shadow: var(--shadow);
}

.hero-card {
  min-height: 88px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 20px;
  margin-bottom: 14px;
}

.kicker {
  min-height: 26px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 0 10px;
  margin-bottom: 8px;
  border-radius: 999px;
  color: var(--primary-dark);
  background: var(--primary-soft);
  font-size: 12px;
  line-height: 1;
  font-weight: 800;
}

.hero-title {
  margin: 0;
  color: var(--text);
  font-size: 24px;
  line-height: 1.2;
  font-weight: 900;
  letter-spacing: .01em;
}

.hero-desc {
  margin-top: 7px;
  color: var(--muted);
  font-size: 14px;
  line-height: 1.65;
}

.hero-actions {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 10px;
  flex-wrap: wrap;
}

.btn {
  min-height: 36px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 0 14px;
  border: 1px solid transparent;
  border-radius: 7px;
  color: #fff;
  background: var(--primary);
  box-shadow: none;
  cursor: pointer;
  white-space: nowrap;
  text-decoration: none;
  font-size: 13px;
  line-height: 1;
  font-weight: 800;
  transition: var(--transition);
}

.btn:hover {
  border-color: var(--primary-dark);
  background: var(--primary-dark);
  box-shadow: 0 6px 16px rgba(15, 143, 140, .16);
}

.btn:disabled {
  opacity: .62;
  cursor: not-allowed;
  box-shadow: none;
}

.btn.secondary {
  border-color: var(--line);
  color: var(--muted);
  background: #f7fafb;
}

.btn.secondary:hover {
  border-color: var(--line-strong);
  color: var(--text);
  background: #eef4f6;
  box-shadow: none;
}

.btn.danger {
  border-color: rgba(223, 91, 87, .22);
  color: var(--danger);
  background: var(--danger-soft);
}

.btn.danger:hover {
  border-color: var(--danger);
  color: #fff;
  background: var(--danger);
  box-shadow: 0 6px 16px rgba(223, 91, 87, .14);
}

.btn.small {
  min-height: 32px;
  padding: 0 12px;
  font-size: 12px;
  border-radius: 7px;
}

.stats-grid,
.summary-grid {
  display: grid;
  gap: 12px;
  margin-bottom: 14px;
}

.stats-grid {
  grid-template-columns: repeat(4, minmax(0, 1fr));
}

.summary-grid {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.stat-card,
.summary-card {
  min-width: 0;
  padding: 15px 16px;
  text-align: left;
  box-shadow: var(--shadow-sm);
}

.stat-card {
  position: relative;
  cursor: pointer;
  overflow: hidden;
}

.stat-card:hover,
.zone-card:hover,
.venue-card:hover {
  border-color: var(--primary);
  box-shadow: 0 14px 30px rgba(30, 55, 66, .10);
  transform: translateY(-1px);
}

.stat-card.active {
  border-color: rgba(15, 143, 140, .38);
  background: var(--primary-soft);
}

.stat-card.active::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  width: 4px;
  height: 100%;
  background: var(--primary);
}

.stat-card.active .stat-label,
.stat-card.active .stat-value {
  color: var(--primary-dark);
}

.stat-label,
.summary-label {
  margin-bottom: 8px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.25;
  font-weight: 700;
}

.stat-value,
.summary-value {
  color: var(--text);
  font-size: 24px;
  line-height: 1.2;
  font-weight: 900;
  word-break: break-all;
}

.summary-value {
  font-size: 22px;
}

.content-card {
  overflow: hidden;
  padding: 0;
}

.section-head {
  min-height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  padding: 16px 18px;
  border-bottom: 1px solid var(--line);
  background: var(--panel);
}

.section-title {
  color: var(--text);
  font-size: 18px;
  line-height: 1.2;
  font-weight: 900;
}

.section-subtitle {
  margin-top: 6px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.55;
}

.filter-wrap {
  width: min(360px, 100%);
  flex: 0 0 auto;
}

.filter-input,
.form-control,
.search-input,
.zone-select {
  width: 100%;
  height: 38px;
  padding: 0 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--text);
  background: #fff;
  font-size: 13px;
  transition: border .16s ease, box-shadow .16s ease, background .16s ease;
}

.filter-input::placeholder,
.form-control::placeholder,
.search-input::placeholder {
  color: #9aabb2;
}

.filter-input:focus,
.form-control:focus,
.search-input:focus,
.zone-select:focus {
  border-color: rgba(15, 143, 140, .48);
  box-shadow: 0 0 0 4px rgba(15, 143, 140, .10);
}

.zone-grid,
.venue-list {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
  padding: 18px;
}

.zone-card,
.venue-card {
  min-width: 0;
  padding: 14px;
  box-shadow: var(--shadow-sm);
  transition: var(--transition);
}

.zone-card {
  min-height: 146px;
  display: grid;
  grid-template-columns: 150px minmax(0, 1fr) auto;
  gap: 14px;
}

.venue-card {
  min-height: 140px;
  display: grid;
  grid-template-columns: 126px minmax(0, 1fr);
  gap: 14px;
}

.zone-cover,
.venue-cover,
.image-preview {
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--subtle);
  background: #f7fafb;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  text-align: center;
}

.zone-cover {
  width: 150px;
  height: 118px;
}

.venue-cover {
  width: 126px;
  height: 112px;
}

.zone-cover img,
.venue-cover img,
.image-preview img {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
}

.zone-main,
.venue-main {
  min-width: 0;
}

.venue-main {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.zone-name-row,
.venue-title-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}

.venue-title-row {
  margin-bottom: 0;
}

.zone-name,
.venue-name {
  min-width: 0;
  color: var(--text);
  font-size: 17px;
  line-height: 1.35;
  font-weight: 900;
  word-break: break-word;
}

.pill,
.venue-id,
.zone-badge {
  min-height: 24px;
  display: inline-flex;
  align-items: center;
  width: fit-content;
  max-width: 100%;
  padding: 0 9px;
  border-radius: 999px;
  font-size: 12px;
  line-height: 1.2;
  font-weight: 800;
  white-space: nowrap;
}

.pill.show,
.zone-badge {
  color: #0f7658;
  background: var(--success-soft);
}

.pill.hide {
  color: var(--danger);
  background: var(--danger-soft);
}

.pill.normal,
.venue-id {
  color: var(--primary-dark);
  background: var(--primary-soft);
}

.pill.claw {
  color: #8a5f0a;
  background: var(--warning-soft);
}

.meta-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
  margin-top: 8px;
}

.venue-main .meta-grid {
  margin-top: 0;
}

.meta-item {
  min-width: 0;
  padding: 8px 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fbfcfd;
}

.meta-label {
  margin-bottom: 4px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.2;
  font-weight: 700;
}

.meta-value {
  color: var(--text);
  font-size: 14px;
  line-height: 1.35;
  font-weight: 800;
  word-break: break-all;
}

.time-line {
  margin-top: 9px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.7;
}

.zone-actions,
.venue-actions,
.modal-actions,
.confirm-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.zone-actions {
  min-width: 86px;
  flex-direction: column;
  justify-content: center;
}

.venue-actions {
  margin-top: auto;
  padding-top: 4px;
}

.zone-row {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  gap: 8px;
  align-items: center;
  margin-top: 2px;
}

.zone-label {
  color: var(--muted);
  font-size: 13px;
  font-weight: 700;
  white-space: nowrap;
}

.zone-badge {
  min-height: 30px;
  padding: 5px 10px;
  white-space: normal;
  word-break: break-all;
}

.zone-select {
  display: none;
  width: min(360px, 100%);
  height: 36px;
  margin-top: 6px;
  cursor: pointer;
}

.zone-select.show {
  display: block;
}

.empty-state,
.loading {
  min-height: 150px;
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  border: 1px dashed var(--line-strong);
  border-radius: 8px;
  color: var(--muted);
  background: #fbfcfd;
  text-align: center;
  font-size: 14px;
  line-height: 1.6;
}

.form-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
  padding: 18px 22px 22px;
}

.form-item {
  min-width: 0;
}

.form-item.full {
  grid-column: 1 / -1;
}

.form-label {
  display: block;
  margin-bottom: 7px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.2;
  font-weight: 800;
}

.image-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 10px;
  align-items: center;
}

.image-preview {
  width: 128px;
  height: 86px;
  margin-top: 10px;
  background: #fbfcfd;
}

.modal {
  display: none;
  position: fixed;
  z-index: 999;
  inset: 0;
  align-items: center;
  justify-content: center;
  padding: 18px;
  background: rgba(11, 22, 26, .56);
}

.modal-panel,
.confirm-panel {
  width: min(640px, 96vw);
  max-height: min(88vh, 760px);
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  box-shadow: 0 22px 64px rgba(16, 34, 38, .26);
}

.modal-panel {
  display: flex;
  flex-direction: column;
}

.modal-head {
  min-height: 62px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 14px;
  padding: 18px 22px 14px;
  border-bottom: 1px solid var(--line);
  background: #fff;
}

.modal-title,
.confirm-title {
  color: var(--text);
  font-size: 19px;
  line-height: 1.25;
  font-weight: 900;
}

.modal-desc,
.confirm-desc {
  margin-top: 5px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.55;
}

.modal-close {
  width: 34px;
  height: 34px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--line);
  border-radius: 7px;
  color: var(--muted);
  background: #f7fafb;
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
  transition: var(--transition);
}

.modal-close:hover {
  border-color: var(--line-strong);
  color: var(--text);
  background: #eef4f6;
}

.modal-body {
  padding: 18px 22px 22px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.modal-actions,
.confirm-actions {
  justify-content: flex-end;
  margin-top: 2px;
}

.confirm-panel {
  width: min(420px, 94vw);
  padding: 20px;
}

.venue-dropdown {
  width: 100%;
  max-height: 330px;
  overflow-y: auto;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
}

.venue-option {
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
  cursor: pointer;
  transition: var(--transition);
}

.venue-option:last-child {
  border-bottom: none;
}

.venue-option:hover {
  background: var(--primary-soft);
}

.venue-option-name {
  margin-bottom: 5px;
  color: var(--text);
  font-size: 14px;
  line-height: 1.35;
  font-weight: 900;
}

.venue-option-meta {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.6;
}

.selected-info {
  min-height: 40px;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  color: #34464e;
  background: #fbfcfd;
  font-size: 13px;
  line-height: 1.6;
}

.toast {
  position: fixed;
  top: 22px;
  right: 22px;
  z-index: 2000;
  min-width: 220px;
  max-width: 360px;
  padding: 12px 14px;
  border-radius: 8px;
  color: #fff;
  background: #102226;
  box-shadow: 0 16px 32px rgba(16, 34, 38, .24);
  opacity: 0;
  transform: translateY(-10px);
  pointer-events: none;
  transition: var(--transition);
  font-size: 14px;
  line-height: 1.5;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

.toast.success {
  background: var(--success);
}

.toast.error {
  background: var(--danger);
}

@media (max-width: 1180px) {
  .stats-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .zone-grid,
  .venue-list {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 760px) {
  body {
    padding: 12px;
  }

  .hero-card,
  .section-head {
    align-items: stretch;
    flex-direction: column;
  }

  .hero-actions,
  .modal-actions,
  .confirm-actions {
    justify-content: flex-start;
  }

  .hero-title {
    font-size: 21px;
  }

  .stats-grid,
  .summary-grid,
  .form-grid {
    grid-template-columns: 1fr;
  }

  .filter-wrap {
    width: 100%;
  }

  .zone-grid,
  .venue-list {
    padding: 12px;
  }

  .zone-card,
  .venue-card {
    grid-template-columns: 1fr;
  }

  .zone-cover,
  .venue-cover {
    width: 100%;
    height: 170px;
  }

  .zone-actions {
    min-width: 0;
    flex-direction: row;
    justify-content: flex-start;
  }

  .zone-actions .btn,
  .venue-actions .btn,
  .hero-actions .btn,
  .modal-actions .btn,
  .confirm-actions .btn {
    flex: 1 1 auto;
  }

  .meta-grid {
    grid-template-columns: 1fr;
  }

  .zone-row {
    grid-template-columns: 1fr;
  }

  .image-row {
    grid-template-columns: 1fr;
  }

  .image-preview {
    width: 100%;
    height: 160px;
  }

  .modal {
    padding: 10px;
  }

  .modal-panel,
  .confirm-panel {
    width: 100%;
    max-height: 92vh;
  }

  .modal-head,
  .form-grid,
  .modal-body {
    padding-left: 16px;
    padding-right: 16px;
  }

  .toast {
    left: 12px;
    right: 12px;
    top: 12px;
    min-width: 0;
    max-width: none;
  }
}
  </style>
</head>

<body>
  <div class="page-shell">
    <section class="hero-card">
      <div>
        <div class="kicker">专区配置</div>
        <h1 class="hero-title">专区管理</h1>
        <div class="hero-desc">管理首页专区、展示状态、排序和专区封面图。</div>
      </div>
      <div class="hero-actions">
        <button class="btn" type="button" onclick="openAddModal()">＋ 添加专区</button>
      </div>
    </section>

    <section class="stats-grid">
      <button class="stat-card active" type="button" data-stat-filter="all" onclick="setStatsFilter('all')">
        <div class="stat-label">专区总数</div>
        <div class="stat-value" id="statTotal">0</div>
      </button>
      <button class="stat-card" type="button" data-stat-filter="visible" onclick="setStatsFilter('visible')">
        <div class="stat-label">显示中</div>
        <div class="stat-value" id="statVisible">0</div>
      </button>
      <button class="stat-card" type="button" data-stat-filter="hidden" onclick="setStatsFilter('hidden')">
        <div class="stat-label">隐藏中</div>
        <div class="stat-value" id="statHidden">0</div>
      </button>
      <button class="stat-card" type="button" data-stat-filter="claw" onclick="setStatsFilter('claw')">
        <div class="stat-label">娃娃机专区</div>
        <div class="stat-value" id="statClaw">0</div>
      </button>
    </section>

    <section class="content-card">
      <div class="section-head">
        <div>
          <div class="section-title">专区列表</div>
          <div class="section-subtitle" id="listFilterTip">当前显示：全部专区；支持按专区名称、ID、类型快速过滤。</div>
        </div>
        <div class="filter-wrap">
          <input class="filter-input" id="filterInput" type="text" placeholder="搜索专区名称 / ID / 类型" oninput="renderZones()" />
        </div>
      </div>

      <div id="zone-list" class="zone-grid">
        <div class="loading">加载中...</div>
      </div>
    </section>
  </div>

  <!-- 添加 / 编辑专区弹窗 -->
  <div class="modal" id="addModal" onclick="closeAddModal()">
    <div class="modal-panel" onclick="event.stopPropagation()">
      <div class="modal-head">
        <div>
          <div class="modal-title" id="modalTitle">添加专区</div>
          <div class="modal-desc">图片可以手动填写 URL，也可以直接上传后自动回填。</div>
        </div>
        <button class="modal-close" type="button" onclick="closeAddModal()">×</button>
      </div>

      <div class="form-grid">
        <input type="hidden" id="editZoneId" />

        <div class="form-item full">
          <label class="form-label" for="addName">专区名称</label>
          <input class="form-control" type="text" placeholder="例如：热门专区 / 娃娃机专区" id="addName" />
        </div>

        <div class="form-item">
          <label class="form-label" for="addPartition">分区数量</label>
          <input class="form-control" type="number" placeholder="0" id="addPartition" min="0" />
        </div>

        <div class="form-item">
          <label class="form-label" for="addVehicle">车辆数量</label>
          <input class="form-control" type="number" placeholder="0" id="addVehicle" min="0" />
        </div>

        <div class="form-item">
          <label class="form-label" for="addSort">排序</label>
          <input class="form-control" type="number" placeholder="数值越小越靠前" id="addSort" />
        </div>

        <div class="form-item">
          <label class="form-label" for="addVisible">显示状态</label>
          <select class="form-control" id="addVisible">
            <option value="1">显示专区</option>
            <option value="0">隐藏专区</option>
          </select>
        </div>

        <div class="form-item">
          <label class="form-label" for="addClawMachine">专区类型</label>
          <select class="form-control" id="addClawMachine">
            <option value="0">普通专区</option>
            <option value="1">娃娃机专区</option>
          </select>
        </div>

        <div class="form-item full">
          <label class="form-label" for="addImage">专区图片 URL</label>
          <div class="image-row">
            <input class="form-control" type="text" placeholder="图片 URL，上传后会自动回填" id="addImage" oninput="updateImagePreview()" />
            <button class="btn secondary" id="uploadImageBtn" type="button" onclick="chooseZoneImage()">上传图片</button>
          </div>
          <input type="file" id="zoneImageFile" accept="image/*" style="display:none" />
        </div>

        <div class="form-item full">
          <label class="form-label">图片预览</label>
          <div class="image-preview" id="imagePreview">暂无图片</div>
        </div>

        <div class="modal-actions">
          <button class="btn secondary" type="button" onclick="closeAddModal()">取消</button>
          <button class="btn" id="submitBtn" type="button" onclick="submitZone()">保存提交</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 删除确认弹窗 -->
  <div class="modal" id="confirmModal" onclick="closeConfirm()">
    <div class="confirm-panel" onclick="event.stopPropagation()">
      <div class="confirm-title" id="confirmTitle">确认操作</div>
      <div class="confirm-desc" id="confirmDesc">确认继续？</div>
      <div class="confirm-actions">
        <button class="btn secondary" type="button" onclick="closeConfirm()">取消</button>
        <button class="btn danger" id="confirmOkBtn" type="button">确认删除</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const ZONES_API = '/api/venue/zones.php';
    const UPLOAD_API = 'https://rcwulian.cn/app/img/userimg/upload_profile.php';

    let mode = 'add';
    let zoneDataList = [];
    let activeStatsFilter = 'all';
    let confirmCallback = null;
    let toastTimer = null;

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, function (m) {
        return {
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;'
        }[m];
      });
    }

    function normalizeUrl(url) {
      const value = String(url || '').trim();
      if (!value) return '';
      return value.replace(/^http:\/\//i, 'https://');
    }

    function showToast(message, type = '') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast show' + (type ? ' ' + type : '');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.className = 'toast';
      }, 2200);
    }

    function setLoading(text = '处理中...') {
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = text;
    }

    function clearLoading() {
      const btn = document.getElementById('submitBtn');
      btn.disabled = false;
      btn.textContent = '保存提交';
    }

    function openConfirm(title, desc, okText, callback) {
      document.getElementById('confirmTitle').textContent = title;
      document.getElementById('confirmDesc').textContent = desc;
      document.getElementById('confirmOkBtn').textContent = okText || '确认';
      confirmCallback = callback;
      document.getElementById('confirmModal').style.display = 'flex';
    }

    function closeConfirm() {
      document.getElementById('confirmModal').style.display = 'none';
      confirmCallback = null;
    }

    document.getElementById('confirmOkBtn').addEventListener('click', function () {
      const callback = confirmCallback;
      closeConfirm();
      if (typeof callback === 'function') callback();
    });

    function renderImage(url) {
      const imgUrl = normalizeUrl(url);
      if (!imgUrl) return '<div>暂无图片</div>';
      return `<img src="${escapeHtml(imgUrl)}" alt="专区图" onerror="handleImageError(this)" />`;
    }

    function handleImageError(img) {
      const parent = img && img.parentElement;
      if (!parent) return;
      parent.innerHTML = '<div>图片加载失败</div>';
    }

    function updateStats(list) {
      const total = list.length;
      const visible = list.filter(z => Number(z.is_visible) === 1).length;
      const hidden = total - visible;
      const claw = list.filter(z => Number(z.is_claw_machine) === 1).length;

      document.getElementById('statTotal').textContent = total;
      document.getElementById('statVisible').textContent = visible;
      document.getElementById('statHidden').textContent = hidden;
      document.getElementById('statClaw').textContent = claw;
    }

    function setStatsFilter(type) {
      activeStatsFilter = type || 'all';

      document.querySelectorAll('.stat-card').forEach(card => {
        card.classList.toggle('active', card.dataset.statFilter === activeStatsFilter);
      });

      renderZones();
    }

    function getStatsFilterText() {
      const map = {
        all: '全部专区',
        visible: '显示中的专区',
        hidden: '隐藏中的专区',
        claw: '娃娃机专区'
      };

      return map[activeStatsFilter] || map.all;
    }

    function applyStatsFilter(list) {
      if (activeStatsFilter === 'visible') {
        return list.filter(zone => Number(zone.is_visible) === 1);
      }

      if (activeStatsFilter === 'hidden') {
        return list.filter(zone => Number(zone.is_visible) !== 1);
      }

      if (activeStatsFilter === 'claw') {
        return list.filter(zone => Number(zone.is_claw_machine) === 1);
      }

      return list;
    }

    function openAddModal() {
      mode = 'add';
      document.getElementById('modalTitle').innerText = '添加专区';
      document.getElementById('editZoneId').value = '';
      document.getElementById('addName').value = '';
      document.getElementById('addPartition').value = '0';
      document.getElementById('addVehicle').value = '0';
      document.getElementById('addImage').value = '';
      document.getElementById('addSort').value = '0';
      document.getElementById('addVisible').value = '1';
      document.getElementById('addClawMachine').value = '0';
      updateImagePreview();
      document.getElementById('addModal').style.display = 'flex';
      setTimeout(() => document.getElementById('addName').focus(), 50);
    }

    function closeAddModal() {
      document.getElementById('addModal').style.display = 'none';
    }

    function editZone(id) {
      const zone = zoneDataList.find(z => Number(z.zone_id) === Number(id));
      if (!zone) {
        showToast('未找到该专区数据', 'error');
        return;
      }

      mode = 'edit';
      document.getElementById('modalTitle').innerText = '编辑专区';
      document.getElementById('editZoneId').value = zone.zone_id;
      document.getElementById('addName').value = zone.partition_name || '';
      document.getElementById('addPartition').value = zone.partition_count ?? 0;
      document.getElementById('addVehicle').value = zone.vehicle_count ?? 0;
      document.getElementById('addImage').value = normalizeUrl(zone.zone_image || '');
      document.getElementById('addSort').value = zone.sort_order ?? 0;
      document.getElementById('addVisible').value = String(zone.is_visible ?? 1);
      document.getElementById('addClawMachine').value = String(zone.is_claw_machine ?? 0);
      updateImagePreview();
      document.getElementById('addModal').style.display = 'flex';
    }

    function chooseZoneImage() {
      document.getElementById('zoneImageFile').click();
    }

    document.getElementById('zoneImageFile').addEventListener('change', async function () {
      const file = this.files && this.files[0];
      if (!file) return;

      const btn = document.getElementById('uploadImageBtn');
      btn.disabled = true;
      btn.textContent = '上传中...';

      try {
        const formData = new FormData();

        // 同时传 file 和 image，兼容你现在其他页面用过的 upload_profile.php。
        formData.append('file', file);
        formData.append('image', file);

        const response = await fetch(UPLOAD_API, {
          method: 'POST',
          body: formData
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const result = await response.json();
        const url = normalizeUrl(result && result.url ? result.url : '');

        if (!url) {
          throw new Error(result && result.msg ? result.msg : '接口未返回 url');
        }

        document.getElementById('addImage').value = url;
        updateImagePreview();
        showToast('上传成功，已回填图片链接', 'success');
      } catch (e) {
        console.error('专区图片上传失败：', e);
        showToast('上传失败：' + e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '上传图片';
        this.value = '';
      }
    });

    function updateImagePreview() {
      const url = normalizeUrl(document.getElementById('addImage').value);
      const preview = document.getElementById('imagePreview');

      if (!url) {
        preview.innerHTML = '暂无图片';
        return;
      }

      preview.innerHTML = `<img src="${escapeHtml(url)}" alt="图片预览" onerror="this.parentElement.innerHTML='图片加载失败，请检查 URL'" />`;
    }

    async function submitZone() {
      const name = document.getElementById('addName').value.trim();
      const count = document.getElementById('addPartition').value || '0';
      const vehicle = document.getElementById('addVehicle').value || '0';
      const image = normalizeUrl(document.getElementById('addImage').value);
      const sort = document.getElementById('addSort').value || '0';
      const zoneId = document.getElementById('editZoneId').value;
      const isVisible = document.getElementById('addVisible').value;
      const isClawMachine = document.getElementById('addClawMachine').value;

      if (!name) {
        showToast('请填写专区名称', 'error');
        return;
      }

      const params = new URLSearchParams({
        partition_name: name,
        partition_count: count,
        vehicle_count: vehicle,
        zone_image: image,
        sort_order: sort,
        is_visible: isVisible,
        is_claw_machine: isClawMachine
      });

      let url = `${ZONES_API}?action=add`;
      if (mode === 'edit') {
        url = `${ZONES_API}?action=edit`;
        params.append('zone_id', zoneId);
      }

      setLoading(mode === 'add' ? '添加中...' : '保存中...');

      try {
        const res = await fetch(url, {
          method: 'POST',
          body: params
        });

        const result = await res.json();

        if (result.code === 0) {
          closeAddModal();
          showToast(mode === 'add' ? '添加成功' : '更新成功', 'success');
          await loadZones();
        } else {
          showToast((mode === 'add' ? '添加' : '编辑') + '失败：' + (result.msg || '未知错误'), 'error');
        }
      } catch (e) {
        showToast('请求失败：' + e.message, 'error');
      } finally {
        clearLoading();
      }
    }

    async function loadZones() {
      const container = document.getElementById('zone-list');
      container.innerHTML = '<div class="loading">加载中...</div>';

      try {
        const res = await fetch(ZONES_API);
        const data = await res.json();

        if (data.code !== 0) {
          container.innerHTML = `<div class="empty-state">加载失败：${escapeHtml(data.msg || '未知错误')}</div>`;
          updateStats([]);
          return;
        }

        zoneDataList = Array.isArray(data.data) ? data.data : [];
        renderZones();
      } catch (e) {
        container.innerHTML = `<div class="empty-state">请求失败：${escapeHtml(e.message)}</div>`;
        updateStats([]);
      }
    }

    function renderZones() {
      const container = document.getElementById('zone-list');
      const keyword = document.getElementById('filterInput').value.trim().toLowerCase();

      let list = zoneDataList.slice().sort((a, b) => {
        const sa = Number(a.sort_order ?? 0);
        const sb = Number(b.sort_order ?? 0);
        if (sa !== sb) return sa - sb;
        return Number(b.zone_id ?? 0) - Number(a.zone_id ?? 0);
      });

      list = applyStatsFilter(list);

      if (keyword) {
        list = list.filter(zone => {
          const typeText = Number(zone.is_claw_machine) === 1 ? '娃娃机专区 claw' : '普通专区 normal';
          const visibleText = Number(zone.is_visible) === 1 ? '显示 show' : '隐藏 hide';
          return [
            zone.zone_id,
            zone.partition_name,
            zone.partition_count,
            zone.vehicle_count,
            zone.sort_order,
            typeText,
            visibleText
          ].join(' ').toLowerCase().includes(keyword);
        });
      }

      updateStats(zoneDataList);

      const filterTip = document.getElementById('listFilterTip');
      if (filterTip) {
        const keywordText = keyword ? `，搜索关键字：${document.getElementById('filterInput').value.trim()}` : '';
        filterTip.textContent = `当前显示：${getStatsFilterText()}${keywordText}，共 ${list.length} 条。`;
      }

      if (!list.length) {
        container.innerHTML = '<div class="empty-state">没有找到匹配的专区</div>';
        return;
      }

      container.innerHTML = '';

      list.forEach(zone => {
        const visible = Number(zone.is_visible) === 1;
        const isClaw = Number(zone.is_claw_machine) === 1;
        const card = document.createElement('div');
        card.className = 'zone-card';

        card.innerHTML = `
          <div class="zone-cover">
            ${renderImage(zone.zone_image)}
          </div>

          <div class="zone-main">
            <div class="zone-name-row">
              <div class="zone-name">${escapeHtml(zone.partition_name || '未命名专区')}</div>
              <span class="pill ${visible ? 'show' : 'hide'}">${visible ? '显示中' : '已隐藏'}</span>
              <span class="pill ${isClaw ? 'claw' : 'normal'}">${isClaw ? '娃娃机专区' : '普通专区'}</span>
            </div>

            <div class="meta-grid">
              <div class="meta-item">
                <div class="meta-label">专区 ID</div>
                <div class="meta-value">${escapeHtml(zone.zone_id)}</div>
              </div>
              <div class="meta-item">
                <div class="meta-label">排序</div>
                <div class="meta-value">${escapeHtml(zone.sort_order ?? 0)}</div>
              </div>
              <div class="meta-item">
                <div class="meta-label">分区数</div>
                <div class="meta-value">${escapeHtml(zone.partition_count ?? 0)}</div>
              </div>
              <div class="meta-item">
                <div class="meta-label">车辆数</div>
                <div class="meta-value">${escapeHtml(zone.vehicle_count ?? 0)}</div>
              </div>
            </div>

            <div class="time-line">
              创建：${escapeHtml(zone.created_at || '-')}<br />
              更新：${escapeHtml(zone.updated_at || '-')}
            </div>
          </div>

          <div class="zone-actions">
            <button class="btn small" type="button" onclick="location.href='zone_detail.html?zone_id=${Number(zone.zone_id)}'">详情</button>
            <button class="btn small secondary" type="button" onclick="editZone(${Number(zone.zone_id)})">修改</button>
            <button class="btn small danger" type="button" onclick="confirmDelete(${Number(zone.zone_id)})">删除</button>
          </div>
        `;

        container.appendChild(card);
      });
    }

    function confirmDelete(id) {
      const zone = zoneDataList.find(z => Number(z.zone_id) === Number(id));
      const name = zone ? zone.partition_name : `ID ${id}`;

      openConfirm(
        '删除专区',
        `确定要删除「${name}」吗？删除后不可恢复。`,
        '确认删除',
        () => deleteZone(id)
      );
    }

    async function deleteZone(id) {
      const form = new URLSearchParams({ action: 'delete', zone_id: id });

      try {
        const res = await fetch(`${ZONES_API}?action=delete`, {
          method: 'POST',
          body: form
        });

        const result = await res.json();

        if (result.code === 0) {
          showToast('删除成功', 'success');
          await loadZones();
        } else {
          showToast('删除失败：' + (result.msg || '未知错误'), 'error');
        }
      } catch (e) {
        showToast('请求失败：' + e.message, 'error');
      }
    }

    loadZones();
  </script>
</body>
</html>
