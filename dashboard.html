<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="酷玩星后台管理模板" />
  <title>酷玩星后台管理 - 工作台</title>
  <style>
    :root {
      --bg: #f4f7f8;
      --panel: #ffffff;
      --text: #172126;
      --muted: #6b7d84;
      --line: #dfe8eb;
      --line-strong: #c9d8dd;
      --primary: #0f8f8c;
      --primary-dark: #08706e;
      --primary-soft: #e6f6f5;
      --warning: #ffb84d;
      --success: #20a876;
      --danger: #df5b57;
      --sidebar: #102226;
      --sidebar-muted: #8aa5aa;
      --shadow: 0 12px 34px rgba(30, 55, 66, .08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "HarmonyOS Sans SC", "Microsoft YaHei", Arial, sans-serif;
      background: var(--bg);
    }

    button, input, select { font: inherit; }
    button { font-family: inherit; }
    a { color: inherit; text-decoration: none; }
.sidebar,
.sidebar *,
.nav,
.nav *,
.nav-parent,
.nav-parent-main,
.nav a,
.nav span {
  -webkit-user-select: none;
  -moz-user-select: none;
  user-select: none;
}

.nav-parent,
.nav a {
  -webkit-touch-callout: none;
}
    .layout {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 248px minmax(0, 1fr);
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 20px;
      padding: 22px 16px;
      overflow: hidden;
      color: #eef8f7;
      background: var(--sidebar);
    }

    .sidebar-overlay {
      display: none;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 8px 18px;
      border-bottom: 1px solid rgba(255, 255, 255, .1);
    }

    .mark {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 8px;
      color: #fff;
      background: var(--primary);
    }

    .mark svg {
      width: 21px;
      height: 21px;
    }

    .brand strong {
      display: block;
      font-size: 16px;
      line-height: 1.2;
    }

    .brand span {
      display: block;
      margin-top: 3px;
      color: var(--sidebar-muted);
      font-size: 12px;
    }

    .nav {
      display: grid;
      align-content: start;
      gap: 6px;
      min-height: 0;
      overflow-y: auto;
      padding-right: 4px;
      scrollbar-width: thin;
      scrollbar-color: rgba(207, 224, 227, .28) transparent;
    }

    .nav::-webkit-scrollbar {
      width: 4px;
    }

    .nav::-webkit-scrollbar-track {
      background: transparent;
    }

    .nav::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: rgba(207, 224, 227, .24);
    }

    .nav-section {
      margin: 16px 8px 6px;
      color: var(--sidebar-muted);
      font-size: 12px;
    }

    .nav a {
      min-height: 42px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      border-radius: 8px;
      color: #cfe0e3;
      font-size: 14px;
      transition: background .16s ease, color .16s ease;
    }

    .nav a:hover,
    .nav a.active {
      color: #fff;
      background: rgba(15, 143, 140, .22);
    }

    .nav-group {
      display: grid;
      gap: 4px;
    }

    .nav-parent {
      min-height: 42px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 12px;
      border: 0;
      border-radius: 8px;
      color: #cfe0e3;
      background: transparent;
      font-size: 14px;
      text-align: left;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      transition: background .16s ease, color .16s ease;
    }

    .nav-parent-main {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .nav-parent svg {
      width: 18px;
      height: 18px;
      color: currentColor;
      opacity: .9;
      flex: 0 0 auto;
    }

    .nav-parent span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .nav-parent:hover,
    .nav-group.open .nav-parent {
      color: #fff;
      background: rgba(15, 143, 140, .18);
    }

    .nav-caret {
      content: "";
      width: 7px;
      height: 7px;
      border-right: 1px solid currentColor;
      border-bottom: 1px solid currentColor;
      transform: rotate(-45deg);
      opacity: .72;
      transition: transform .16s ease;
      flex: 0 0 auto;
    }

    .nav-group.open .nav-caret {
      transform: rotate(45deg);
    }

    .nav-children {
      display: none;
      gap: 4px;
      padding: 2px 0 8px 8px;
    }

    .nav-group.open .nav-children {
      display: grid;
    }

    .nav-children a {
      min-height: 36px;
      font-size: 13px;
    }

    .nav-empty {
      padding: 10px 8px;
      color: var(--sidebar-muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .nav svg {
      width: 18px;
      height: 18px;
      color: currentColor;
      opacity: .9;
    }

    .sidebar-foot {
      display: grid;
      gap: 10px;
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 8px;
      background: rgba(255, 255, 255, .04);
      color: var(--sidebar-muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .main {
      min-width: 0;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 0 28px;
      border-bottom: 1px solid var(--line);
      background: rgba(244, 247, 248, .86);
      backdrop-filter: blur(16px);
    }

    .crumb {
      display: grid;
      gap: 4px;
    }

    .crumb span {
      color: var(--muted);
      font-size: 12px;
    }

    .crumb strong {
      font-size: 18px;
      line-height: 1.2;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .search {
      width: 260px;
      min-height: 38px;
      display: grid;
      grid-template-columns: 36px 1fr;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .search svg {
      width: 17px;
      height: 17px;
      justify-self: center;
      color: #8aa0a8;
    }

    .search input {
      width: 100%;
      min-width: 0;
      height: 36px;
      padding: 0 12px 0 0;
      border: 0;
      outline: 0;
      background: transparent;
    }

    .icon-btn,
    .primary-btn,
    .ghost-btn {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 8px;
      cursor: pointer;
      transition: background .16s ease, border .16s ease, color .16s ease, box-shadow .16s ease;
    }

    .icon-btn {
      width: 38px;
      border: 1px solid var(--line);
      color: #486169;
      background: #fff;
    }

    .notice-button {
      position: relative;
    }

    .notice-dot {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 8px;
      height: 8px;
      display: none;
      border: 2px solid #fff;
      border-radius: 50%;
      background: var(--danger);
    }

    .notice-button.has-unread .notice-dot {
      display: block;
    }

    .icon-btn svg,
    .primary-btn svg,
    .ghost-btn svg {
      width: 17px;
      height: 17px;
    }

    .primary-btn {
      padding: 0 14px;
      border: 1px solid var(--primary);
      color: #fff;
      background: var(--primary);
      font-weight: 700;
    }

    .primary-btn:hover {
      background: var(--primary-dark);
      box-shadow: 0 10px 24px rgba(15, 143, 140, .18);
    }

    .ghost-btn {
      padding: 0 12px;
      border: 1px solid var(--line);
      color: #486169;
      background: #fff;
    }

    .user-chip {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: #34464e;
      background: #fff;
      font-size: 13px;
      white-space: nowrap;
    }

    .user-chip i {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
    }

    .content {
      min-width: 0;
      padding: 26px 28px 34px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .stat {
      min-height: 116px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .stat.is-clickable {
      cursor: pointer;
      transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease;
    }

    .stat.is-clickable:hover {
      border-color: rgba(15, 143, 140, .36);
      box-shadow: 0 14px 34px rgba(30, 55, 66, .12);
      transform: translateY(-1px);
    }

    .stat.is-clickable:active {
      transform: translateY(0);
    }

    .stat-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .stat-icon {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: var(--primary);
      background: var(--primary-soft);
    }

    .stat-icon svg {
      width: 18px;
      height: 18px;
    }

    .stat strong {
      display: block;
      margin-top: 18px;
      font-size: 28px;
      line-height: 1;
    }

    .stat small {
      display: block;
      margin-top: 9px;
      color: var(--muted);
      font-size: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 18px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 0 18px;
      border-bottom: 1px solid var(--line);
    }

    .panel-title {
      display: grid;
      gap: 3px;
    }

    .panel-title strong {
      font-size: 16px;
      line-height: 1.2;
    }

    .panel-title span {
      color: var(--muted);
      font-size: 12px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
      font-size: 14px;
    }

    th,
    td {
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      white-space: nowrap;
    }

    th {
      color: var(--muted);
      background: #fbfcfd;
      font-size: 12px;
      font-weight: 700;
    }

    tr:last-child td { border-bottom: 0; }

    .device {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .device-icon {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: var(--primary);
      background: var(--primary-soft);
      flex: 0 0 auto;
    }

    .device-icon svg {
      width: 17px;
      height: 17px;
    }

    .device b {
      display: block;
      line-height: 1.3;
    }

    .device span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
      padding: 0 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .tag::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .tag.ok {
      color: var(--success);
      background: #e8f7f1;
    }

    .tag.warn {
      color: #a16d13;
      background: #fff5df;
    }

    .tag.off {
      color: var(--danger);
      background: #ffefef;
    }

    .side-stack {
      display: grid;
      gap: 18px;
    }

    .todo {
      display: grid;
      gap: 10px;
      padding: 16px;
    }

    .todo-item {
      display: grid;
      grid-template-columns: 18px 1fr auto;
      align-items: center;
      gap: 10px;
      min-height: 42px;
      color: #34464e;
      font-size: 13px;
    }

    .todo-item input {
      width: 16px;
      height: 16px;
      accent-color: var(--primary);
    }

    .todo-item time {
      color: var(--muted);
      font-size: 12px;
    }

    .health {
      display: grid;
      gap: 14px;
      padding: 16px;
    }

    .health-row {
      display: grid;
      gap: 8px;
    }

    .health-row div {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: #34464e;
      font-size: 13px;
    }

    .bar {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: #e9f0f2;
    }

    .bar span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: var(--primary);
    }

    .module-empty {
      min-height: 360px;
      display: grid;
      align-content: center;
      justify-items: start;
      gap: 14px;
      padding: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .module-empty h2 {
      margin: 0;
      font-size: 24px;
    }

    .module-empty p {
      max-width: 680px;
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .dashboard-boot-loading {
      min-height: 260px;
    }

    @media (max-width: 760px) {
      .dashboard-boot-loading {
        min-height: 180px;
        padding: 24px 18px;
      }
    }

    .module-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .module-meta span {
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: #486169;
      background: #fbfcfd;
      font-size: 12px;
    }

    .legacy-module {
      min-height: calc(100vh - 128px);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .legacy-module iframe {
      width: 100%;
      height: calc(100vh - 130px);
      min-height: 720px;
      display: block;
      border: 0;
      background: var(--bg);
    }

    .workbench-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    .workbench-title {
      display: grid;
      gap: 6px;
    }

    .workbench-title h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }

    .workbench-title p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .metric-trend {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 9px;
      color: var(--muted);
      font-size: 12px;
    }

    .workbench-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 18px;
      align-items: start;
    }
    .franchise-home-stack {
  display: grid;
  gap: 18px;
}

.franchise-overview-panel {
  overflow: hidden;
}

.franchise-overview-strip {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
  padding: 16px;
}

.franchise-overview-item {
  min-height: 78px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  padding: 14px 16px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fbfcfd;
}

.franchise-overview-item div {
  min-width: 0;
}

.franchise-overview-item strong {
  display: block;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.2;
  font-weight: 800;
}

.franchise-overview-item span {
  display: block;
  margin-top: 8px;
  color: var(--text);
  font-size: 18px;
  line-height: 1.35;
  font-weight: 900;
  overflow: visible;
  text-overflow: initial;
  white-space: normal;
  word-break: break-word;
}

.franchise-overview-item.is-clickable {
  cursor: pointer;
  transition: border-color .18s ease, box-shadow .18s ease, transform .18s ease;
}

.franchise-overview-item.is-clickable:hover {
  border-color: rgba(13, 148, 136, .35);
  box-shadow: 0 10px 24px rgba(15, 23, 42, .08);
  transform: translateY(-1px);
}

.franchise-pill-wrap {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px;
  margin-top: 8px;
  min-width: 0;
}

.franchise-overview-item .franchise-venue-pill {
  max-width: 150px;
  height: 25px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-top: 0;
  padding: 0 9px;
  border: 1px solid #cfe7e3;
  border-radius: 999px;
  background: #f8fcfb;
  color: #38625d;
  font-size: 12px;
  line-height: 1;
  font-weight: 800;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  word-break: normal;
}

.franchise-overview-item .franchise-venue-pill.primary {
  border-color: #99ded6;
  background: #e9fbf7;
  color: #087568;
}

.franchise-overview-item .franchise-venue-pill.more {
  border-style: dashed;
  background: #fff;
  color: var(--muted);
}

.franchise-venue-modal-mask {
  position: fixed;
  inset: 0;
  z-index: 1200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: rgba(15, 23, 42, .32);
}

.franchise-venue-modal-mask.show {
  display: flex;
}

.franchise-venue-modal {
  width: min(560px, 100%);
  max-height: min(78vh, 680px);
  display: grid;
  grid-template-rows: auto minmax(0, 1fr) auto;
  overflow: hidden;
  border-radius: 18px;
  background: #fff;
  box-shadow: 0 24px 70px rgba(15, 23, 42, .22);
}

.franchise-venue-modal-head,
.franchise-venue-modal-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 16px 18px;
  border-bottom: 1px solid var(--line);
}

.franchise-venue-modal-foot {
  justify-content: flex-end;
  border-top: 1px solid var(--line);
  border-bottom: 0;
}

.franchise-venue-modal-title strong {
  display: block;
  color: var(--text);
  font-size: 17px;
}

.franchise-venue-modal-title span {
  display: block;
  margin-top: 4px;
  color: var(--muted);
  font-size: 12px;
}

.franchise-venue-modal-close {
  width: 34px;
  height: 34px;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: #fff;
  color: var(--muted);
  cursor: pointer;
}

.franchise-venue-modal-body {
  overflow: auto;
  padding: 14px 18px 18px;
}

.franchise-venue-modal-list {
  display: grid;
  gap: 10px;
}

.franchise-venue-modal-row {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr) auto;
  align-items: center;
  gap: 12px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: #fbfcfd;
}

.franchise-venue-modal-row.primary {
  border-color: #99ded6;
  background: #f0fdfa;
}

.franchise-venue-modal-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 54px;
  height: 26px;
  padding: 0 10px;
  border-radius: 999px;
  background: #edf4f3;
  color: #38625d;
  font-size: 12px;
  font-weight: 900;
}

.franchise-venue-modal-row.primary .franchise-venue-modal-badge {
  background: #ccfbf1;
  color: #087568;
}

.franchise-venue-modal-name {
  min-width: 0;
}

.franchise-venue-modal-name strong {
  display: block;
  color: var(--text);
  font-size: 15px;

  <script>
    const sidebarNav = document.getElementById('sidebarNav');
    const sidebar = document.querySelector('.sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const mobileMenuButton = document.querySelector('.mobile-menu');
    const pageContent = document.getElementById('pageContent');
    const noticeButton = document.getElementById('noticeButton');
    const noticeModal = document.getElementById('noticeModal');
    const noticeModalTitle = document.getElementById('noticeModalTitle');
    const noticeModalContent = document.getElementById('noticeModalContent');
    const noticeCloseButton = document.getElementById('noticeCloseButton');
    const noticeLaterButton = document.getElementById('noticeLaterButton');
    const noticeReadButton = document.getElementById('noticeReadButton');
    const homeContent = pageContent.innerHTML;
    let menuTree = [];
    let currentUser = null;
    let deviceFilters = { keyword: '', venueId: '' };
    let noticePollTimer = null;
    let currentNotice = null;
    let lastUnreadNotice = null;
    const autoOpenedNoticeIds = new Set();

    function isMobileSidebar() {
      return window.matchMedia('(max-width: 760px)').matches;
    }

    function openSidebar() {
      if (!sidebar) return;
      sidebar.classList.add('open');
      document.body.classList.add('sidebar-open');
      if (mobileMenuButton) {
        mobileMenuButton.setAttribute('aria-expanded', 'true');
      }
    }

    function closeSidebar() {
      if (sidebar) {
        sidebar.classList.remove('open');
      }
      document.body.classList.remove('sidebar-open');
      if (mobileMenuButton) {
        mobileMenuButton.setAttribute('aria-expanded', 'false');
      }
    }

    function toggleSidebar() {
      if (!sidebar) return;
      if (sidebar.classList.contains('open')) {
        closeSidebar();
      } else {
        openSidebar();
      }
    }

    const iconSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>';
    const menuIcons = {
      dashboard: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 13h8V3H3v10z"/><path d="M13 21h8V11h-8v10z"/><path d="M13 3v6h8V3h-8z"/><path d="M3 21h8v-6H3v6z"/></svg>',
      device: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="12" x="3" y="6" rx="2"/><path d="M8 18v3"/><path d="M16 18v3"/><path d="M7 9h.01"/><path d="M17 9h.01"/></svg>',
      venue: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18"/><path d="M5 21V7l8-4v18"/><path d="M19 21V11l-6-4"/><path d="M9 9h.01"/><path d="M9 13h.01"/><path d="M9 17h.01"/></svg>',
      order: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>',
      user: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="7" r="4"/></svg>',
      finance: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7H14a3.5 3.5 0 0 1 0 7H6"/></svg>',
      ops: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>',
      audit: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>',
      tools: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a4 4 0 1 0-5.6 5.6L3 18v3h3l6.1-6.1a4 4 0 0 0 5.6-5.6l-2.9 2.9-2-2 2.9-2.9z"/></svg>',
      add: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14"/><path d="M5 12h14"/></svg>',
      camera: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2"/></svg>',
      image: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.1-3.1a2 2 0 0 0-2.8 0L6 21"/></svg>',
      link: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.1 0l2-2a5 5 0 0 0-7.1-7.1l-1.1 1.1"/><path d="M14 11a5 5 0 0 0-7.1 0l-2 2A5 5 0 0 0 12 20.1l1.1-1.1"/></svg>',
      search: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>',
      refund: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 14-4-4 4-4"/><path d="M5 10h11a4 4 0 0 1 0 8h-1"/></svg>',
      wallet: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7H5a2 2 0 0 1 0-4h13"/><path d="M20 7v14H5a2 2 0 0 1-2-2V5"/><path d="M16 13h4"/></svg>',
      message: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a4 4 0 0 1-4 4H7l-4 4V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/></svg>',
      gift: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="14" x="3" y="8" rx="2"/><path d="M12 8v13"/><path d="M3 12h18"/><path d="M7.5 8a2.5 2.5 0 1 1 2.5-2.5V8"/><path d="M16.5 8A2.5 2.5 0 1 0 14 5.5V8"/></svg>',
      energy: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2 3 14h8l-1 8 10-12h-8l1-8z"/></svg>',
      chart: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 16V9"/><path d="M12 16V5"/><path d="M17 16v-3"/></svg>',
      bell: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.27 21a2 2 0 0 0 3.46 0"/><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/></svg>',
      map: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18-6 3V6l6-3 6 3 6-3v15l-6 3-6-3z"/><path d="M9 3v15"/><path d="M15 6v15"/></svg>',
      shield: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
      file: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8"/><path d="M8 17h6"/></svg>'
    };

    function menuIcon(name) {
      return menuIcons[name] || iconSvg;
    }

    function childMenuIcon(item) {
      const text = ((item.name || '') + ' ' + (item.title || '') + ' ' + (item.jump || '')).toLowerCase();
      if (text.includes('add') || text.includes('添加') || text.includes('新增')) return menuIcon('add');
      if (text.includes('camera') || text.includes('摄像') || text.includes('device_information')) return menuIcon('camera');
      if (text.includes('photo') || text.includes('image') || text.includes('img') || text.includes('图片') || text.includes('图文') || text.includes('图传')) return menuIcon('image');
      if (text.includes('bind') || text.includes('vehicles_manage') || text.includes('绑定')) return menuIcon('link');
      if (text.includes('fault') || text.includes('故障')) return menuIcon('audit');
      if (text.includes('order') || text.includes('订单')) return menuIcon('order');
      if (text.includes('refund') || text.includes('退款')) return menuIcon('refund');
      if (text.includes('withdraw') || text.includes('pay') || text.includes('fund') || text.includes('income') || text.includes('recharge') || text.includes('amount') || text.includes('提现') || text.includes('支付') || text.includes('账户') || text.includes('充值') || text.includes('金额')) return menuIcon('wallet');
      if (text.includes('user') || text.includes('anchor') || text.includes('franchise') || text.includes('invite') || text.includes('用户') || text.includes('主播') || text.includes('加盟') || text.includes('邀请')) return menuIcon('user');
      if (text.includes('venue') || text.includes('zone') || text.includes('场地') || text.includes('专区')) return menuIcon('map');
      if (text.includes('message') || text.includes('notify') || text.includes('redis') || text.includes('消息') || text.includes('通知') || text.includes('公告')) return menuIcon('message');
      if (text.includes('gift') || text.includes('doll') || text.includes('礼物') || text.includes('娃娃')) return menuIcon('gift');
      if (text.includes('energy') || text.includes('能量')) return menuIcon('energy');
      if (text.includes('rank') || text.includes('stats') || text.includes('kanban') || text.includes('排行') || text.includes('数据') || text.includes('面板')) return menuIcon('chart');
      if (text.includes('report') || text.includes('ban') || text.includes('violation') || text.includes('patrol') || text.includes('audit') || text.includes('投诉') || text.includes('违规') || text.includes('巡查') || text.includes('审核')) return menuIcon('shield');
      if (text.includes('profile') || text.includes('password') || text.includes('资料') || text.includes('密码')) return menuIcon('user');
      if (text.includes('config') || text.includes('setting') || text.includes('tools') || text.includes('配置') || text.includes('设置') || text.includes('工具')) return menuIcon('tools');
      if (text.includes('search') || text.includes('query') || text.includes('查询')) return menuIcon('search');
      return iconSvg;
    }

    async function checkSession() {
      try {
        const response = await fetch('./api/auth/me.php', {
          credentials: 'same-origin',
          cache: 'no-store'
        });
        const result = await response.json();
        if (result.code !== 0) {
          window.location.replace('./index.html');
          return;
        }
        currentUser = result.data || null;
        document.getElementById('currentUser').textContent = result.data.username || 'Admin';
        await loadMenus();
        startNoticePolling();
      } catch (error) {
        window.location.replace('./index.html');
      }
    }

    function flattenMenus(items) {
      return items.flatMap(function(item) {
        return [item].concat(flattenMenus(item.children || []));
      });
    }

    const deferredMenuKeywords = [
      '图传管理','金额查询',
      '图床管理',
       // 隐藏：违规词管理
      '违规词管理',
      '语音房', 'voice_room', 'voiceroom', 'voice-room', 'voice room',
      '礼物', 'gift',
      '金币', 'gold', 'gold_package', 'coin', 'coins',
      '娃娃机', '娃娃', 'doll', 'claw', '抓中', '发货',
      '开播时长', '场地开关播记录', '开关播记录', '开关播',
      'live_duration', 'live_record', 'live_log', 'live_logs',
      '主播认证管理', '主播认证', 'anchor_auth', 'anchorauth',
      '移动工作台', 'mobile_workbench', 'mobileworkbench', 'mobile_workspace',
      'rc后台管理', 'rc 后台管理', 'rc后台', 'rc_admin', 'rc admin', 'adminbackstage'
    ];

    function deferredText(value) {
      return [
        value && value.name,
        value && value.title,
        value && value.jump,
        value && value.group,
        value && value.text
      ].join(' ').toLowerCase();
    }

    function isDeferredEntry(value) {
      const text = deferredText(value);
      return deferredMenuKeywords.some(function(keyword) {
        return text.includes(keyword.toLowerCase());
      });
    }

    function filterDeferredMenus(items, parentHidden) {
      return (items || []).reduce(function(list, item) {
        const hidden = parentHidden || isDeferredEntry(item);
        if (hidden) return list;
        const clone = Object.assign({}, item);
        clone.children = filterDeferredMenus(item.children || [], false);
        list.push(clone);
        return list;
      }, []);
    }

    function renderMenus(items) {
      if (!items.length) {
        sidebarNav.innerHTML = '<div class="nav-empty">当前账号暂无可用菜单</div>';
        return;
      }

      sidebarNav.innerHTML = items.map(function(item) {
        const children = item.children || [];
        if (children.length) {
          return '<div class="nav-group" data-group-id="' + item.id + '">' +
            '<button class="nav-parent" type="button" data-toggle-group="' + item.id + '">' +
            '<span class="nav-parent-main">' + menuIcon(item.name) + '<span>' + escapeHtml(item.title) + '</span></span>' +
            '<i class="nav-caret"></i>' +
            '</button>' +
            '<div class="nav-children">' + children.map(function(child) {
              return renderMenuLink(child, item.id);
            }).join('') + '</div>' +
            '</div>';
        }
        return renderMenuLink(item);
      }).join('');
    }

    function renderMenuLink(item, groupId) {
      const isHome = item.jump === '' || item.jump === '/';
      return '<a href="#menu=' + encodeURIComponent(item.id) + '" class="' + (isHome ? 'active' : '') + '" data-menu-id="' + item.id + '" data-group-id="' + (groupId || '') + '">' +
        (groupId ? childMenuIcon(item) : menuIcon(item.name)) +
        '<span>' + escapeHtml(item.title) + '</span>' +
        '</a>';
    }

    async function loadMenus() {
      const response = await fetch('./api/auth/menu.php', {
        credentials: 'same-origin',
        cache: 'no-store'
      });
      const result = await response.json();
      if (result.code !== 0) {
        window.location.replace('./index.html');
        return;
      }
      currentUser = result.data.user || currentUser;
      menuTree = filterDeferredMenus(result.data.menus || [], false);
      renderMenus(menuTree);
      routeFromHash();
    }

    function findMenu(id) {
      return flattenMenus(menuTree).find(function(item) {
        return String(item.id) === String(id);
      });
    }

    function findTopMenu(id) {
      return menuTree.find(function(item) {
        return String(item.id) === String(id);
      });
    }

    function setActive(id) {
      let activeGroupId = '';
      sidebarNav.querySelectorAll('a').forEach(function(link) {
        const active = link.dataset.menuId === String(id);
        link.classList.toggle('active', active);
        if (active && link.dataset.groupId) {
          activeGroupId = link.dataset.groupId;
        }
      });
      sidebarNav.querySelectorAll('.nav-parent').forEach(function(button) {
        const active = button.dataset.toggleGroup === String(id);
        button.classList.toggle('active', active);
        if (active) {
          activeGroupId = button.dataset.toggleGroup;
        }
      });
      sidebarNav.querySelectorAll('.nav-group').forEach(function(group) {
        const shouldOpen = activeGroupId && group.dataset.groupId === String(activeGroupId);
        group.classList.toggle('open', !!shouldOpen);
      });
      if (!activeGroupId) {
        sidebarNav.querySelectorAll('.nav-group.open').forEach(function(group) {
          group.classList.remove('open');
        });
      }
    }

    function routeFromHash() {
      const params = new URLSearchParams(location.hash.replace(/^#/, ''));
      const id = params.get('menu');
      const venueId = params.get('venue') || '';
      const item = id ? findMenu(id) : null;
      if (!item || item.jump === '' || item.jump === '/') {
        renderWorkbench();
        document.querySelector('.crumb span').textContent = 'Home / Dashboard';
        document.querySelector('.crumb strong').textContent = '工作台';
        const first = sidebarNav.querySelector('a');
        if (first) setActive(first.dataset.menuId);
        return;
      }
      setActive(item.id);
      if (Array.isArray(item.children) && item.children.length) {
        renderCategory(item);
        return;
      }
      const module = params.get('module') || '';
      if (isFranchiseUser() && module === 'pricing' && venueId) {
        renderFranchisePricingShortcut(item, venueId);
        return;
      }
      if (shouldShowFranchiseVenueOverview(item, venueId)) {
        renderFranchiseVenueOverview(item);
        return;
      }
      if (legacyModuleUrl(item)) {
        renderLegacyModule(item, { venueId: venueId });
        return;
      }
      if (isDeviceChild(item)) {
        renderDeviceSubpage(item);
        return;
      }
      renderModule(item);

    function navigateToMenu(id, venueId) {
      const target = 'menu=' + encodeURIComponent(id);
      const nextTarget = venueId ? target + '&venue=' + encodeURIComponent(venueId) : target;
      if (location.hash.replace(/^#/, '') === nextTarget) {
        routeFromHash();
      } else {
        location.hash = nextTarget;
      }
      if (isMobileSidebar()) {
        closeSidebar();
      }
    }

    function isDeviceChild(item) {
      const deviceGroup = menuTree.find(function(group) {
        return group.name === 'device';
      });
      if (!deviceGroup || !Array.isArray(deviceGroup.children)) return false;
      return deviceGroup.children.some(function(child) {
        return String(child.id) === String(item.id);
      });
    }

    function renderModule(item) {
      const desc = moduleDescription(item);
      document.querySelector('.crumb span').textContent = 'Menu / ' + item.name;
      document.querySelector('.crumb strong').textContent = item.title;
      pageContent.innerHTML = '<section class="module-empty">' +
        '<h2>' + escapeHtml(item.title) + '</h2>' +
        '<p>' + escapeHtml(desc) + '</p>' +
        '<div class="module-meta">' +
        '<span>menu_id: ' + escapeHtml(String(item.id)) + '</span>' +
        '<span>name: ' + escapeHtml(item.name || '-') + '</span>' +
        '<span>legacy_jump: ' + escapeHtml(item.jump || '-') + '</span>' +
        '</div>' +
        '</section>';
    }

    function legacyModuleUrl(item, options) {
      options = options || {};
      const raw = String(item.jump || '').trim();
      if (!raw || raw === '/' || /^https?:\/\//i.test(raw)) return '';

      const jump = raw.split(/[?#]/)[0].replace(/^\/+/, '').replace(/\/+$/, '');
      let pageName = '';

      if (jump.startsWith('iframe/link/')) {
        pageName = jump.slice('iframe/link/'.length);
      } else if (jump.startsWith('res/') && /\.html$/i.test(jump)) {
        pageName = jump.slice('res/'.length).replace(/\.html$/i, '');
      }

      pageName = pageName.replace(/\/+$/, '').split('/').pop().replace(/\.html$/i, '');
      if (pageName.toLowerCase() === 'devicemgt') pageName = 'devMgtV2';
      if (!pageName || pageName.includes('..')) return '';

      const query = new URLSearchParams({ embed: 'dashboard' });
      if (options.venueId) {
        query.set('venue_id', String(options.venueId));
        if (isVenueDetailModule(item)) {
          query.set('id', String(options.venueId));
        }
      }

      return './res/' + encodeURIComponent(pageName) + '.html?' + query.toString();
    }

    function renderLegacyModule(item, options) {
      options = options || {};
      const src = legacyModuleUrl(item, options);
      document.querySelector('.crumb span').textContent = 'Menu / ' + item.name;
      document.querySelector('.crumb strong').textContent = item.title;
      pageContent.innerHTML = '<section class="legacy-module">' +
        '<iframe src="' + escapeHtml(src) + '" title="' + escapeHtml(item.title) + '"></iframe>' +
        '</section>';
    }

    function renderFranchisePricingShortcut(item, venueId) {

      document.querySelector('.crumb span').textContent = '加盟商 / 场地总览';
      document.querySelector('.crumb strong').textContent = '资费套餐';

    function isFranchiseUser() {
      return Number((currentUser && currentUser.role_id) || 0) === 3;
    }

    function shouldShowFranchiseVenueOverview(item, venueId) {
      if (!isFranchiseUser() || venueId) return false;
      if (!legacyModuleUrl(item)) return false;
      const text = ((item.name || '') + ' ' + (item.title || '') + ' ' + (item.jump || '')).toLowerCase();
      return text.includes('franchise-') &&
        !text.includes('system-profile') &&
        !text.includes('system-password') &&
        !text.includes('基本资料') &&
        !text.includes('修改密码');
    }

    function isVenueDetailModule(item) {
      const text = ((item.name || '') + ' ' + (item.title || '') + ' ' + (item.jump || '')).toLowerCase();
      return text.includes('franchise-venues') || text.includes('/venue') || text.includes('场地管理');
    }

    function franchiseFeatureKey(item) {
      const text = ((item.name || '') + ' ' + (item.title || '') + ' ' + (item.jump || '')).toLowerCase();
      if (text.includes('device') || text.includes('vehicle') || text.includes('设备') || text.includes('挂车')) return 'device';
      if (text.includes('order') || text.includes('refund') || text.includes('订单') || text.includes('退款')) return 'order';
      if (text.includes('income') || text.includes('withdraw') || text.includes('payment') || text.includes('pricing') || text.includes('fund') || text.includes('收入') || text.includes('提现') || text.includes('资费') || text.includes('财务')) return 'finance';
      if (text.includes('venue') || text.includes('场地')) return 'venue';
      return 'ops';
    }

    function franchiseOverviewModuleKey(item) {
      const text = ((item.name || '') + ' ' + (item.title || '') + ' ' + (item.jump || '')).toLowerCase();
      if (text.includes('withdraw') || text.includes('paymentdisbursement') || text.includes('提现申请') || text.includes('提现')) return 'withdraw';
      if (text.includes('refund') || text.includes('refund_records') || text.includes('退款记录') || text.includes('退款')) return 'refund';
      if (text.includes('ban_record') || text.includes('violation') || text.includes('违规记录') || text.includes('封禁记录') || text.includes('违规') || text.includes('封禁')) return 'violation';
      if (text.includes('reporthand') || text.includes('complaint') || text.includes('投诉处理') || text.includes('投诉')) return 'complaint';
      if (text.includes('income') || text.includes('收入明细')) return 'income';
      if (text.includes('device') || text.includes('vehicle') || text.includes('设备')) return 'device';
      if (text.includes('order') || text.includes('订单')) return 'order';
      if (text.includes('venue') || text.includes('场地')) return 'venue';
      return '';
    }

    function franchiseOverviewDescription(item) {
      const moduleKey = franchiseOverviewModuleKey(item);
      if (moduleKey === 'withdraw') {
        return '先查看各场地总余额和可提现金额，再进入某个场地提交提现申请。';
      }
      if (moduleKey === 'refund') {
        return '先查看各场地已退款金额和待退款金额，再进入某个场地查看退款记录。';
      }
      if (moduleKey === 'violation') {
        return '先查看各场地当日违规次数，再进入某个场地查看违规记录。';
      }
      if (moduleKey === 'complaint') {
        return '先查看各场地投诉处理情况，再进入某个场地处理投诉。';
      }

      const feature = franchiseFeatureKey(item);
      const descriptions = {
        device: '先查看名下所有场地的设备概况，再进入某个场地维护设备。',
        order: '先汇总各场地订单和收入，再进入某个场地管理预约订单。',
        finance: '先查看各场地收入和设备经营状态，再进入某个场地处理财务功能。',
        venue: '先查看名下场地列表，再进入某个场地维护资料和配置。',
        ops: '先选择要处理的场地，再进入对应运营功能。'
      };
      return descriptions[feature] || moduleDescription(item);
    }

    async function renderFranchiseVenueOverview(item) {
      const feature = franchiseFeatureKey(item);
      const moduleKey = franchiseOverviewModuleKey(item);
      const params = new URLSearchParams({ feature: feature });
      if (moduleKey) params.set('module', moduleKey);

      document.querySelector('.crumb span').textContent = '加盟商 / 场地总览';
      document.querySelector('.crumb strong').textContent = item.title;
      pageContent.innerHTML = '<section class="subpage"><div class="empty-state">正在加载场地总览...</div></section>';

      try {
        const response = await fetch('./api/franchise/venue_feature_overview.php?' + params.toString(), {
          credentials: 'same-origin',
          cache: 'no-store'
        });
        const result = await response.json();
        if (result.code !== 0) {
          throw new Error(result.msg || 'franchise overview failed');
        }

        pageContent.innerHTML = buildFranchiseVenueOverviewHtml(item, result.data || {});
      } catch (error) {
        pageContent.innerHTML = '<section class="subpage"><div class="empty-state">场地总览加载失败，请稍后重试。</div></section>';
      }
    }

    function buildFranchiseVenueOverviewHtml(item, data) {
      const summary = data.summary || {};
      const venues = Array.isArray(data.venues) ? data.venues : [];
      const summaryItems = Array.isArray(data.summary_items) && data.summary_items.length
        ? data.summary_items
        : [
            { label: '场地', value_text: formatInt(summary.venue_count || venues.length) + ' 个' },
            { label: '今日收入', value_text: formatMoney(summary.today_revenue || 0) },
            { label: '今日订单', value_text: formatInt(summary.today_order_count || 0) + ' 单' },
            { label: '在线设备', value_text: formatInt(summary.online_devices || 0) + '/' + formatInt(summary.total_devices || 0) }
          ];

      return '<section class="subpage">' +
        '<div class="subpage-head">' +
        '<div class="subpage-title-row">' +
        '<div class="subpage-title"><h2>' + escapeHtml(item.title) + ' · 场地总览</h2><p>' + franchiseOverviewDescription(item) + '</p></div>' +
        '<div class="subpage-status">先选场地</div>' +
        '</div>' +
        '<div class="subpage-meta">' +
        summaryItems.map(function(meta) {
          return '<span>' + escapeHtml(meta.label || '') + '：' + escapeHtml(meta.value_text || meta.value || '-') + '</span>';
        }).join('') +
        '</div>' +
        '</div>' +
        (venues.length ? '<div class="franchise-venue-grid">' + venues.map(function(venue) {
          return franchiseVenueCard(item, venue, data.card_layout || 'layout-4');
        }).join('') + '</div>' : '<div class="empty-state">当前账号暂无可管理场地。</div>') +
        '</section>';
    }

    function franchiseOverviewStatHtml(stat) {
      return '<div><span>' + escapeHtml(stat.label || '-') + '</span><strong>' + escapeHtml(stat.value_text || stat.value || '-') + '</strong></div>';
    }

    function franchiseOverviewExtraHtml(extraItems) {
      if (!Array.isArray(extraItems) || !extraItems.length) return '';
      return '<div class="franchise-venue-extra">' + extraItems.map(function(item) {
        return '<span>' + escapeHtml(item.label || '-') + '：' + escapeHtml(item.value_text || item.value || '-') + '</span>';

    function franchiseVenueCard(item, venue, defaultLayout) {
      const status = venue.venue_status || '未设置';
      const statusClass = status === '营业中' ? 'ok' : (status === '休息中' ? 'warn' : 'off');
      const showPricingShortcut = isVenueDetailModule(item);
      const pricingButton = showPricingShortcut
        ? '<button class="primary-btn franchise-pricing-btn" type="button" data-menu-id="' + escapeHtml(String(item.id)) + '" data-venue-id="' + escapeHtml(String(venue.id)) + '" onclick="openFranchiseVenuePricing(event, this)">进入资费套餐</button>'
        : '';
      const stats = Array.isArray(venue.overview_stats) && venue.overview_stats.length
        ? venue.overview_stats
        : [
            { label: '今日收入', value_text: formatMoney(venue.today_revenue || 0) },
            { label: '今日订单', value_text: formatInt(venue.today_order_count || 0) + ' 单' },
            { label: '在线设备', value_text: formatInt(venue.online_devices || 0) + '/' + formatInt(venue.total_devices || 0) },
            { label: '离线设备', value_text: formatInt(venue.offline_devices || 0) + ' 台' }
          ];
      const layout = venue.overview_layout || defaultLayout || ('layout-' + Math.min(4, Math.max(1, stats.length)));

      return '<article class="franchise-venue-card">' +
        '<div class="franchise-venue-top">' +
        '<div class="franchise-venue-title"><h3>' + escapeHtml(venue.venue_name || ('场地 ' + venue.id)) + '</h3><span>场地 ID：' + escapeHtml(String(venue.id || '-')) + '</span></div>' +

        pricingButton +

    function deviceSubpageType(item) {
      const text = ((item.name || '') + ' ' + (item.title || '') + ' ' + (item.jump || '')).toLowerCase();
      if (text.includes('adddev') || text.includes('添加')) return 'add';
      if (text.includes('fault') || text.includes('故障')) return 'fault';
      if (text.includes('camera') || text.includes('摄像') || text.includes('device_information')) return 'camera';
      if (text.includes('photo') || text.includes('img') || text.includes('图片')) return 'photo';
      if (text.includes('bind') || text.includes('vehicles_manage')) return 'binding';

    async function renderDeviceDataPage(item, type, url) {
      document.querySelector('.crumb span').textContent = '设备管理 / ' + type;
      document.querySelector('.crumb strong').textContent = item.title;
      pageContent.innerHTML = '<section class="subpage"><div class="empty-state">正在加载' + escapeHtml(item.title) + '数据...</div></section>';
      try {
        const response = await fetch(url, { credentials: 'same-origin', cache: 'no-store' });
        const result = await response.json();
        if (result.code !== 0) throw new Error(result.msg || 'device subpage failed');
        const rows = (result.data && result.data.rows) || [];
        pageContent.innerHTML = buildDeviceDataHtml(item, type, rows);

        pageContent.innerHTML = '<section class="subpage"><div class="empty-state">' + escapeHtml(item.title) + '数据加载失败。</div></section>';
      }

    function buildDeviceDataHtml(item, type, rows) {
      const columns = deviceColumns(type);
      return '<section class="subpage">' +
        '<div class="subpage-head"><div class="subpage-title-row"><div class="subpage-title"><h2>' + escapeHtml(item.title) + '</h2><p>' + escapeHtml(deviceDataDescription(type)) + '</p></div><div class="subpage-status">真实数据</div></div><div class="subpage-meta"><span>记录数：' + rows.length + '</span><span>legacy_jump: ' + escapeHtml(item.jump || '-') + '</span></div></div>' +
        '<section class="subpage-section">' +
        (rows.length ? genericTable(columns, rows) + genericCards(columns, rows) : '<div class="empty-state">暂无数据</div>') +
        '</section></section>';
    }

    function deviceDataDescription(type) {
      return {
        faults: '展示设备故障记录和处理状态',
        cameras: '展示摄像设备、房间号、推流 ID 和关联设备信息',
        photos: '展示设备图片、摄像设备编号和更新时间',
        bindings: '展示设备 UID、绑定场地和共享状态'
      }[type] || '设备子功能数据列表';
    }

    function deviceColumns(type) {
      const maps = {
        faults: [['serial_number','设备编号'], ['name','设备名称'], ['venue_name','场地'], ['fault_reason','故障原因'], ['resolved_status','状态'], ['created_at','时间']],
        cameras: [['id','ID'], ['device_id','设备ID'], ['room_id','房间号'], ['rtc_user_id','RTC用户'], ['serial_number','关联设备'], ['venue_name','场地']],
        photos: [['serial_number','设备编号'], ['name','设备名称'], ['venue_name','场地'], ['photo_url','图片'], ['image_device_serial','摄像ID'], ['updated_at','更新']],
        bindings: [['serial_number','设备编号'], ['name','设备名称'], ['uid','UID'], ['venue_name','场地'], ['status','状态'], ['sharing_status','共享']]
      };
      return maps[type] || [];
    }

    function genericTable(columns, rows) {
      return '<div class="device-table"><table><thead><tr>' + columns.map(function(c){ return '<th>' + escapeHtml(c[1]) + '</th>'; }).join('') + '</tr></thead><tbody>' +
        rows.map(function(row){ return '<tr>' + columns.map(function(c){ return '<td>' + escapeHtml(row[c[0]] == null ? '-' : row[c[0]]) + '</td>'; }).join('') + '</tr>'; }).join('') +
        '</tbody></table></div>';
    }

    function genericCards(columns, rows) {
      return '<div class="device-cards">' + rows.map(function(row) {
        const titleKey = columns[0] ? columns[0][0] : '';
        return '<article class="device-card"><div class="device-card-head"><div><h3>' + escapeHtml(row[titleKey] || '-') + '</h3><p>' + escapeHtml(columns[0] ? columns[0][1] : '') + '</p></div></div><div class="device-card-grid">' +
          columns.slice(1).map(function(c){ return '<div><span>' + escapeHtml(c[1]) + '</span><b>' + escapeHtml(row[c[0]] == null ? '-' : row[c[0]]) + '</b></div>'; }).join('') +
          '</div></article>';
      }).join('') + '</div>';
    }

    function isDeviceListPage(item) {
      const text = ((item.name || '') + ' ' + (item.title || '') + ' ' + (item.jump || '')).toLowerCase();
      return text.includes('devicemgt') || text.includes('devicemgtv2') || text.includes('device-list') || text.includes('设备管理');

    async function renderDeviceListPage(item) {
      document.querySelector('.crumb span').textContent = '设备管理 / list';
      document.querySelector('.crumb strong').textContent = item.title;
      pageContent.innerHTML = '<section class="subpage"><div class="subpage-head"><div class="subpage-title-row"><div class="subpage-title"><h2>设备管理</h2><p>设备列表</p></div><div class="subpage-status"></div></div></div><div class="empty-state">正在加载设备数据...</div></section>';
      await loadDeviceList(1);
    }

    async function loadDeviceList(page) {
      const keyword = document.getElementById('deviceKeyword') ? document.getElementById('deviceKeyword').value.trim() : '';
      const venueId = document.getElementById('deviceVenue') ? document.getElementById('deviceVenue').value : '';
      deviceFilters = { keyword, venueId };
      const params = new URLSearchParams({ page: String(page || 1), limit: '20' });
      if (keyword) params.set('keyword', keyword);
      if (venueId) params.set('venue_id', venueId);

      try {
        const response = await fetch('./api/device/list.php?' + params.toString(), {
          credentials: 'same-origin',
          cache: 'no-store'
        });
        const result = await response.json();
        if (result.code !== 0) {
          throw new Error(result.msg || 'device list failed');
        }
        renderDeviceList(result.data || {});
      } catch (error) {
        pageContent.innerHTML = '<section class="subpage"><div class="empty-state">设备数据加载失败，请稍后重试。</div></section>';
      }
    }

    function renderDeviceList(data) {
      const devices = data.devices || [];
      const stats = data.stats || {};
      const page = Number(data.page || 1);
      const limit = Number(data.limit || 20);
      const total = Number(data.total || 0);
      const pages = Math.max(1, Math.ceil(total / limit));

      pageContent.innerHTML = '<section class="subpage">' +
        '<div class="subpage-head">' +
        '<div class="subpage-title-row"><div class="subpage-title"><h2>设备管理</h2><p>查看设备运行状态、绑定场地、摄像房间号和封禁状态。</p></div><div class="subpage-status">真实数据</div></div>' +
        '<div class="subpage-meta"><span>总设备：' + formatInt(stats.total) + '</span><span>在线：' + formatInt(stats.online) + '</span><span>离线：' + formatInt(stats.offline) + '</span><span>封禁：' + formatInt(stats.banned) + '</span></div>' +
        '</div>' +
        '<section class="subpage-section">' +
        '<div class="device-toolbar">' +
        '<div class="device-filters">' +
        '<input class="device-input" id="deviceKeyword" type="search" placeholder="搜索设备编号、名称、场地" value="' + escapeHtml(deviceFilters.keyword || '') + '">' +
        venueSelect(data.venues || []) +
        '<button class="primary-btn" type="button" onclick="loadDeviceList(1)">查询</button>' +
        '</div>' +
        '<button class="ghost-btn" type="button" onclick="loadDeviceList(' + page + ')">刷新</button>' +
        '</div>' +
        (devices.length ? deviceTable(devices) + deviceCards(devices) : '<div class="empty-state">暂无设备数据</div>') +
        '<div class="device-pager"><button class="ghost-btn" type="button" ' + (page <= 1 ? 'disabled' : '') + ' onclick="loadDeviceList(' + (page - 1) + ')">上一页</button><span>第 ' + page + ' / ' + pages + ' 页，共 ' + total + ' 条</span><button class="ghost-btn" type="button" ' + (page >= pages ? 'disabled' : '') + ' onclick="loadDeviceList(' + (page + 1) + ')">下一页</button></div>' +
        '</section>' +
        '</section>';
    }

    function venueSelect(venues) {
      if (!venues.length) return '';
      return '<select class="device-select" id="deviceVenue"><option value="">全部场地</option>' + venues.map(function(venue) {
        const selected = String(deviceFilters.venueId || '') === String(venue.id) ? ' selected' : '';
        return '<option value="' + escapeHtml(String(venue.id)) + '"' + selected + '>' + escapeHtml(venue.venue_name || ('场地 ' + venue.id)) + '</option>';
      }).join('') + '</select>';
    }

    function deviceTable(devices) {
      return '<div class="device-table"><table><thead><tr><th>设备</th><th>场地</th><th>状态</th><th>摄像</th><th>电量</th><th>更新时间</th></tr></thead><tbody>' +
        devices.map(function(device) {
          return '<tr><td><div class="device"><span class="device-icon">' + menuIcon('device') + '</span><div><b>' + escapeHtml(device.name || device.serial_number || '-') + '</b><span>' + escapeHtml(device.serial_number || '-') + '</span></div></div></td>' +
          '<td>' + escapeHtml(device.venue_name || device.bind_site || '-') + '</td>' +
          '<td>' + deviceStatus(device) + '</td>' +
          '<td>' + escapeHtml(device.image_device_room_id || device.image_device_serial || '-') + '</td>' +
          '<td>' + escapeHtml(device.battery_level || '-') + '</td>' +
          '<td>' + escapeHtml(device.updated_at || '-') + '</td></tr>';
        }).join('') +
        '</tbody></table></div>';
    }

    function deviceCards(devices) {
      return '<div class="device-cards">' + devices.map(function(device) {
        return '<article class="device-card"><div class="device-card-head"><div><h3>' + escapeHtml(device.name || device.serial_number || '-') + '</h3><p>' + escapeHtml(device.serial_number || '-') + '</p></div>' + deviceStatus(device) + '</div>' +

          '<div><span>场地</span><b>' + escapeHtml(device.venue_name || device.bind_site || '-') + '</b></div>' +
          '<div><span>摄像</span><b>' + escapeHtml(device.image_device_room_id || device.image_device_serial || '-') + '</b></div>' +
          '<div><span>电量</span><b>' + escapeHtml(device.battery_level || '-') + '</b></div>' +
          '<div><span>更新</span><b>' + escapeHtml(device.updated_at || '-') + '</b></div>' +
          '</div></article>';
      }).join('') + '</div>';
    }

    function deviceStatus(device) {
      if (Number(device.is_banned || 0) === 1) return '<span class="tag off">封禁</span>';
      if (String(device.status || '') === '在线') return '<span class="tag ok">在线</span>';
      return '<span class="tag warn">' + escapeHtml(device.status || '离线') + '</span>';
    }

    function devicePageDetail(item) {
      const text = ((item.name || '') + ' ' + (item.title || '') + ' ' + (item.jump || '')).toLowerCase();
      if (text.includes('adddev') || text.includes('添加')) {

const DASHBOARD_MSG_API = './api/index/Msg.php';

const dashboardMessageState = {
  notices: [],
  logs: [],
  currentNoticeId: 0,
  noticePage: 1,
  noticePageSize: 2
};

function stripNoticeTrailingPunct(url) {
  return url.replace(/[。．\.，,；;！!？\?\)\]】》」'"]+$/u, '');
}

function dashboardLinkify(text) {
  if (!text) return '';

  const urlRe = /(https?:\/\/[^\s<>"']+)/g;
  const raw = String(text);
  const out = [];
  let last = 0;

  raw.replace(urlRe, function(m, _1, offset) {
    out.push(escapeHtml(raw.slice(last, offset)));

    const clean = stripNoticeTrailingPunct(m);
    const trailing = m.slice(clean.length);
    let label = clean;

    try {
      label = decodeURI(clean);
    } catch (e) {}

    out.push(
      '<a href="' + escapeHtml(clean) + '" target="_blank" rel="noopener noreferrer nofollow">' +
        escapeHtml(label) +
      '</a>'
    );
    out.push(escapeHtml(trailing));
    last = offset + m.length;
    return m;
  });

  out.push(escapeHtml(raw.slice(last)));
  return out.join('');
}

function dashboardNoticeDate(value) {
  if (!value) return '';

  let dateValue = value;
  if (/^\d+$/.test(String(dateValue))) {
    let n = Number(dateValue);
    if (String(dateValue).length === 10) n *= 1000;
    dateValue = n;
  }

  const d = new Date(dateValue);
  if (Number.isNaN(d.getTime())) return String(value);

  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function dashboardNoticeLevel(notice) {
  const imp = Number((notice && notice.importance) || 1);

  if (imp === 4) {
    return { text: '处罚', cls: 'danger', color: '#7c3aed' };
  }

  if (imp === 3) {
    return { text: '紧急', cls: 'danger', color: '#df5b57' };
  }

  if (imp === 2) {
    return { text: '重要', cls: 'warn', color: '#d58a16' };
  }

  return { text: '普通', cls: 'info', color: '#0f8f8c' };
}

dashboardMessageState.notices = Array.isArray(data.notices) ? data.notices : [];

dashboardMessageState.noticePage = 1;

renderDashboardNotices();

function renderDashboardNotices() {
  const box = document.getElementById('dashboardNoticeList');
  if (!box) return;

  const list = dashboardMessageState.notices || [];

  if (!list.length) {
    box.innerHTML = '<div class="dashboard-empty">暂无官方通知</div>';
    return;
  }

  const pageSize = dashboardMessageState.noticePageSize || 2;
  const total = list.length;
  const totalPages = Math.max(1, Math.ceil(total / pageSize));

  if (dashboardMessageState.noticePage > totalPages) {
    dashboardMessageState.noticePage = totalPages;
  }

  if (dashboardMessageState.noticePage < 1) {
    dashboardMessageState.noticePage = 1;
  }

  const page = dashboardMessageState.noticePage;
  const start = (page - 1) * pageSize;
  const rows = list.slice(start, start + pageSize);

  const html = rows.map(function(notice) {
    const meta = dashboardNoticeLevel(notice);
    const id = Number(notice.id || 0);
    const color = notice.color || meta.color;

    return '' +
      '<article class="dashboard-notice-card" style="--notice-color:' + escapeHtml(color) + '">' +
        '<div class="dashboard-notice-top">' +
          '<div class="dashboard-notice-left">' +
            '<span class="dashboard-notice-badge">' + escapeHtml(meta.text) + '</span>' +
            '<div class="dashboard-notice-title">' + escapeHtml(notice.title || '官方通知') + '</div>' +
          '</div>' +
          '<time class="dashboard-notice-time">' + escapeHtml(dashboardNoticeDate(notice.publish_time || notice.created_at || '')) + '</time>' +
        '</div>' +
        '<div class="dashboard-notice-content">' + dashboardLinkify(notice.content || '') + '</div>' +
        '<div class="dashboard-notice-actions">' +
          '<button class="ghost-btn" type="button" onclick="openDashboardNoticeById(' + id + ')">查看详情</button>' +
        '</div>' +
      '</article>';
  }).join('');

  box.innerHTML = html + renderDashboardNoticePager(page, totalPages, total);
}
function renderDashboardNoticePager(page, totalPages, total) {
  if (totalPages <= 1) {
    return '<div class="dashboard-notice-pager"><span class="notice-page-info">共 ' + total + ' 条通知</span></div>';
  }

  const buttons = [];

  buttons.push(
    '<button type="button" ' + (page <= 1 ? 'disabled' : '') + ' onclick="changeDashboardNoticePage(' + (page - 1) + ')">上一页</button>'
  );

  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || Math.abs(i - page) <= 1) {
      buttons.push(
        '<button type="button" class="' + (i === page ? 'active' : '') + '" onclick="changeDashboardNoticePage(' + i + ')">' + i + '</button>'
      );
    } else if (i === page - 2 || i === page + 2) {
      buttons.push('<span class="notice-page-ellipsis">...</span>');
    }
  }

  buttons.push(
    '<button type="button" ' + (page >= totalPages ? 'disabled' : '') + ' onclick="changeDashboardNoticePage(' + (page + 1) + ')">下一页</button>'
  );

  return '' +
    '<div class="dashboard-notice-pager">' +
      '<span class="notice-page-info">共 ' + total + ' 条，' + page + '/' + totalPages + ' 页</span>' +
      '<div class="notice-page-buttons">' + buttons.join('') + '</div>' +
    '</div>';
}

function changeDashboardNoticePage(page) {
  dashboardMessageState.noticePage = Number(page || 1);
  renderDashboardNotices();
}

  if (!notice) return;

  ensureDashboardNoticeModal();

  document.getElementById('dashboardNoticeModal').classList.add('show');

function openDashboardNoticeById(id) {

async function checkDashboardUnreadNotices() {
  try {
    const body = new URLSearchParams({
      action: 'getUnreadNotices'
    });

    const response = await fetch(DASHBOARD_MSG_API, {
      method: 'POST',
      credentials: 'same-origin',
      cache: 'no-store',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8'
      },
      body
    });

    const result = await response.json();

    if (Number(result.code) === 0 && Array.isArray(result.data) && result.data.length > 0) {
      openDashboardNotice(result.data[0]);
    }
  } catch (error) {
    console.error('检查未读通知失败：', error);
  }
}

async function markDashboardNoticeRead() {
  const noticeId = Number(dashboardMessageState.currentNoticeId || 0);

  if (!noticeId) {
    closeDashboardNoticeModal();
    return;
  }

  try {
    const body = new URLSearchParams({
      action: 'markNoticeAsRead',
      notice_id: String(noticeId)
    });

    const response = await fetch(DASHBOARD_MSG_API, {
      method: 'POST',
      credentials: 'same-origin',
      cache: 'no-store',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8'
      },
      body
    });

    const result = await response.json();

    if (Number(result.code) === 0) {
      closeDashboardNoticeModal();
      await checkDashboardUnreadNotices();
    } else {
      alert('标记已读失败：' + (result.msg || '未知错误'));
    }
  } catch (error) {
    console.error(error);
    alert('标记已读请求失败');
  }
}

function buildFranchiseVenueOverviewList(venues, franchise, data) {
  const sourceVenues = Array.isArray(venues) ? venues : [];

  const list = sourceVenues.map(function(venue, index) {
    const id = String((venue && venue.id) || '').trim();
    const name = String((venue && venue.venue_name) || (id ? ('场地 ' + id) : '')).trim();

    return {
      id: id,
      name: name || '-',
      rawIsPrimary: Number((venue && venue.is_primary) || 0) === 1,
      index: index,
      isPrimary: false
    };
  }).filter(function(item) {
    return item.id || item.name;
  });

  if (!list.length && ((franchise && franchise.venue_id) || (franchise && franchise.venue_name))) {
    list.push({
      id: String((franchise && franchise.venue_id) || '').trim(),
      name: String((franchise && franchise.venue_name) || '当前场地').trim(),
      rawIsPrimary: true,
      index: 0,
      isPrimary: true
    });
  }

  if (!list.length) {
    return list;
  }

  // 优先使用后端 admin_user_venues.is_primary。
  // 只有接口没返回 is_primary 时，才用 franchise.venue_id / data.venue_id 兜底，避免旧 admin_users.venue_id 抢主场地。
  const explicitPrimary = list.find(function(item) {
    return item.rawIsPrimary;
  });

  const fallbackPrimaryId = String((franchise && franchise.venue_id) || (data && data.venue_id) || '').trim();
  const fallbackPrimary = fallbackPrimaryId
    ? list.find(function(item) { return item.id === fallbackPrimaryId; })
    : null;

  const primary = explicitPrimary || fallbackPrimary || list[0];

  list.forEach(function(item) {
    item.isPrimary = item === primary;
    delete item.rawIsPrimary;
    delete item.index;
  });

  return list.sort(function(a, b) {
    if (a.isPrimary !== b.isPrimary) return a.isPrimary ? -1 : 1;
    const aid = Number(a.id || 0);
    const bid = Number(b.id || 0);
    return aid - bid;
  });
}

function franchiseVenuePillsHtml(list, type) {
  const venues = Array.isArray(list) ? list : [];
  const primaryLabel = '主';
  const childLabel = '子';

  if (!venues.length) {
    return '' +
      '<div class="franchise-venue-summary">' +
        '<div class="franchise-venue-summary-row">' +
          '<span class="franchise-venue-summary-label primary">' + primaryLabel + '</span>' +
          '<span class="franchise-venue-summary-text empty">暂无场地</span>' +
        '</div>' +
      '</div>';
  }

  const primary = venues.find(function(venue) { return venue.isPrimary; }) || venues[0];
  const children = venues.filter(function(venue) { return venue !== primary; });

  function valueText(venue) {
    if (!venue) return '-';
    return type === 'id' ? ('' + (venue.id || '-')) : (venue.name || '-');
  }

  const primaryText = valueText(primary);
  const childValues = children.map(valueText).filter(Boolean);
  const childFullText = childValues.length ? childValues.join('、') : '无';
  const childDisplayText = childValues.length > 2
    ? childValues.slice(0, 2).join('、') + ' 等' + childValues.length + '个'
    : childFullText;

  return '' +
    '<div class="franchise-venue-summary" title="点击查看完整主/子场地">' +
      '<div class="franchise-venue-summary-row">' +
        '<span class="franchise-venue-summary-label primary">' + primaryLabel + '</span>' +
        '<span class="franchise-venue-summary-text" title="' + escapeHtml(primaryText) + '">' + escapeHtml(primaryText) + '</span>' +
      '</div>' +
      '<div class="franchise-venue-summary-row">' +
        '<span class="franchise-venue-summary-label">' + childLabel + '</span>' +
        '<span class="franchise-venue-summary-text ' + (childValues.length ? '' : 'empty') + '" title="' + escapeHtml(childFullText) + '">' + escapeHtml(childDisplayText) + '</span>' +
      '</div>' +
    '</div>';
}

    async function postNoticeApi(action, extra) {
      const response = await fetch('./api/index/Msg.php', {
        method: 'POST',
        credentials: 'same-origin',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8'
        },
        body: noticeBody(action, extra),
        cache: 'no-store'
      });
      return response.json();
    }

    function updateNoticeBadge(hasUnread) {
      if (noticeButton) {
        noticeButton.classList.toggle('has-unread', !!hasUnread);
      }
    }

    function normalizeNotice(notice) {
      if (!notice || typeof notice !== 'object') return null;
      const id = Number(notice.id || 0);
      if (!id) return null;
      return {
        id: id,
        title: notice.title || '官方通知',
        content: notice.content || ''
      };
    }

    async function checkUnreadNotices(options) {
      options = options || {};
      try {
        const result = await postNoticeApi('getUnreadNotices');
        if (Number(result.code) !== 0) {
          lastUnreadNotice = null;
          updateNoticeBadge(false);
          return null;
        }

        const list = Array.isArray(result.data) ? result.data : [];
        const notice = normalizeNotice(list[0]);
        lastUnreadNotice = notice;
        updateNoticeBadge(!!notice);

        if (!notice) {
          return null;
        }

        const shouldOpen = options.forceOpen || !autoOpenedNoticeIds.has(notice.id);
        if (shouldOpen) {
          openNoticeModal(notice);
          autoOpenedNoticeIds.add(notice.id);
        }

        return notice;
      } catch (error) {
        console.error('检查未读通知失败:', error);
        return null;
      }
    }

    function startNoticePolling() {
      checkUnreadNotices();
      if (noticePollTimer) return;
      noticePollTimer = window.setInterval(function() {
        checkUnreadNotices();
      }, 60000);
    }

    function openNoticeModal(notice) {
      const normalized = normalizeNotice(notice);
      if (!normalized || !noticeModal) return;
      currentNotice = normalized;
      noticeModalTitle.textContent = normalized.title;
      noticeModalContent.innerHTML = escapeHtml(normalized.content).replace(/\r?\n/g, '<br>');
      noticeModal.classList.add('show');
    }

    function closeNoticeModal() {
      if (noticeModal) {
        noticeModal.classList.remove('show');
      }
    }

    async function markCurrentNoticeRead() {
      if (!currentNotice || !currentNotice.id) {
        closeNoticeModal();
        return;
      }

      try {
        const result = await postNoticeApi('markNoticeAsRead', {
          notice_id: String(currentNotice.id)
        });
        if (Number(result.code) === 0) {
          lastUnreadNotice = null;
          currentNotice = null;
          updateNoticeBadge(false);
          closeNoticeModal();
          await checkUnreadNotices();
        } else {
          alert(result.msg || '标记已读失败');
        }
      } catch (error) {
        console.error('标记通知已读失败:', error);
        alert('标记已读请求失败，请稍后重试');
      }
    }

    function formatMoney(value) {

      return '¥' + number.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function formatInt(value) {
      return Number(value || 0).toLocaleString('zh-CN');
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, function(char) {
        return {
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#039;'
        }[char];
      });
    }

sidebarNav.addEventListener('click', function(event) {
  const link = event.target.closest('a[data-menu-id]');
  if (link) {
    event.preventDefault();
    navigateToMenu(link.dataset.menuId);
    return;
  }

  const toggle = event.target.closest('[data-toggle-group]');
  if (!toggle) return;

  event.preventDefault();

  const group = toggle.closest('.nav-group');
  if (!group) return;

  const isOpen = group.classList.contains('open');

  // 已经展开时：只收起，不再 navigateToMenu，否则 routeFromHash/setActive 会重新展开
  if (isOpen) {
    group.classList.remove('open');
    return;
  }

  // 未展开时：先收起其他父级，再展开当前父级，并进入父级分类页
  sidebarNav.querySelectorAll('.nav-group.open').forEach(function(openGroup) {
    if (openGroup !== group) openGroup.classList.remove('open');
  });

  group.classList.add('open');

  const item = findTopMenu(toggle.dataset.toggleGroup);
  if (item) {
    navigateToMenu(item.id);
  }
});
